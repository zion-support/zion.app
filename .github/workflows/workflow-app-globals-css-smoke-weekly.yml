# Ensures app/globals.css keeps Tailwind entry directives (grep-only; pairs with tailwind.config + postcss smokes).

name: app/globals.css smoke (weekly)

permissions:
  contents: read

on:
  schedule:
    - cron: '49 7 * * 0' # Sundays 07:49 UTC
  workflow_dispatch:

concurrency:
  group: workflow-app-globals-css-smoke-weekly
  cancel-in-progress: true

jobs:
  globals-css:
    runs-on: ubuntu-latest
    timeout-minutes: 2
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: globals.css Tailwind directives
        run: |
          set -euo pipefail
          test -f app/globals.css
          test -s app/globals.css
          grep -Fq '@tailwind base;' app/globals.css
          grep -Fq '@tailwind components;' app/globals.css
          grep -Fq '@tailwind utilities;' app/globals.css
          grep -Fq '@import "tailwindcss";' app/globals.css
          echo 'ok: app/globals.css'
