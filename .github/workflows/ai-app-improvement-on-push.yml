# AI App Improvement On Push
# When a human pushes to main, run the lightweight daily improvement pipeline
# against https://ziontechgroup.com to apply safe fixes and keep evolution
# changes flowing between pushes. Complements scheduled evolution workflows.

name: AI App Improvement On Push

permissions:
  contents: write

on:
  push:
    branches:
      - main
  workflow_dispatch:
    inputs:
      auto_commit:
        description: 'Commit and push changes to main'
        required: false
        default: true
        type: boolean

concurrency:
  group: app-improvement-on-push-${{ github.ref }}
  cancel-in-progress: false

jobs:
  app-improvement-on-push:
    # Avoid loops and churn: skip bot commits and explicit skip markers.
    if: github.actor != 'github-actions[bot]' && !contains(github.event.head_commit.message, '[skip-autonomy]') && !startsWith(github.event.head_commit.message, 'chore(automation):')
    runs-on: ubuntu-latest
    timeout-minutes: 25
    env:
      NEXT_TELEMETRY_DISABLED: "1"

    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          token: ${{ github.token }}

      - name: Setup Node.js
        uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6.3.0
        with:
          node-version-file: '.nvmrc'
          cache: 'npm'
          cache-dependency-path: package-lock.json

      - name: Install dependencies
        run: npm ci --prefer-offline --no-audit --fund=false

      - name: Configure git identity for auto-commit
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

      - name: Run app improvement daily quick pipeline
        env:
          AUTO_COMMIT: ${{ (github.event_name == 'push' || github.event.inputs.auto_commit != 'false') && '1' || '' }}
          OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
#           NETLIFY_BUILD_HOOK removed (Netlify decommissioned → GitHub Pages)
        run: node automation/ai-app-improvement-daily-quick-pipeline.cjs

