name: AI lead form routing guard (daily)

permissions:
  contents: write
  issues: write

concurrency:
  group: ai-lead-form-routing-guard-daily
  cancel-in-progress: false

on:
  schedule:
    - cron: '*/10 * * * *'
  workflow_dispatch:

jobs:
  guard:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    env:
      NEXT_TELEMETRY_DISABLED: "1"
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          token: ${{ github.token }}
          ref: main

      - name: Setup Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version-file: '.nvmrc'
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Install dependencies
        run: npm ci --prefer-offline --no-audit --fund=false

      - name: Run lead form routing guard
        run: node automation/lead-form-routing-guard.cjs

      - name: Build lead routing issue body
        run: |
          set -euo pipefail
          node -e "const fs=require('fs');const p='automation/reports/lead-form-routing-guard-latest.json';const j=JSON.parse(fs.readFileSync(p,'utf8'));const lines=['## Lead form routing guard','','- status: **'+j.status+'**','- targetEmail: '+j.targetEmail,'- findings: '+(j.findings||[]).length,''];for(const f of (j.findings||[])){lines.push('- ['+f.severity+'] '+f.type+' '+f.file+' — '+f.detail);}fs.writeFileSync('automation/reports/lead-form-routing-guard-body.md',lines.join('\n')+'\n');"

      - name: Escalate lead routing issue when broken
        if: ${{ hashFiles('automation/reports/lead-form-routing-guard-latest.json') != '' }}
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          status=$(node -e "const fs=require('fs');const j=JSON.parse(fs.readFileSync('automation/reports/lead-form-routing-guard-latest.json','utf8'));process.stdout.write(String(j.status||'healthy'));")
          if [ "$status" = "healthy" ]; then
            ISSUE_FINGERPRINT="lead-form-routing-guard" \
            CLOSE_COMMENT="Auto-closing: lead form routing guard recovered to healthy (commercial@ziontechgroup.com)." \
            node scripts/automation/gh-issue-close-on-recovery.cjs
          else
            ISSUE_TITLE="Lead form routing drift detected" \
            ISSUE_BODY_FILE="automation/reports/lead-form-routing-guard-body.md" \
            ISSUE_FINGERPRINT="lead-form-routing-guard" \
            ISSUE_LABELS="bug,automation,automation-slo-critical" \
            COOLDOWN_HOURS="12" \
            export ISSUE_FINGERPRINT="lead-form-routing-guard"
            node scripts/automation/gh-issue-dedupe-or-create.cjs
          fi

      - name: Upload lead routing artifacts
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: lead-form-routing-guard-${{ github.run_id }}
          path: |
            automation/reports/lead-form-routing-guard-latest.json
            automation/reports/lead-form-routing-guard-body.md
          if-no-files-found: ignore
          retention-days: 30

      - name: Commit lead routing report
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -f automation/reports/lead-form-routing-guard-latest.json
          if git diff --staged --quiet; then
            echo "No lead form routing report changes."
            exit 0
          fi
          bash scripts/automation/commit-and-push-main.sh "chore(reports): refresh lead form routing guard"
