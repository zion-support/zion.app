name: AI production smoke sample

permissions:
  contents: read
  issues: write

concurrency:
  group: ai-production-smoke-scheduled
  cancel-in-progress: false

on:
  workflow_dispatch:
  schedule:
    - cron: '25 */6 * * *'

jobs:
  smoke:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    env:
      NEXT_TELEMETRY_DISABLED: "1"
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Setup Node.js
        uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6.3.0
        with:
          node-version-file: '.nvmrc'
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Install dependencies
        run: npm ci --prefer-offline --no-audit --fund=false

      - name: UTC date for smoke rotation seed
        run: echo "SMOKE_ROTATION_DAY=$(date -u +%Y-%m-%d)" >> "$GITHUB_ENV"

      - name: Sample production routes
        id: smoke
        continue-on-error: true
        env:
          ZION_BASE_URL: ${{ vars.ZION_PRODUCTION_URL }}
          SMOKE_USE_ROTATION: '1'
          SMOKE_ROTATION_DAY: ${{ env.SMOKE_ROTATION_DAY }}
          SMOKE_SAMPLE_ROUTES: '5'
          SMOKE_FAIL_ON_ERROR: '0'
        run: node automation/scheduled-production-smoke.cjs

      - name: Upload smoke report
        if: always()
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7.0.0
        with:
          name: production-smoke-${{ github.run_id }}
          path: automation/reports/scheduled-production-smoke-latest.json
          if-no-files-found: ignore
          retention-days: 30

      - name: Append smoke health snapshot
        if: always()
        run: node scripts/automation/append-smoke-health-snapshot.cjs

      - name: Escalate on smoke failure
        if: steps.smoke.outcome != 'success'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          report="automation/reports/scheduled-production-smoke-latest.json"
          [ -f "$report" ] || exit 0
          body_file="production-smoke-fail.md"
          {
            echo "## Production smoke sample failed"
            echo ""
            echo "- **Dedupe key:** \`scheduled-production-smoke\`"
            echo ""
            echo "- Workflow run: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
            echo ""
            node -e "const fs=require('fs');const r=JSON.parse(fs.readFileSync('$report','utf8'));console.log('```json');console.log(JSON.stringify(r.results.filter(x=>!x.ok),null,2));console.log('```');"
          } > "$body_file"
          export ISSUE_TITLE="Production smoke sample failed"
          export ISSUE_FINGERPRINT="scheduled-production-smoke"
          export ISSUE_LABELS="bug,automation"
          export ISSUE_BODY_FILE="$body_file"
          node scripts/automation/gh-issue-dedupe-or-create.cjs || true

      - name: Close smoke issue on recovery
        if: steps.smoke.outcome == 'success'
        env:
          GH_TOKEN: ${{ github.token }}
          ISSUE_FINGERPRINT: scheduled-production-smoke
          CLOSE_COMMENT: "Auto-closing: production smoke sample passed."
        run: node scripts/automation/gh-issue-close-on-recovery.cjs || true
