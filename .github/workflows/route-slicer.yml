name: Autonomous Lazy-Loading Route Slicer
permissions:
  contents: read
true:
  schedule:
  - cron: 0 4 * * 0
  workflow_dispatch:
    inputs:
      apply:
        description: Apply transformations (creates PR)
        required: false
        default: 'false'
        type: boolean
jobs:
  route-slicer:
    name: Lazy-Load Route Slicer
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
    steps:
    - name: Checkout repository
      uses: actions/checkout@v6.0.2
      with:
        fetch-depth: 0
    - name: Setup Node.js
      uses: actions/setup-node@v6.3.0
      with:
        node-version: '20'
        cache: npm
    - name: Install dependencies
      run: npm ci --include=dev
    - name: Build app (to generate bundle stats)
      run: "ANALYZE=true npm run build\n# Ensure bundle analyzer stats exist; generate\
        \ if missing\nif [ ! -d \".next/stats\" ]; then\n  echo \"No bundle stats\
        \ found. Run with ANALYZE=true to generate.\"\n  exit 1\nfi\n"
    - name: Run Route Slicer (dry-run)
      id: slicer
      continue-on-error: true
      run: 'node automation/route-slicer.cjs > /tmp/route-slicer-output.txt || true

        echo "exit_code=$?" >> $GITHUB_OUTPUT

        '
    - name: Upload proposal artifacts
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: route-slicer-proposal
        path: .hermes/memory/route-slicer/proposals/*
        retention-days: 30
    - name: Create Pull Request (if apply=true and proposals found)
      if: steps.slicer.outputs.exit_code == '0' && github.event.inputs.apply == 'true'
      uses: peter-evans/create-pull-request@v5
      with:
        token: ${{ secrets.GITHUB_TOKEN }}
        commit-message: 'feat(auto): apply lazy-load route slicing for bundle optimization'
        title: 'chore(auto): lazy-load heavy route segments (route-slicer)'
        body: "Autonomous route slicer identified opportunities to reduce initial\
          \ bundle size by lazy-loading heavy modules.\n\n**Changes:** Auto-injected\
          \ dynamic() imports for non-critical components.\n**Estimated savings:**\
          \ See summary in `.hermes/memory/route-slicer/proposals/`.\n\n\U0001F916\
          \ Generated by [route-slicer](automation/route-slicer.cjs)\n"
        branch: route-slicer-automation-${{ github.run_number }}
        delete-branch: true
        labels:
        - autonomous
        - performance
        - code-split
    - name: Notify Telegram on proposals
      if: success() && steps.slicer.outputs.exit_code == '0'
      run: "PROPOSALS=$(find .hermes/memory/route-slicer/proposals -name summary.json\
        \ 2>/dev/null | wc -l)\nif [ \"$PROPOSALS\" -gt 0 ]; then\n  node automation/notify-telegram.js\
        \ \"\U0001F680 Route Slicer: $PROPOSALS route optimization proposal(s) ready\
        \ for review.\"\nfi\n"
    - name: Notify Telegram on errors
      if: failure()
      run: "node automation/notify-telegram.js \"\u26A0\uFE0F Route Slicer encountered\
        \ errors. Check workflow logs.\""
    timeout-minutes: 10
