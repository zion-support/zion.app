permissions:
  contents: read
name: "Autonomous Lazy-Loading Route Slicer"

on:
  schedule:
    - cron: '0 4 * * 0'  # Weekly Sunday 04:00 UTC
  workflow_dispatch:
    inputs:
      apply:
        description: 'Apply transformations (creates PR)'
        required: false
        default: 'false'
        type: boolean

jobs:
  route-slicer:
    name: Lazy-Load Route Slicer
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci --include=dev

      - name: Build app (to generate bundle stats)
        run: |
          npm run build
          # Ensure bundle analyzer stats exist; generate if missing
          if [ ! -d ".next/stats" ]; then
            echo "No bundle stats found. Run with ANALYZE=true to generate."
            exit 1
          fi

      - name: Run Route Slicer (dry-run)
        id: slicer
        continue-on-error: true
        run: |
          node automation/route-slicer.cjs > /tmp/route-slicer-output.txt || true
          echo "exit_code=$?" >> $GITHUB_OUTPUT

      - name: Upload proposal artifacts
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: route-slicer-proposal
          path: .hermes/memory/route-slicer/proposals/*
          retention-days: 30

      - name: Create Pull Request (if apply=true and proposals found)
        if: steps.slicer.outputs.exit_code == '0' && github.event.inputs.apply == 'true'
        uses: peter-evans/create-pull-request@v8
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          commit-message: 'feat(auto): apply lazy-load route slicing for bundle optimization'
          title: 'chore(auto): lazy-load heavy route segments (route-slicer)'
          body: |
            Autonomous route slicer identified opportunities to reduce initial bundle size by lazy-loading heavy modules.

            **Changes:** Auto-injected dynamic() imports for non-critical components.
            **Estimated savings:** See summary in `.hermes/memory/route-slicer/proposals/`.

            🤖 Generated by [route-slicer](automation/route-slicer.cjs)
          branch: route-slicer-automation-${{ github.run_number }}
          delete-branch: true
          labels: ['autonomous', 'performance', 'code-split']

      - name: Notify Telegram on proposals
        if: success() && steps.slicer.outputs.exit_code == '0'
        run: |
          PROPOSALS=$(find .hermes/memory/route-slicer/proposals -name summary.json 2>/dev/null | wc -l)
          if [ "$PROPOSALS" -gt 0 ]; then
            node automation/notify-telegram.js "🚀 Route Slicer: $PROPOSALS route optimization proposal(s) ready for review."
          fi

      - name: Notify Telegram on errors
        if: failure()
        run: |
          node automation/notify-telegram.js "⚠️ Route Slicer encountered errors. Check workflow logs."
