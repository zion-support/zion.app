name: Observability history freshness guard

permissions:
  contents: read
  issues: write

on:
  schedule:
    - cron: '27 */12 * * *'
  workflow_dispatch:

jobs:
  freshness:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    env:
      NEXT_TELEMETRY_DISABLED: "1"
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          ref: main

      - name: Setup Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version-file: '.nvmrc'
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Install dependencies
        run: npm ci --prefer-offline --no-audit --fund=false

      - name: Check observability history freshness
        env:
          GH_TOKEN: ${{ github.token }}
          OBSERVABILITY_HISTORY_MAX_STALE_HOURS: "48"
        run: node scripts/automation/check-observability-history-freshness.cjs
