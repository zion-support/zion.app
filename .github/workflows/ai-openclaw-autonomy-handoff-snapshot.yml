name: OpenClaw autonomy handoff snapshot

permissions:
  contents: read

on:
  schedule:
    - cron: '23 * * * *'
  workflow_dispatch:

concurrency:
  group: openclaw-handoff-snapshot
  cancel-in-progress: false

jobs:
  handoff-artifact:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    env:
      NEXT_TELEMETRY_DISABLED: "1"
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Setup Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version-file: '.nvmrc'
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Install dependencies
        run: npm ci --prefer-offline --no-audit --fund=false

      - name: Generate handoff from repository reports
        run: node automation/openclaw-autonomy-handoff.cjs

      - name: Validate handoff shape
        run: node automation/openclaw-handoff-validate.cjs

      - name: Upload handoff artifact
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: openclaw-autonomy-handoff-${{ github.run_id }}
          path: automation/reports/openclaw-autonomy-handoff-latest.json
          if-no-files-found: warn
          retention-days: 14
