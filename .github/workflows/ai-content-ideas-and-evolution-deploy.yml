# AI Content Ideas + Evolution Deploy
# 2x daily: ideation + content audit ideas + automation ideas from live + optional evolution ideas + burst → build → commit + deploy.
# Feeds live-app and evolution backlog into content creation. Uses content-commit concurrency.

name: AI Content Ideas and Evolution Deploy

concurrency:
  group: content-commit
  cancel-in-progress: false

permissions:
  contents: write

on:
  schedule:
    - cron: '0 8 * * *'
    - cron: '0 20 * * *'
  workflow_dispatch:
    inputs:
      skip_ideation:
        description: 'Skip ideation'
        required: false
        default: false
        type: boolean
      skip_evolution_ideas:
        description: 'Skip evolution ideas from audits'
        required: false
        default: false
        type: boolean
      max_template_blog:
        description: 'Template blog posts (default 4)'
        required: false
        default: '4'
      max_template_case_studies:
        description: 'Template case studies (default 4)'
        required: false
        default: '4'
      max_industry_pages:
        description: 'Industry pages (default 3)'
        required: false
        default: '3'
      trigger_deploy:
        description: 'Trigger deploy after commit (GitHub Pages)'
        required: false
        default: true
        type: boolean

jobs:
  ideas-evolution:
    runs-on: ubuntu-latest
    timeout-minutes: 35
    env:
      NEXT_TELEMETRY_DISABLED: "1"
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          token: ${{ github.token }}

      - uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6.3.0
        with:
          node-version-file: '.nvmrc'
          cache: 'npm'
          cache-dependency-path: package-lock.json

      - name: Install dependencies
        run: npm ci --prefer-offline --no-audit --fund=false

      - name: Autonomous quality gate
        run: npm run autonomy:prepush-gate

      - name: Content ideation (live site)
        if: github.event.inputs.skip_ideation != 'true'
        env:
          OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
          OPENROUTER_MODEL: openrouter/free
        run: node automation/ai-content-ideation-agent.cjs || true

      - name: Content audit ideas (live site)
        if: github.event.inputs.skip_ideation != 'true'
        env:
          OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
          OPENROUTER_MODEL: openrouter/free
        run: node automation/ai-content-audit-ideas-agent.cjs || true

      - name: Automation ideas from live audit
        run: node automation/ai-automation-ideas-from-live-audit.cjs || true

      - name: Evolution ideas from audits
        if: github.event.inputs.skip_evolution_ideas != 'true'
        run: npm run app:evolution-ideas-from-audits || true

      - name: Front page expansion
        env:
          OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
          OPENROUTER_MODEL: openrouter/free
        run: node automation/ai-front-page-content-expansion-agent.cjs run || true

      - name: Content burst
        env:
          MAX_TEMPLATE_BLOG: ${{ github.event.inputs.max_template_blog || '4' }}
          MAX_TEMPLATE_CASE_STUDIES: ${{ github.event.inputs.max_template_case_studies || '4' }}
          MAX_INDUSTRY_PAGES: ${{ github.event.inputs.max_industry_pages || '3' }}
          MAX_ADD: "4"
        run: node automation/ai-content-burst-agent.cjs

      - name: Homepage industry sync
        run: node automation/ai-homepage-industry-sync-agent.cjs run --apply || true

      - name: Validate build
        run: |
          set -euo pipefail
          npm run rsc:guard
          npm run build

      - name: Commit, push, and deploy
        env:
          TRIGGER_DEPLOY: ${{ github.event.inputs.trigger_deploy != 'false' && '1' || '' }}
#           NETLIFY_BUILD_HOOK removed (Netlify decommissioned → GitHub Pages)
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -A
          if ! git diff --staged --quiet; then
            bash scripts/automation/commit-and-push-main.sh "chore(content): ideas + evolution deploy - ideation + audit ideas + burst"
            if false # Netlify build hook removed (migrated to GitHub Pages) && [ "$TRIGGER_DEPLOY" = "1" ]; then
              echo "# NO-OP: Netlify deploy removed (migrated to GitHub Pages)"
            fi
          fi
