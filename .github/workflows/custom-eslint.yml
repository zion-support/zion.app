permissions:
  contents: read
name: "Autonomous Custom ESLint Rules"

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    - cron: '0 16 * * 1'  # Weekly Tuesday 16:00 UTC
  workflow_dispatch:

jobs:
  custom-eslint:
    name: Custom ESLint Rules
    runs-on: ubuntu-latest
    permissions:
      contents: read
      issues: write
      pull-requests: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run Autonomous ESLint
        id: eslint
        continue-on-error: true
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: |
          npx eslint -c .eslintrc-autonomous.cjs . \
            --ignore-pattern ".next/**" \
            --ignore-pattern "out/**" \
            --ignore-pattern "dist/**" \
            --ignore-pattern "build/**" \
            --ignore-pattern "coverage/**" \
            --ignore-pattern ".hermes/**" \
            --ignore-pattern "automation/reports/**" \
            --max-warnings 0 \
            --format json > /tmp/eslint-report.json || true
          echo "exit_code=$?" >> $GITHUB_OUTPUT

      - name: Upload ESLint report
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: eslint-autonomous-report
          path: /tmp/eslint-report.json
          retention-days: 7

      - name: Check for errors
        run: |
          if [ "${{ steps.eslint.outputs.exit_code }}" -ne 0 ]; then
            echo "ESLint violations detected"
            exit 1
          fi

      - name: Parse and comment on PR
        if: github.event_name == 'pull_request' && failure()
        uses: actions/github-script@v9
        with:
          script: |
            const fs = require('fs');
            const reportPath = '/tmp/eslint-report.json';
            let body = '🚨 **Custom ESLint Rules Violations**\n\n';
            try {
              const data = JSON.parse(fs.readFileSync(reportPath, 'utf8'));
              const errors = data.filter((f: any) => f.severity === 2); // 2 = error
              if (errors.length === 0) {
                body += 'No error-level violations found, but warnings exist.';
              } else {
                body += `Found ${errors.length} error(s):\n\n`;
                errors.slice(0, 25).forEach((err: any) => {
                  const relPath = err.filePath.replace(process.env.GITHUB_WORKSPACE + '/', '');
                  body += `- **${relPath}:${err.line}:${err.column}** — ${err.message} (${err.ruleId})\n`;
                });
                if (errors.length > 25) body += `\n… and ${errors.length - 25} more. See full report.\n`;
              }
              body += '\nPlease address these code hygiene issues before merging.';
            } catch (e) {
              body += 'Could not parse ESLint report. Check workflow logs for details.';
            }
            github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body
            });

      - name: Open GitHub issue on main branch violations
        if: github.event_name == 'push' && failure() && github.ref == 'refs/heads/main'
        uses: actions/github-script@v9
        with:
          script: |
            const fs = require('fs');
            const title = '🚨 Custom ESLint Rules Violations on Main';
            const reportPath = '/tmp/eslint-report.json';
            let body = '**Code hygiene violations detected on `main`.** The autonomous linter found errors that must be fixed.\n\n';
            try {
              const data = JSON.parse(fs.readFileSync(reportPath, 'utf8'));
              const errors = data.filter((f: any) => f.severity === 2);
              body += `**Total errors:** ${errors.length}\n\n`;
              errors.slice(0, 30).forEach((err: any) => {
                const rel = err.filePath.replace(process.env.GITHUB_WORKSPACE + '/', '');
                body += `- ${rel}:${err.line}:${err.column} — [${err.ruleId}] ${err.message}\n`;
              });
              if (errors.length > 30) body += `\n… plus ${errors.length - 30} more.\n`;
            } catch (e) {
              body += 'Could not parse full report; see artifact.\n';
            }
            body += `\n*Committed by: ${context.payload.committer?.name || 'unknown'}*\n`;
            body += `*Commit: ${context.payload.headCommit?.id?.slice(0, 7) || 'N/A'}*\n`;

            const existing = await github.rest.issues.listForRepo({
              owner: context.repo.owner,
              repo: context.repo.repo,
              labels: ['eslint-autonomous', 'code-quality'],
              state: 'open'
            });
            const already = existing.data.find((i: any) => i.title === title);
            if (!already) {
              await github.rest.issues.create({
                owner: context.repo.owner,
                repo: context.repo.repo,
                title,
                body,
                labels: ['eslint-autonomous', 'autonomous', 'code-quality', 'blocker']
              });
            }

      - name: Notify Telegram on failure
        if: failure()
        run: |
          node automation/notify-telegram.js "🚨 Custom ESLint check found violations. Fix code hygiene issues. See GitHub issues."

      - name: Notify Telegram on success (weekly digest)
        if: success() && github.event_name == 'schedule'
        run: |
          node automation/notify-telegram.js "✅ Weekly ESLint hygiene scan passed — no violations found."
