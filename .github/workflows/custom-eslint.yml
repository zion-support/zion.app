permissions:
  contents: read
name: Autonomous Custom ESLint Rules
true:
  push:
    branches:
    - main
  pull_request:
    branches:
    - main
  schedule:
  - cron: 0 16 * * 1
  workflow_dispatch: null
jobs:
  custom-eslint:
    name: Custom ESLint Rules
    runs-on: ubuntu-latest
    permissions:
      contents: read
      issues: write
      pull-requests: write
    steps:
    - name: Checkout repository
      uses: actions/checkout@v6.0.2
      with:
        fetch-depth: 0
    - name: Setup Node.js
      uses: actions/setup-node@v6.3.0
      with:
        node-version: '20'
        cache: npm
    - name: Install dependencies
      run: npm ci
    - name: Run Autonomous ESLint
      id: eslint
      continue-on-error: true
      env:
        TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
        TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
      run: "npx eslint -c .eslintrc-autonomous.cjs . \\\n  --ignore-pattern \".next/**\"\
        \ \\\n  --ignore-pattern \"out/**\" \\\n  --ignore-pattern \"dist/**\" \\\n\
        \  --ignore-pattern \"build/**\" \\\n  --ignore-pattern \"coverage/**\" \\\
        \n  --ignore-pattern \".hermes/**\" \\\n  --ignore-pattern \"automation/reports/**\"\
        \ \\\n  --max-warnings 0 \\\n  --format json > /tmp/eslint-report.json ||\
        \ true\necho \"exit_code=$?\" >> $GITHUB_OUTPUT\n"
    - name: Upload ESLint report
      if: always()
      uses: actions/upload-artifact@v7
      with:
        name: eslint-autonomous-report
        path: /tmp/eslint-report.json
        retention-days: 7
    - name: Check for errors
      run: "if [ \"${{ steps.eslint.outputs.exit_code }}\" -ne 0 ]; then\n  echo \"\
        ESLint violations detected\"\n  exit 1\nfi\n"
    - name: Parse and comment on PR
      if: github.event_name == 'pull_request' && failure()
      uses: actions/github-script@v9
      with:
        script: "const fs = require('fs');\nconst reportPath = '/tmp/eslint-report.json';\n\
          let body = '\U0001F6A8 **Custom ESLint Rules Violations**\\n\\n';\ntry {\n\
          \  const data = JSON.parse(fs.readFileSync(reportPath, 'utf8'));\n  const\
          \ errors = data.filter((f: any) => f.severity === 2); // 2 = error\n  if\
          \ (errors.length === 0) {\n    body += 'No error-level violations found,\
          \ but warnings exist.';\n  } else {\n    body += `Found ${errors.length}\
          \ error(s):\\n\\n`;\n    errors.slice(0, 25).forEach((err: any) => {\n \
          \     const relPath = err.filePath.replace(process.env.GITHUB_WORKSPACE\
          \ + '/', '');\n      body += `- **${relPath}:${err.line}:${err.column}**\
          \ \u2014 ${err.message} (${err.ruleId})\\n`;\n    });\n    if (errors.length\
          \ > 25) body += `\\n\u2026 and ${errors.length - 25} more. See full report.\\\
          n`;\n  }\n  body += '\\nPlease address these code hygiene issues before\
          \ merging.';\n} catch (e) {\n  body += 'Could not parse ESLint report. Check\
          \ workflow logs for details.';\n}\ngithub.rest.issues.createComment({\n\
          \  owner: context.repo.owner,\n  repo: context.repo.repo,\n  issue_number:\
          \ context.issue.number,\n  body\n});\n"
    - name: Open GitHub issue on main branch violations
      if: github.event_name == 'push' && failure() && github.ref == 'refs/heads/main'
      uses: actions/github-script@v9
      with:
        script: "const fs = require('fs');\nconst title = '\U0001F6A8 Custom ESLint\
          \ Rules Violations on Main';\nconst reportPath = '/tmp/eslint-report.json';\n\
          let body = '**Code hygiene violations detected on `main`.** The autonomous\
          \ linter found errors that must be fixed.\\n\\n';\ntry {\n  const data =\
          \ JSON.parse(fs.readFileSync(reportPath, 'utf8'));\n  const errors = data.filter((f:\
          \ any) => f.severity === 2);\n  body += `**Total errors:** ${errors.length}\\\
          n\\n`;\n  errors.slice(0, 30).forEach((err: any) => {\n    const rel = err.filePath.replace(process.env.GITHUB_WORKSPACE\
          \ + '/', '');\n    body += `- ${rel}:${err.line}:${err.column} \u2014 [${err.ruleId}]\
          \ ${err.message}\\n`;\n  });\n  if (errors.length > 30) body += `\\n\u2026\
          \ plus ${errors.length - 30} more.\\n`;\n} catch (e) {\n  body += 'Could\
          \ not parse full report; see artifact.\\n';\n}\nbody += `\\n*Committed by:\
          \ ${context.payload.committer?.name || 'unknown'}*\\n`;\nbody += `*Commit:\
          \ ${context.payload.headCommit?.id?.slice(0, 7) || 'N/A'}*\\n`;\n\nconst\
          \ existing = await github.rest.issues.listForRepo({\n  owner: context.repo.owner,\n\
          \  repo: context.repo.repo,\n  labels: ['eslint-autonomous', 'code-quality'],\n\
          \  state: 'open'\n});\nconst already = existing.data.find((i: any) => i.title\
          \ === title);\nif (!already) {\n  await github.rest.issues.create({\n  \
          \  owner: context.repo.owner,\n    repo: context.repo.repo,\n    title,\n\
          \    body,\n    labels: ['eslint-autonomous', 'autonomous', 'code-quality',\
          \ 'blocker']\n  });\n}\n"
    - name: Notify Telegram on failure
      if: failure()
      run: "node automation/notify-telegram.js \"\U0001F6A8 Custom ESLint check found\
        \ violations. Fix code hygiene issues. See GitHub issues.\"\n"
    - name: Notify Telegram on success (weekly digest)
      if: success() && github.event_name == 'schedule'
      run: "node automation/notify-telegram.js \"\u2705 Weekly ESLint hygiene scan\
        \ passed \u2014 no violations found.\"\n"
    timeout-minutes: 10
