name: AI GHA npm cache audit (PR)

permissions:
  contents: read

on:
  pull_request:
    paths:
      - '.github/workflows/**'

concurrency:
  group: ai-gha-npm-cache-audit-pr-${{ github.head_ref }}
  cancel-in-progress: true

jobs:
  strict:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Setup Node.js
        uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6.3.0
        with:
          node-version-file: '.nvmrc'
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Install dependencies
        run: npm ci --prefer-offline --no-audit --fund=false

      - name: Strict npm cache audit
        env:
          GHA_NPM_CACHE_AUDIT_STRICT: '1'
        run: node automation/gha-npm-cache-audit.cjs
