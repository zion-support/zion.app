name: AI Telemetry History Compactor

permissions:
  contents: write

on:
  schedule:
    - cron: '48 */8 * * *'
  workflow_dispatch:

concurrency:
  group: ai-telemetry-history-compactor
  cancel-in-progress: false

jobs:
  compactor:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    env:
      NEXT_TELEMETRY_DISABLED: "1"
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          token: ${{ github.token }}
          ref: main

      - name: Setup Node.js
        uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6.3.0
        with:
          node-version-file: '.nvmrc'
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Install dependencies
        run: npm ci --prefer-offline --no-audit --fund=false

      - name: Compact telemetry histories
        run: node automation/compact-telemetry-history.cjs

      - name: Commit compacted histories
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -f automation/reports/*.json
          if git diff --staged --quiet; then
            echo "No telemetry compaction changes."
            exit 0
          fi
          bash scripts/automation/commit-and-push-main.sh "chore(reports): compact telemetry history files"

