name: AI Incident Suppression Registry

permissions:
  contents: write
  issues: read

on:
  schedule:
    - cron: '17 */6 * * *'
  workflow_dispatch:

concurrency:
  group: ai-incident-suppression-registry
  cancel-in-progress: false

jobs:
  suppression-registry:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    env:
      NEXT_TELEMETRY_DISABLED: "1"
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          token: ${{ github.token }}
          ref: main

      - name: Setup Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version-file: '.nvmrc'
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Install dependencies
        run: npm ci --prefer-offline --no-audit --fund=false

      - name: Write suppression registry snapshot
        env:
          GH_TOKEN: ${{ github.token }}
          GITHUB_RUN_ID: ${{ github.run_id }}
          GITHUB_REPOSITORY: ${{ github.repository }}
          GITHUB_SHA: ${{ github.sha }}
          GITHUB_WORKFLOW: ${{ github.workflow }}
          GITHUB_SERVER_URL: ${{ github.server_url }}
        run: |
          set -euo pipefail
          node automation/generate-incident-suppression-registry.cjs
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -f automation/reports/incident-suppression-registry-latest.json
          if git diff --staged --quiet; then
            echo "No suppression registry changes."
            exit 0
          fi
          bash scripts/automation/commit-and-push-main.sh "chore(reports): refresh incident suppression registry snapshot"
