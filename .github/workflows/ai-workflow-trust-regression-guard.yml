name: AI workflow trust regression guard

permissions:
  contents: read
  issues: write

on:
  schedule:
    - cron: '*/30 * * * *'
  workflow_dispatch:

concurrency:
  group: ai-workflow-trust-regression-guard
  cancel-in-progress: true

jobs:
  trust_guard:
    runs-on: ubuntu-latest
    timeout-minutes: 12
    env:
      NEXT_TELEMETRY_DISABLED: "1"
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          ref: main

      - name: Setup Node.js
        uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6.3.0
        with:
          node-version-file: '.nvmrc'
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Install dependencies
        run: npm ci --prefer-offline --no-audit --fund=false

      - name: Refresh integrity + trust score
        run: |
          node automation/github-workflow-integrity-auditor.cjs --no-fail
          node automation/workflow-trust-score.cjs
          node automation/append-workflow-trust-history.cjs

      - name: Run trust regression guard
        env:
          GH_TOKEN: ${{ github.token }}
        run: node automation/workflow-trust-regression-guard.cjs

      - name: Upload trust artifacts
        if: always()
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7.0.0
        with:
          name: workflow-trust-regression-${{ github.run_id }}
          path: |
            automation/reports/workflow-trust-score-latest.json
            automation/reports/workflow-trust-history.json
            automation/reports/workflow-trust-regression-latest.json
          if-no-files-found: ignore
          retention-days: 21
