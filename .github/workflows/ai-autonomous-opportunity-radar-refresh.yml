name: AI Autonomous Opportunity Radar Refresh

on:
  schedule:
    - cron: '17 5 * * *'
  workflow_dispatch: {}

permissions:
  contents: write

concurrency:
  group: ai-autonomous-opportunity-radar-refresh
  cancel-in-progress: false

jobs:
  refresh-radar:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          token: ${{ github.token }}
      - name: Setup Node
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version-file: '.nvmrc'
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Install dependencies
        run: npm ci --prefer-offline --no-audit --fund=false

      - name: Refresh autonomous opportunity radar report
        run: node automation/ai-autonomous-opportunity-radar-agent.cjs

      - name: Commit report updates
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -f automation/reports/autonomous-opportunity-radar-latest.json
          if git diff --cached --quiet; then
            exit 0
          fi
          bash scripts/automation/commit-and-push-main.sh "chore(automation): refresh autonomous opportunity radar report"

      - name: Upload report artifact
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: autonomous-opportunity-radar-${{ github.run_id }}
          path: automation/reports/autonomous-opportunity-radar-latest.json
