# Ensures ai-workflow-slo-monitor.yml keeps schedule, thresholds, and issue hooks (grep-only).
name: ai workflow slo monitor workflow smoke (weekly)
permissions:
  contents: read
on:
  schedule:
    - cron: '39 11 * * 3' # Wednesdays 11:39 UTC
  workflow_dispatch:
concurrency:
  group: ai-workflow-slo-monitor-smoke-weekly
  cancel-in-progress: true
jobs:
  workflow-slo-monitor-anchors:
    runs-on: ubuntu-latest
    timeout-minutes: 2
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - name: ai-workflow-slo-monitor.yml anchors
        run: |
          set -euo pipefail
          f=.github/workflows/ai-workflow-slo-monitor.yml
          test -f "$f"
          test -s "$f"
          grep -Fq 'name: AI Workflow SLO Monitor' "$f"
          grep -Fq 'group: ai-workflow-slo-monitor' "$f"
          grep -Fq "cron: '20 13 * * 1'" "$f"
          grep -Fq 'actions: read' "$f"
          grep -Fq 'issues: write' "$f"
          grep -Fq 'ai-workflow-slo-monitor.cjs' "$f"
          grep -Fq 'workflow-slo-latest.json' "$f"
          grep -Fq 'gh-issue-close-on-recovery.cjs' "$f"
          grep -Fq 'gh-issue-dedupe-or-create.cjs' "$f"
          grep -Fq 'actions/upload-artifact@' "$f"
          echo "ok: $f"
