name: AI Openclaw insights bundle

permissions:
  contents: read

on:
  workflow_dispatch:
  schedule:
    - cron: '0 17 * * 0'

concurrency:
  group: ai-openclaw-insights-ci
  cancel-in-progress: true

jobs:
  insights:
    runs-on: ubuntu-latest
    timeout-minutes: 45
    env:
      NEXT_TELEMETRY_DISABLED: '1'
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Setup Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version-file: '.nvmrc'
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Install dependencies
        run: npm ci --prefer-offline --no-audit --fund=false

      - name: Openclaw history merge
        run: npm run openclaw:improver:history:merge
        continue-on-error: true

      - name: Prompt quality score
        run: npm run openclaw:prompt:score
        continue-on-error: true

      - name: Actions queue
        run: npm run openclaw:actions:queue
        continue-on-error: true

      - name: Actions policy
        run: npm run openclaw:actions:policy
        continue-on-error: true

      - name: PR route
        run: npm run openclaw:pr:route
        continue-on-error: true

      - name: Confidence trend
        run: npm run openclaw:confidence:trend
        continue-on-error: true

      - name: Deploy gate
        run: npm run openclaw:deploy:gate
        continue-on-error: true

      - name: Regression memory
        run: npm run openclaw:regression:memory
        continue-on-error: true

      - name: Autonomy handoff
        run: npm run openclaw:autonomy:handoff
        continue-on-error: true

      - name: OpenClaw approved-action runner dry-run (aggregate gate)
        run: npm run openclaw:runner

      - name: Aggregate reports + fail on openclaw_runner_failure
        run: |
          npm run reports:aggregate
          npm run reports:aggregate:guard:runner

      - name: Upload Openclaw report bundle
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: openclaw-insights-${{ github.run_id }}
          path: |
            automation/reports/openclaw-*.json
            automation/reports/openclaw-improver-history-merged-latest.json
          if-no-files-found: ignore
          retention-days: 14
