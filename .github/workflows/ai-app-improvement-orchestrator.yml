# AI App Improvement Orchestrator
# Full pipeline: audit live site → evolution ideas → implementation → commit & push
# Runs: Weekly Monday 12 UTC, or workflow_dispatch

name: AI App Improvement Orchestrator

permissions:
  contents: read

on:
  schedule:
    - cron: '0 12 * * 1'
  workflow_dispatch:
    inputs:
      auto_commit:
        description: 'Commit and push improvements to main'
        required: false
        default: true
        type: boolean
      layout_audit:
        description: 'Include layout design audit'
        required: false
        default: false
        type: boolean
      content_ideas:
        description: 'Include content ideation'
        required: false
        default: false
        type: boolean
      evolution_ideas:
        description: 'Include evolution ideas generation'
        required: false
        default: false
        type: boolean
      create_pages:
        description: 'Create missing pages when site link audit finds broken links'
        required: false
        default: false
        type: boolean
      trigger_deploy:
        description: 'Trigger Netlify build after push'
        required: false
        default: false
        type: boolean

jobs:
  improve:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      contents: write
    env:
      NEXT_TELEMETRY_DISABLED: "1"
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version-file: '.nvmrc'
          cache: 'npm'
          cache-dependency-path: package-lock.json

      - name: Install dependencies
        run: npm ci --prefer-offline --no-audit --fund=false

      - name: Run app improvement pipeline
        env:
          OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
          OPENROUTER_MODEL: openrouter/auto
          AUTO_COMMIT: ${{ (github.event_name == 'schedule' || github.event.inputs.auto_commit == 'true') && '1' || '0' }}
          LAYOUT_AUDIT: ${{ github.event.inputs.layout_audit == 'true' && '1' || '' }}
          CONTENT_IDEAS: ${{ github.event.inputs.content_ideas == 'true' && '1' || '' }}
          EVOLUTION_IDEAS: ${{ github.event.inputs.evolution_ideas == 'true' && '1' || '' }}
          CREATE_PAGES: ${{ github.event.inputs.create_pages == 'true' && '1' || '' }}
          TRIGGER_DEPLOY: ${{ github.event.inputs.trigger_deploy == 'true' && '1' || '' }}
#           NETLIFY_BUILD_HOOK removed (Netlify decommissioned → GitHub Pages)
        run: node automation/ai-app-improvement-orchestrator.cjs run

      - name: Upload orchestrator report
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: app-improvement-report
          path: |
            automation/reports/app-improvement-orchestrator-latest.json
            automation/reports/app-evolution-ideas-latest.json
            automation/reports/site-link-audit-latest.json
            automation/data/app-evolution-backlog.json
            automation/data/app-audit-suggestions.json
