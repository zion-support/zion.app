name: OpenClaw PR merge stability

permissions:
  contents: read
  pull-requests: write

concurrency:
  group: openclaw-pr-merge-stability-${{ github.ref }}
  cancel-in-progress: true

on:
  pull_request:
    paths:
      - 'automation/**'
      - 'package.json'
      - 'package-lock.json'

jobs:
  merge-stability:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0

      - name: Fetch base ref for PR diff
        run: git fetch origin "${{ github.base_ref }}" --depth=64

      - name: Setup Node.js
        uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6.3.0
        with:
          node-version-file: '.nvmrc'
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Install dependencies
        run: npm ci --prefer-offline --no-audit --fund=false

      - name: OpenClaw autonomy stability
        run: npm run openclaw:autonomy:stability

      - name: PR report-only budget (mirrors pre-commit for bots)
        env:
          PR_BUDGET_BASE: origin/${{ github.base_ref }}
        run: node automation/openclaw-report-commit-budget-pr.cjs

      - name: Validate autonomy handoff JSON
        run: |
          node automation/openclaw-autonomy-handoff.cjs
          node automation/openclaw-handoff-validate.cjs

      - name: Hot-file advisory PR comment
        uses: actions/github-script@ed597411d8f924073f98dfc5c65a23a2325f34cd # v8.0.0
        with:
          github-token: ${{ github.token }}
          script: |
            const { execFileSync, execSync } = require('child_process');
            const pr = context.payload.pull_request;
            if (!pr) return;
            const base = `origin/${pr.base.ref}`;
            let files;
            try {
              files = execSync(`git diff --name-only ${base}...HEAD`, { encoding: 'utf8' })
                .trim()
                .split(/\n/)
                .filter(Boolean);
            } catch (e) {
              core.info('git diff failed: ' + e.message);
              return;
            }
            if (files.length === 0) return;
            const body = execFileSync('node', ['automation/openclaw-pr-hotfile-comment.cjs'], {
              encoding: 'utf8',
              cwd: process.cwd(),
              env: { ...process.env, FILES: files.join(',') },
            });
            if (body.includes('no hot-file overlap') || body.includes('no changed files')) return;
            const marker = '<!-- openclaw-hotfile:thread -->';
            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: pr.number,
              per_page: 100,
            });
            const existing = comments.find((c) =>
              typeof c.body === 'string' &&
              c.body.includes(marker) &&
              c.user &&
              c.user.login === 'github-actions[bot]'
            );
            if (existing) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: existing.id,
                body,
              });
              core.info('Updated existing OpenClaw hot-file comment');
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: pr.number,
                body,
              });
            }

      - name: Lint check
        run: npm run lint:check
