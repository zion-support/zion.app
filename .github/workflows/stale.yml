name: Stale Issues & PRs

permissions:
  issues: write
  pull-requests: write

on:
  schedule:
    - cron: '0 3 * * *'
  workflow_dispatch:

concurrency:
  group: stale
  cancel-in-progress: true

jobs:
  stale:
    name: Clean Up Stale
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Stale action
        uses: actions/stale@b5d41d4e1d5dceea10e7104786b73624c18a190f # v10.2.0
        with:
          stale-issue-message: >
            This issue has been automatically marked as stale because it has not had
            recent activity. It will be closed in 14 days if no further activity occurs.
          stale-pr-message: >
            This pull request has been automatically marked as stale because it has not had
            recent activity. It will be closed in 7 days if no further activity occurs.
          close-issue-message: >
            This issue was closed because it has been stale for too long.
            Feel free to reopen if it is still relevant.
          close-pr-message: >
            This pull request was closed because it has been stale for too long.
          days-before-stale: 30
          days-before-close: 14
          days-before-pr-close: 7
          stale-issue-label: stale
          stale-pr-label: stale
          exempt-issue-labels: pinned,security,bug
          exempt-pr-labels: pinned,security
          operations-per-run: 50

      - name: Summary
        if: always()
        run: |
          echo "## Stale Issues & PRs Cleanup" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "- Marks issues stale after **30 days** of inactivity" >> "$GITHUB_STEP_SUMMARY"
          echo "- Closes stale issues after **14 days**" >> "$GITHUB_STEP_SUMMARY"
          echo "- Closes stale PRs after **7 days**" >> "$GITHUB_STEP_SUMMARY"
          echo "- Exempt labels: pinned, security, bug" >> "$GITHUB_STEP_SUMMARY"
