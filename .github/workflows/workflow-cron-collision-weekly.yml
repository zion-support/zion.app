# Scheduled cron overlap report on main (complements PR/push workflow-cron-collision-pr).

name: Workflow cron collision report (weekly)

permissions:
  contents: read

on:
  schedule:
    - cron: '18 7 * * 1' # Mondays 07:18 UTC
  workflow_dispatch:

concurrency:
  group: workflow-cron-collision-weekly
  cancel-in-progress: true

jobs:
  collision-report:
    runs-on: ubuntu-latest
    timeout-minutes: 8
    env:
      NEXT_TELEMETRY_DISABLED: "1"
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Setup Node.js
        uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6.3.0
        with:
          node-version-file: '.nvmrc'
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Install dependencies
        run: npm ci --prefer-offline --no-audit --fund=false

      - name: Generate cron collision report
        run: node automation/ai-cron-collision-tuner.cjs

      - name: Upload cron collision report
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: cron-collision-weekly-${{ github.run_id }}
          path: |
            automation/reports/cron-collision-latest.json
            automation/reports/cron-collision-latest.md
          if-no-files-found: ignore
          retention-days: 21
