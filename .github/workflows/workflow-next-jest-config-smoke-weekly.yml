# Ensures next.config.mjs loads and keeps static export; jest.config.cjs stays syntactically valid (no npm ci).

name: next.config.mjs + jest.config.cjs smoke (weekly)

permissions:
  contents: read

on:
  schedule:
    - cron: '27 7 * * 6' # Saturdays 07:27 UTC
  workflow_dispatch:

concurrency:
  group: workflow-next-jest-config-smoke-weekly
  cancel-in-progress: true

jobs:
  configs:
    runs-on: ubuntu-latest
    timeout-minutes: 3
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Setup Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version-file: '.nvmrc'

      - name: next.config.mjs loads and output is export
        run: |
          set -euo pipefail
          test -f next.config.mjs
          test -s next.config.mjs
          node --input-type=module -e "
            const m = await import('./next.config.mjs');
            const d = m.default;
            if (d == null || typeof d !== 'object') process.exit(1);
            if (d.output !== 'export') process.exit(1);
            console.log('ok: next.config.mjs static export');
          "

      - name: jest.config.cjs syntax check
        run: |
          set -euo pipefail
          test -f jest.config.cjs
          test -s jest.config.cjs
          node --check jest.config.cjs
          echo 'ok: jest.config.cjs syntax'
