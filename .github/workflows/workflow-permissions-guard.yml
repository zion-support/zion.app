name: Workflow permissions guard

permissions:
  contents: read

on:
  pull_request:
    paths:
      - ".github/workflows/**/*.yml"
      - ".github/workflows/**/*.yaml"
      - "scripts/automation/run-workflow-grep-guards.sh"
  push:
    branches: [main]
    paths:
      - ".github/workflows/**/*.yml"
      - ".github/workflows/**/*.yaml"
      - "scripts/automation/run-workflow-grep-guards.sh"
  workflow_dispatch:

jobs:
  validate-permissions:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Permissions policy + no pull_request_target (grep guards)
        run: bash scripts/automation/run-workflow-grep-guards.sh --permissions
