permissions:
  contents: read
name: "TypeScript Type Coverage & Dead Code Check"

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    - cron: '0 15 * * 1'  # Weekly Monday 15:00 UTC (digest only — still fails PRs)
  workflow_dispatch:

jobs:
  type-coverage:
    name: Type Coverage & Dead Code
    runs-on: ubuntu-latest
    permissions:
      contents: read
      issues: write
      pull-requests: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run TypeScript Check
        id: type-check
        run: |
          npm run type-check
          echo "exit_code=$?" >> $GITHUB_OUTPUT

      - name: Run ESLint Check
        id: lint-check
        run: |
          npm run lint:check || true
          echo "exit_code=$?" >> $GITHUB_OUTPUT

      - name: Comment on PR if failed
        if: github.event_name == 'pull_request' && failure()
        uses: actions/github-script@v9
        with:
          script: |
            const body = '🚨 **TypeScript Type Check Failed**\n\n' +
              'The TypeScript `tsc --noEmit` check found type errors. ' +
              'Fix typing issues before merging.\n\n' +
              'To reproduce locally:\n' +
              '```\n' +
              'npm run type-check\n' +
              '```\n';
            github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body
            });

      - name: Open issue on main branch regression
        if: github.event_name == 'push' && failure() && github.ref == 'refs/heads/main'
        uses: actions/github-script@v9
        with:
          script: |
            const title = '🚨 TypeScript Check Regression on Main';
            const body = '**TypeScript check failed on `main`.**\n\n' +
              'Run `npm run type-check` locally to reproduce.\n\n' +
              `*Commit: ${context.payload.headCommit?.id?.slice(0, 7) || 'N/A'}*\n`;

            const existing = await github.rest.issues.listForRepo({
              owner: context.repo.owner,
              repo: context.repo.repo,
              labels: ['type-coverage', 'autonomous'],
              state: 'open'
            });
            const already = existing.data.find((i: any) => i.title === title);
            if (!already) {
              await github.rest.issues.create({
                owner: context.repo.owner,
                repo: context.repo.repo,
                title,
                body,
                labels: ['type-coverage', 'autonomous', 'code-quality']
              });
            }

      - name: Notify Telegram on failure
        if: failure()
        run: |
          node automation/notify-telegram.js "🚨 TypeScript check failed — type errors detected. Review GitHub issues." || true

      - name: Notify Telegram on success (weekly digest)
        if: success() && github.event_name == 'schedule'
        run: |
          node automation/notify-telegram.js "✅ Weekly TypeScript Check — all clear." || true
