# Scheduled automation syntax + ecosystem audit (no npm ci; complements validate-light / contracts).

name: Automation preflight (weekly)

permissions:
  contents: read

on:
  schedule:
    - cron: '44 6 * * 4' # Thursdays 06:44 UTC
  workflow_dispatch:

concurrency:
  group: workflow-automation-preflight-weekly
  cancel-in-progress: true

jobs:
  preflight:
    runs-on: ubuntu-latest
    timeout-minutes: 12
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Setup Node.js
        uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6.3.0
        with:
          node-version-file: '.nvmrc'

      - name: Automation preflight (syntax + PM2/package/issue-dedupe checks)
        run: npm run automation:preflight
