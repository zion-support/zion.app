# Ensures ai-route-sitemap-drift-scheduled.yml keeps schedule/drift escalation anchors (grep-only).
name: ai route sitemap drift scheduled workflow smoke (weekly)

permissions:
  contents: read

on:
  schedule:
    - cron: '10 12 * * 2' # Tuesdays 12:10 UTC
  workflow_dispatch:

concurrency:
  group: ai-route-sitemap-drift-scheduled-smoke-weekly
  cancel-in-progress: false

jobs:
  drift-anchors:
    runs-on: ubuntu-latest
    timeout-minutes: 2
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: ai-route-sitemap-drift-scheduled.yml anchors
        run: |
          set -euo pipefail
          f=.github/workflows/ai-route-sitemap-drift-scheduled.yml
          test -f "$f"
          test -s "$f"
          grep -Fq 'name: AI route vs sitemap drift' "$f"
          grep -Fq 'group: ai-route-sitemap-drift' "$f"
          grep -Fq 'cancel-in-progress: false' "$f"
          grep -Fq "cron: '45 11 * * 2'" "$f"
          grep -Fq 'issues: write' "$f"
          grep -Fq 'ROUTE_DRIFT_ISSUE_THRESHOLD' "$f"
          grep -Fq 'app-route-sitemap-drift.cjs' "$f"
          grep -Fq 'app-route-sitemap-drift-latest.json' "$f"
          grep -Fq 'app-route-sitemap-drift-' "$f"
          grep -Fq 'route-sitemap-drift-escalate.cjs' "$f"
          grep -Fq 'gh-issue-close-on-recovery.cjs' "$f"
          echo "ok: $f"
