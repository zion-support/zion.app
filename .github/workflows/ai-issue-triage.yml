name: AI Issue Triage

permissions:
  issues: write
  contents: read

concurrency:
  group: ai-issue-triage-${{ github.event.issue.number }}
  cancel-in-progress: true

on:
  issues:
    types: [opened]

jobs:
  triage:
    name: AI Issue Classification
    runs-on: ubuntu-latest
    timeout-minutes: 5
    if: >
      !contains(github.event.issue.labels.*.name, 'skip-triage') &&
      !contains(github.event.issue.labels.*.name, 'production-incident')
    steps:
      - name: Classify issue with AI
        id: classify
        env:
          OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
          ISSUE_TITLE: ${{ github.event.issue.title }}
          ISSUE_BODY: ${{ github.event.issue.body }}
        run: |
          if [ -z "$OPENROUTER_API_KEY" ]; then
            echo "::warning::OPENROUTER_API_KEY not set — skipping AI triage"
            echo "skip=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          TITLE="$ISSUE_TITLE"
          BODY="$ISSUE_BODY"

          PAYLOAD=$(python3 -c "
          import json

          title = '''${TITLE}'''.strip()[:200]
          body = '''${BODY}'''.strip()[:1500]

          prompt = f'''Triage this GitHub issue for ziontechgroup.com (Next.js AI solutions platform).

          **Title:** {title}
          **Body:** {body}

          Respond ONLY with valid JSON (no markdown, no explanation) in this exact format:
          {{
            \"category\": \"one of: bug, feature, enhancement, documentation, performance, security, accessibility, seo, infrastructure, question\",
            \"priority\": \"one of: critical, high, medium, low\",
            \"labels\": [\"array of 1-3 relevant labels from: bug, feature-request, enhancement, documentation, performance, security, accessibility, seo, ui/ux, devops, ai-automation, needs-investigation, good-first-issue\"],
            \"area\": \"one of: frontend, backend, automation, ci-cd, content, infrastructure, design\",
            \"summary\": \"one sentence summary of what needs to be done\",
            \"suggested_assignee_skill\": \"one of: frontend-dev, backend-dev, devops, content-writer, designer, security-eng\"
          }}'''

          payload = {
            'model': 'openrouter/auto',
            'max_tokens': 500,
            'temperature': 0.1,
            'messages': [
              {'role': 'system', 'content': 'You are a project manager triaging GitHub issues for a Next.js website. Respond ONLY with valid JSON. No markdown formatting, no code blocks, just raw JSON.'},
              {'role': 'user', 'content': prompt}
            ]
          }
          print(json.dumps(payload))
          ")

          RESPONSE=$(curl -sS --max-time 30 \
            -H "Authorization: Bearer $OPENROUTER_API_KEY" \
            -H "Content-Type: application/json" \
            -H "HTTP-Referer: https://github.com/${{ github.repository }}" \
            -H "X-Title: ZionTechGroup-IssueTriage" \
            -d "$PAYLOAD" \
            https://openrouter.ai/api/v1/chat/completions)

          AI_RESPONSE=$(echo "$RESPONSE" | python3 -c "
          import sys, json
          try:
              data = json.load(sys.stdin)
              msg = data.get('choices', [{}])[0].get('message', {}).get('content', '')
              clean = msg.strip()
              if clean.startswith('\`\`\`'):
                  clean = clean.split('\n', 1)[1] if '\n' in clean else clean[3:]
                  clean = clean.rsplit('\`\`\`', 1)[0]
              parsed = json.loads(clean)
              print(json.dumps(parsed))
          except Exception as e:
              print(json.dumps({'error': str(e)}))
          ")

          echo "response=$AI_RESPONSE" >> "$GITHUB_OUTPUT"
          echo "skip=false" >> "$GITHUB_OUTPUT"

      - name: Apply labels and comment
        if: steps.classify.outputs.skip != 'true'
        uses: actions/github-script@ed597411d8f924073f98dfc5c65a23a2325f34cd # v8.0.0
        with:
          script: |
            const raw = `${{ steps.classify.outputs.response }}`;
            let triage;
            try {
              triage = JSON.parse(raw);
            } catch (e) {
              core.warning('Could not parse AI triage response');
              return;
            }

            if (triage.error) {
              core.warning(`AI triage error: ${triage.error}`);
              return;
            }

            const validLabels = [
              'bug', 'feature-request', 'enhancement', 'documentation',
              'performance', 'security', 'accessibility', 'seo',
              'ui/ux', 'devops', 'ai-automation', 'needs-investigation',
              'good-first-issue'
            ];

            const labels = (triage.labels || []).filter(l => validLabels.includes(l));

            const priorityLabels = {
              critical: 'priority: critical',
              high: 'priority: high',
              medium: 'priority: medium',
              low: 'priority: low',
            };

            if (triage.priority && priorityLabels[triage.priority]) {
              labels.push(priorityLabels[triage.priority]);
            }

            if (triage.area) {
              labels.push(`area: ${triage.area}`);
            }

            labels.push('ai-triaged');

            for (const label of labels) {
              try {
                await github.rest.issues.getLabel({
                  ...context.repo,
                  name: label,
                });
              } catch {
                const colors = {
                  'priority: critical': 'B60205',
                  'priority: high': 'D93F0B',
                  'priority: medium': 'FBCA04',
                  'priority: low': '0E8A16',
                  'ai-triaged': '7057FF',
                };
                await github.rest.issues.createLabel({
                  ...context.repo,
                  name: label,
                  color: colors[label] || 'EDEDED',
                });
              }
            }

            if (labels.length > 0) {
              await github.rest.issues.addLabels({
                ...context.repo,
                issue_number: context.issue.number,
                labels: labels,
              });
            }

            const comment = [
              '### AI Issue Triage',
              '',
              `| Field | Value |`,
              `|-------|-------|`,
              `| **Category** | ${triage.category || 'unknown'} |`,
              `| **Priority** | ${triage.priority || 'medium'} |`,
              `| **Area** | ${triage.area || 'unknown'} |`,
              `| **Suggested Skill** | ${triage.suggested_assignee_skill || 'unknown'} |`,
              '',
              `**Summary:** ${triage.summary || 'No summary generated.'}`,
              '',
              '---',
              `> Automated triage via OpenRouter AI | Labels applied: ${labels.join(', ')}`,
            ].join('\n');

            await github.rest.issues.createComment({
              ...context.repo,
              issue_number: context.issue.number,
              body: comment,
            });
