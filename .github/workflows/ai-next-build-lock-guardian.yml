name: AI Next Build Lock Guardian

permissions:
  contents: read
  issues: write

concurrency:
  group: ai-next-build-lock-guardian
  cancel-in-progress: false

on:
  schedule:
    - cron: '5 */4 * * *'
  workflow_dispatch:

jobs:
  lock-guardian:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Setup Node.js
        uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6.3.0
        with:
          node-version-file: '.nvmrc'
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Install dependencies
        run: npm ci --prefer-offline --no-audit --fund=false

      - name: Run build lock check
        run: npm run build:lock:check
        continue-on-error: true

      - name: Upload build lock guardian report
        if: always()
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7.0.0
        with:
          name: next-build-lock-guardian-${{ github.run_id }}
          path: automation/reports/next-build-lock-guardian-latest.json
          if-no-files-found: ignore
          retention-days: 30

      - name: Open issue when lock contention detected
        if: always()
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          report="automation/reports/next-build-lock-guardian-latest.json"
          [ -f "$report" ] || exit 0
          status=$(node -e "const fs=require('fs');const r=JSON.parse(fs.readFileSync('$report','utf8'));console.log(r.status||'unknown')")
          if [ "$status" = "ok" ]; then
            export ISSUE_FINGERPRINT="next-build-lock-contention"
            export CLOSE_COMMENT="Auto-closing: next build lock contention recovered."
            node scripts/automation/gh-issue-close-on-recovery.cjs || true
            exit 0
          fi
          body_file="next-build-lock-guardian-issue.md"
          {
            echo "## Next build lock contention detected"
            echo ""
            echo "- Workflow run: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
            echo "- Report: \`automation/reports/next-build-lock-guardian-latest.json\`"
            echo ""
            node -e "const fs=require('fs');const r=JSON.parse(fs.readFileSync('$report','utf8'));console.log('- lockExistsBefore: '+Boolean(r.lockExistsBefore));console.log('- nextBuildProcessCount: '+Number(r.nextBuildProcessCount||0));"
            echo ""
            echo "Review build process contention and enforce serialized build execution where needed."
          } > "$body_file"
          export ISSUE_TITLE="Next build lock contention detected"
          export ISSUE_BODY_FILE="$body_file"
          export ISSUE_LABELS="bug"
          export ISSUE_FINGERPRINT="next-build-lock-contention"
          export COOLDOWN_HOURS="12"
          node scripts/automation/gh-issue-dedupe-or-create.cjs || true
