# Weekly Live Navigation Audit
# Crawls live site (ziontechgroup.com), extracts nav/footer links, compares to
# app/constants/navigation and local routes. Uploads report; no auto-fix.
# Schedule: Fri 10 UTC. workflow_dispatch.

name: AI Weekly Live Navigation Audit

permissions:
  contents: read

concurrency:
  group: ai-weekly-live-navigation-audit
  cancel-in-progress: false

on:
  schedule:
    - cron: '0 10 * * 5'
  workflow_dispatch:

jobs:
  live-nav-audit:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    env:
      NEXT_TELEMETRY_DISABLED: "1"
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Setup Node.js
        uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6.3.0
        with:
          node-version-file: '.nvmrc'
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Install dependencies
        run: npm ci --prefer-offline --no-audit --fund=false

      - name: Run live navigation audit
        run: npm run nav:live-audit

      - name: Upload live navigation audit report
        if: always()
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7.0.0
        with:
          name: live-navigation-audit-${{ github.run_id }}
          path: automation/reports/live-navigation-audit-latest.json
          if-no-files-found: ignore
          retention-days: 30
