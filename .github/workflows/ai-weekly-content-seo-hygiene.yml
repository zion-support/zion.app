# Weekly Content Freshness + SEO Meta Hygiene
# Runs content freshness agent and SEO meta auditor; uploads reports.
# Schedule: Monday 06:00 UTC. Optional workflow_dispatch.

name: AI Weekly Content & SEO Hygiene

permissions:
  contents: read

concurrency:
  group: ai-weekly-content-seo-hygiene
  cancel-in-progress: false

on:
  schedule:
    - cron: '0 6 * * 1'
  workflow_dispatch:

jobs:
  content-seo-hygiene:
    runs-on: ubuntu-latest
    timeout-minutes: 25
    env:
      NEXT_TELEMETRY_DISABLED: "1"
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Setup Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version-file: '.nvmrc'
          cache: 'npm'
          cache-dependency-path: package-lock.json

      - name: Install dependencies
        run: npm ci --prefer-offline --no-audit --fund=false

      - name: Content freshness audit
        run: node automation/ai-content-freshness-agent.cjs run

      - name: SEO meta audit
        run: node automation/ai-seo-meta-auditor.cjs audit || true

      - name: Upload hygiene reports
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: weekly-content-seo-hygiene-${{ github.run_id }}
          path: |
            automation/reports/content-freshness-latest.json
            automation/reports/seo-meta-report.json
          if-no-files-found: ignore
          retention-days: 14
