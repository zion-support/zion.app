name: AI Layout Design Audit

permissions:
  contents: read

concurrency:
  group: ai-layout-design-audit
  cancel-in-progress: false

on:
  schedule:
    - cron: '0 12 * * 6'
  workflow_dispatch:

jobs:
  layout-design-audit:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    env:
      LAYOUT_AUDIT_URL: https://ziontechgroup.com
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Setup Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version-file: '.nvmrc'
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Install dependencies
        run: npm ci --prefer-offline --no-audit --fund=false

      - name: Layout & design intelligence (non-LLM)
        env:
          AUTO_COMMIT: "1"
        run: node automation/ai-layout-design-intelligence-agent.cjs
        continue-on-error: true

      - name: Run layout design audit
        env:
          OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
        run: npm run layout:audit
        continue-on-error: true

      - name: Apply layout improvements
        if: success()
        run: npm run layout:audit-apply
        continue-on-error: true

      - name: Upload report
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: layout-design-audit-${{ github.run_id }}
          path: automation/reports/layout-design-audit-latest.json
          if-no-files-found: ignore
          retention-days: 30
