# Ensures ai-openclaw-skill-auto-tuner.yml keeps cadence/tuner/escalation anchors (grep-only).
name: ai openclaw skill auto tuner workflow smoke (weekly)
permissions:
  contents: read
on:
  schedule:
    - cron: '43 11 * * 3' # Wednesdays 11:43 UTC
  workflow_dispatch:
concurrency:
  group: ai-openclaw-skill-auto-tuner-smoke-weekly
  cancel-in-progress: true
jobs:
  openclaw-skill-auto-tuner-anchors:
    runs-on: ubuntu-latest
    timeout-minutes: 2
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - name: ai-openclaw-skill-auto-tuner.yml anchors
        run: |
          set -euo pipefail
          f=.github/workflows/ai-openclaw-skill-auto-tuner.yml
          test -f "$f"
          test -s "$f"
          grep -Fq 'name: AI Openclaw Skill Auto Tuner' "$f"
          grep -Fq 'group: ai-openclaw-skill-auto-tuner' "$f"
          grep -Fq "cron: '10 */6 * * *'" "$f"
          grep -Fq 'npm run openclaw:skills:audit' "$f"
          grep -Fq 'npm run openclaw:skills:tune' "$f"
          grep -Fq 'openclaw-skill-cadence-audit-latest.json' "$f"
          grep -Fq 'openclaw-skill-auto-tuner-latest.json' "$f"
          grep -Fq 'gh-issue-close-on-recovery.cjs' "$f"
          grep -Fq 'gh-issue-dedupe-or-create.cjs' "$f"
          grep -Fq 'actions/upload-artifact@' "$f"
          echo "ok: $f"
