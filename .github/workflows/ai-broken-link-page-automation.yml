name: AI Broken Link & Page Automation

permissions:
  contents: write

concurrency:
  group: ai-broken-link-page
  cancel-in-progress: false

on:
  schedule:
    - cron: '0 7 * * 2,5'
  workflow_dispatch:
    inputs:
      create_pages:
        description: 'Create missing pages via LLM'
        required: false
        default: false
        type: boolean

jobs:
  broken-link-audit:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    env:
      NEXT_TELEMETRY_DISABLED: "1"
    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 1
          token: ${{ github.token }}

      - name: Setup Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version-file: '.nvmrc'
          cache: 'npm'
          cache-dependency-path: package-lock.json

      - name: Install dependencies
        run: npm ci --prefer-offline --no-audit --fund=false

      - name: Run Broken Link Audit (codebase)
        id: audit
        run: |
          OUTPUT=$(node automation/ai-broken-link-page-automation.cjs audit 2>&1)
          echo "$OUTPUT" | tail -50
          echo "audit_output<<EOF" >> $GITHUB_OUTPUT
          echo "$OUTPUT" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

      - name: Run Site Link Audit (live)
        run: |
          npm run site:links:audit 2>&1 | tail -30

      - name: Run Broken Link Fixer
        if: github.event.inputs.create_pages == 'true'
        run: node automation/ai-broken-link-fixer.cjs run || true

      - name: Create Missing Pages (live site)
        if: github.event.inputs.create_pages == 'true'
        env:
          OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
        run: |
          node automation/ai-site-link-audit-automation.cjs run --create-pages || true

      - name: Create Missing Pages (codebase)
        if: github.event.inputs.create_pages == 'true'
        env:
          OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
        run: |
          node automation/ai-broken-link-page-automation.cjs run || true

      - name: Commit and push fixes
        if: github.event.inputs.create_pages == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          if [ -z "$(git status --porcelain)" ]; then
            echo "No changes to commit."
            exit 0
          fi
          git add -A
          bash scripts/automation/commit-and-push-main.sh "chore(app): fix broken links and create missing pages [automation]"

      - name: Upload audit artifact
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: broken-link-audit-${{ github.run_id }}
          path: automation/reports/
          if-no-files-found: ignore
          retention-days: 14
