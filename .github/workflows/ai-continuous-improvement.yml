name: AI Continuous Improvement Agent

permissions:
  contents: write
  issues: write

concurrency:
  group: autonomous-main-writer
  cancel-in-progress: false

on:
  schedule:
    - cron: '0 8 * * 1-5'
  workflow_dispatch:
    inputs:
      mode:
        description: 'Run mode'
        required: false
        default: 'run'
        type: choice
        options:
          - run
          - analyze
      priority:
        description: 'Priority mode'
        required: false
        default: 'all'
        type: choice
        options:
          - critical
          - high
          - medium
          - low
          - all
      scope:
        description: 'Improvement scope (comma-separated categories: linting,types,security,build,accessibility,seo,quality,performance,deadcode)'
        required: false
        default: 'all'
        type: string

jobs:
  continuous-improvement:
    runs-on: ubuntu-latest
    timeout-minutes: 45
    env:
      NEXT_TELEMETRY_DISABLED: "1"
    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 1
          token: ${{ github.token }}

      - name: Setup Node.js
        uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6.3.0
        with:
          node-version-file: '.nvmrc'
          cache: 'npm'
          cache-dependency-path: package-lock.json

      - name: Install dependencies
        run: npm ci --prefer-offline --no-audit --fund=false

      - name: Configure Git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

      - name: Run AI Continuous Improvement Agent
        env:
          GH_TOKEN: ${{ github.token }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          AUTO_COMMIT: 'true'
          AUTO_PUSH: 'false'
          MAX_FIXES_PER_RUN: '10'
          PRIORITY_MODE: ${{ inputs.priority || 'all' }}
          IMPROVEMENT_SCOPE: ${{ inputs.scope || 'all' }}
          INPUT_MODE: ${{ inputs.mode || 'run' }}
        run: node automation/ai-continuous-improvement-agent.cjs "$INPUT_MODE"

      - name: Upload report artifact
        if: always()
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7.0.0
        with:
          name: continuous-improvement-report-${{ github.run_id }}
          path: |
            automation/reports/acia-latest-report.json
            automation/logs/ai-continuous-improvement.log
          if-no-files-found: ignore
          retention-days: 14

      - name: Push changes
        if: success()
        run: |
          if [[ -z "$(git status --porcelain)" ]]; then
            echo "No changes to push"
            exit 0
          fi
          git fetch origin main --depth=1
          if ! git rebase origin/main; then
            echo "::warning::Rebase conflict — skipping push."
            git rebase --abort || true
            exit 0
          fi
          bash scripts/automation/push-main-with-retry.sh
