name: AI Experiences Health

on:
  schedule:
    - cron: '15 * * * *' # Hourly at minute 15, away from the top-of-hour crowd
  workflow_dispatch: {}

permissions:
  contents: read

concurrency:
  group: ai-ai-experiences-health
  cancel-in-progress: false

jobs:
  experiences-health:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    env:
      NEXT_TELEMETRY_DISABLED: "1"
    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 1

      - name: Setup Node
        uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6.3.0
        with:
          node-version-file: '.nvmrc'
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Install dependencies
        run: npm ci --prefer-offline --no-audit --fund=false

      - name: Run AI experiences health check
        run: npm run app:ai-experiences-health

      - name: Upload experiences health report
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: ai-experiences-health-${{ github.run_id }}
          path: |
            automation/reports/ai-experiences-health-latest.json
            automation/logs/ai-experiences-health.log
          if-no-files-found: ignore
          retention-days: 14

