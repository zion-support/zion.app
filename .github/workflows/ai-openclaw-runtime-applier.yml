name: AI Openclaw Runtime Applier

permissions:
  contents: read
  issues: write

concurrency:
  group: ai-openclaw-runtime-applier
  cancel-in-progress: false

on:
  schedule:
    - cron: '25 */6 * * *'
  workflow_dispatch:

jobs:
  apply-runtime:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Setup Node.js
        uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6.3.0
        with:
          node-version-file: '.nvmrc'
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Install dependencies
        run: npm ci --prefer-offline --no-audit --fund=false

      - name: Refresh tuner inputs
        run: |
          npm run openclaw:skills:audit
          npm run openclaw:skills:tune

      - name: Apply Openclaw runtime recommendation
        run: npm run openclaw:runtime:apply

      - name: Upload runtime applier artifacts
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: openclaw-runtime-applier-${{ github.run_id }}
          path: |
            automation/reports/openclaw-skill-auto-tuner-latest.json
            automation/reports/openclaw-runtime-applier-latest.json
            automation/reports/openclaw-runtime-overrides.json
            automation/reports/openclaw-runtime-overrides-history.json
          if-no-files-found: ignore
          retention-days: 30

      - name: Escalate skipped runtime applications
        if: always()
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          report="automation/reports/openclaw-runtime-applier-latest.json"
          [ -f "$report" ] || exit 0
          status=$(node -e "const fs=require('fs');const j=JSON.parse(fs.readFileSync('$report','utf8'));console.log(j.status||'unknown')")
          mode=$(node -e "const fs=require('fs');const j=JSON.parse(fs.readFileSync('$report','utf8'));console.log(j.mode||'unknown')")
          if [ "$status" = "applied" ] || [ "$status" = "no-change" ]; then
            export ISSUE_FINGERPRINT="openclaw-runtime-applier-skipped"
            export CLOSE_COMMENT="Auto-closing: Openclaw runtime applier resumed healthy apply/no-change state."
            node scripts/automation/gh-issue-close-on-recovery.cjs || true
            exit 0
          fi
          body_file="openclaw-runtime-applier.md"
          {
            echo "## Openclaw runtime applier skipped recommendation"
            echo ""
            echo "- Workflow run: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
            echo "- Mode: ${mode}"
            echo "- Status: ${status}"
            echo "- Report: \`automation/reports/openclaw-runtime-applier-latest.json\`"
            echo ""
            node -e "const fs=require('fs');const j=JSON.parse(fs.readFileSync('$report','utf8'));console.log('### Before');console.log('- frequencySeconds: '+(j.before?.frequencySeconds??'n/a'));console.log('- maxParallel: '+(j.before?.maxParallel??'n/a'));console.log('');console.log('### After');console.log('- frequencySeconds: '+(j.after?.frequencySeconds??'n/a'));console.log('- maxParallel: '+(j.after?.maxParallel??'n/a'));"
          } > "$body_file"
          export ISSUE_TITLE="Openclaw runtime applier skipped recommendation"
          export ISSUE_BODY_FILE="$body_file"
          export ISSUE_LABELS="automation,openclaw,reliability"
          export ISSUE_FINGERPRINT="openclaw-runtime-applier-skipped"
          node scripts/automation/gh-issue-dedupe-or-create.cjs || true
          rm -f "$body_file"
