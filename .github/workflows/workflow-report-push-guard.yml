name: Workflow report push guard

permissions:
  contents: read

on:
  pull_request:
    paths:
      - ".github/workflows/**/*.yml"
      - ".github/workflows/**/*.yaml"
      - "scripts/automation/run-workflow-grep-guards.sh"
      - "scripts/automation/commit-and-push-main.sh"
      - "scripts/automation/push-main-with-retry.sh"
      - "package.json"
  push:
    branches: [main]
    paths:
      - ".github/workflows/**/*.yml"
      - ".github/workflows/**/*.yaml"
      - "scripts/automation/run-workflow-grep-guards.sh"
      - "scripts/automation/commit-and-push-main.sh"
      - "scripts/automation/push-main-with-retry.sh"
      - "package.json"
  workflow_dispatch:

jobs:
  check-push-guards:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Push policy (no raw push, concurrency) + grep tail
        run: bash scripts/automation/run-workflow-grep-guards.sh --push
