name: AI Netlify Playwright smoke

permissions:
  contents: read

on:
  workflow_dispatch:
  schedule:
    - cron: '45 */3 * * *'

concurrency:
  group: ai-netlify-playwright-smoke
  cancel-in-progress: false

jobs:
  smoke:
    runs-on: ubuntu-latest
    timeout-minutes: 45
    env:
      NEXT_TELEMETRY_DISABLED: '1'
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Setup Node.js
        uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6.3.0
        with:
          node-version-file: '.nvmrc'
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Install dependencies
        run: npm ci --prefer-offline --no-audit --fund=false

      - name: Install Playwright Chromium
        run: npx playwright install chromium --with-deps

      - name: Netlify deploy removed (migrated to GitHub Pages)
        if: false
        env:
          NETLIFY_PLAYWRIGHT_FAIL_ON_ERROR: '0'
          NETLIFY_PLAYWRIGHT_MAX_ROUTES: '6'
        run: npm run smoke:netlify:playwright

      - name: Upload Playwright smoke report
        if: always()
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7.0.0
        with:
          name: netlify-playwright-smoke-${{ github.run_id }}
          path: automation/reports/netlify-playwright-smoke-latest.json
          if-no-files-found: ignore
          retention-days: 14
