name: Deploy to GitHub Pages
on:
  push:
    branches:
    - main
  workflow_dispatch:
permissions:
  contents: read
  pages: write
  id-token: write
concurrency:
  group: pages-${{ github.sha }}
  cancel-in-progress: false
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v6
    - uses: actions/setup-node@v6
      with:
        node-version: '20'
        cache: npm
    - run: npm ci
    - run: npm run build
    - uses: actions/configure-pages@v4
      with:
        enablement: true
    - uses: actions/upload-pages-artifact@v3
      with:
        path: ./out
    timeout-minutes: 25
  deploy:
    environment:
      name: github-pages
    needs: build
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
    - uses: actions/deploy-pages@v4
