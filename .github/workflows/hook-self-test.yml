name: Hook Self-Test
'on':
  workflow_dispatch:
    inputs:
      hook:
        description: 'Hook test target'
        required: false
        default: 'app/hooks/__tests__/useAutoJsonLdPage.self-test.cjs'
        type: string

jobs:
  self-test:
    runs-on: ubuntu-latest
    defaults:
      run:
        shell: bash
    steps:
      - name: 'checkout'
        uses: actions/checkout@v4
      - name: 'run self-test'
        run: |
          set -euo pipefail
          node "${{ inputs.hook || 'app/hooks/__tests__/useAutoJsonLdPage.self-test.cjs' }}"
