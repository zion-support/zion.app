name: AI Weekly Launch Digest

permissions:
  contents: read

on:
  schedule:
    - cron: '30 13 * * 1'
  workflow_dispatch:

jobs:
  launch-digest:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    env:
      NEXT_TELEMETRY_DISABLED: '1'
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Setup Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version-file: '.nvmrc'
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Install dependencies
        run: npm ci --prefer-offline --no-audit --fund=false

      - name: Generate AI launch digest
        run: node automation/generate-ai-launch-digest.cjs

      - name: Upload digest artifacts
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: ai-launch-digest-${{ github.run_id }}
          path: |
            automation/reports/ai-launch-digest-latest.json
            automation/reports/ai-launch-digest-latest.md
          if-no-files-found: error

