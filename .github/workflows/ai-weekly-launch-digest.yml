name: AI Weekly Launch Digest

permissions:
  contents: read

on:
  schedule:
    - cron: '30 13 * * 1'
  workflow_dispatch:

jobs:
  launch-digest:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    env:
      NEXT_TELEMETRY_DISABLED: '1'
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Setup Node.js
        uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6.3.0
        with:
          node-version-file: '.nvmrc'
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Install dependencies
        run: npm ci --prefer-offline --no-audit --fund=false

      - name: Generate AI launch digest
        run: node automation/generate-ai-launch-digest.cjs

      - name: Upload digest artifacts
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7.0.0
        with:
          name: ai-launch-digest-${{ github.run_id }}
          path: |
            automation/reports/ai-launch-digest-latest.json
            automation/reports/ai-launch-digest-latest.md
          if-no-files-found: error

