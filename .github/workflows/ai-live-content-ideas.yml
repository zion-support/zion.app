# AI Live Content Ideas
# Live-site-driven content: fetch ziontechgroup.com, run content-audit-ideas (LLM), then ultra-fast pipeline
# so blog/topics come from live site gaps. Mon/Wed/Fri 5 UTC; workflow_dispatch.
# Uploads content-audit-ideas report as artifact. Commit + push + deploy.

name: AI Live Content Ideas

concurrency:
  group: autonomous-main-writer
  cancel-in-progress: false

permissions:
  contents: write

on:
  schedule:
    - cron: '0 5 * * 1,3,5'
  workflow_dispatch:
    inputs:
      max_blog_posts:
        description: 'Max blog posts (default 8)'
        required: false
        default: '8'
      max_product_pages:
        description: 'New product pages (default 2)'
        required: false
        default: '2'
      max_industry_pages:
        description: 'Industry solution pages (default 3)'
        required: false
        default: '3'
      trigger_deploy:
        description: 'Trigger deploy after commit (GitHub Pages)'
        required: false
        default: true
        type: boolean

jobs:
  live-content-ideas:
    runs-on: ubuntu-latest
    timeout-minutes: 45
    env:
      NEXT_TELEMETRY_DISABLED: "1"
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          token: ${{ github.token }}

      - uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6.3.0
        with:
          node-version-file: '.nvmrc'
          cache: 'npm'
          cache-dependency-path: package-lock.json

      - name: Restore content runtime cache
        uses: actions/cache@668228422ae6a00e4ad889ee87cd7109ec5666a7 # v5.0.4
        with:
          path: |
            automation/reports/.runtime
          key: content-runtime-${{ runner.os }}-${{ hashFiles('automation/openrouter-content-generator.cjs') }}
          restore-keys: |
            content-runtime-${{ runner.os }}-

      - name: Install dependencies
        run: npm ci --prefer-offline --no-audit --fund=false

      - name: Writer queue guard (wait)
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          QUEUE_GUARD_BRANCH: main
          QUEUE_GUARD_WAIT_MAX_MINUTES: "40"
          QUEUE_GUARD_WAIT_POLL_SECONDS: "30"
        run: node scripts/automation/autonomous-writer-queue-guard.cjs --strict --wait

      - name: Run content audit ideas (live site)
        env:
          OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
          OPENROUTER_MODEL: openrouter/free
        run: node automation/ai-content-audit-ideas-agent.cjs

      - name: Run ultra-fast content pipeline (uses audit ideas for blog)
        env:
          OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
          OPENROUTER_MODEL: openrouter/free
          AUTO_COMMIT: "0"
          MAX_BLOG_POSTS: ${{ github.event.inputs.max_blog_posts || '8' }}
          MAX_PRODUCT_PAGES: ${{ github.event.inputs.max_product_pages || '2' }}
          MAX_INDUSTRY_PAGES: ${{ github.event.inputs.max_industry_pages || '3' }}
          MAX_TEMPLATE_BLOG: "4"
          MAX_TEMPLATE_CASE_STUDIES: "4"
        run: node automation/ai-ultra-fast-content-pipeline.cjs

      - name: Upload content audit ideas report
        if: always()
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7.0.0
        with:
          name: content-audit-ideas-report
          path: automation/reports/content-audit-ideas-latest.json
          if-no-files-found: ignore

      - name: Commit, push, and deploy
        env:
          TRIGGER_DEPLOY: ${{ github.event.inputs.trigger_deploy != 'false' && '1' || '' }}
#           NETLIFY_BUILD_HOOK removed (Netlify decommissioned → GitHub Pages)
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -A
          if ! git diff --staged --quiet; then
            bash scripts/automation/commit-and-push-main.sh "chore(content): live content ideas - audit ideas + ultra-fast pipeline"
            if false # Netlify build hook removed (migrated to GitHub Pages) && [ "$TRIGGER_DEPLOY" = "1" ]; then
              echo "# NO-OP: Netlify deploy removed (migrated to GitHub Pages)"
            fi
          fi
