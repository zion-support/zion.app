# AI Content Burst - Template-Only Maximum Velocity
# No LLM required. Runs template blog + case studies + industry pages in parallel.
# 11x daily for fastest possible content creation without API costs.

name: AI Content Burst

concurrency:
  group: autonomous-main-writer
  cancel-in-progress: false

permissions:
  contents: write

on:
  schedule:
    - cron: '0 3 * * *'
    - cron: '0 5 * * *'
    - cron: '0 7 * * *'
    - cron: '0 9 * * *'
    - cron: '0 11 * * *'
    - cron: '0 13 * * *'
    - cron: '0 15 * * *'
    - cron: '0 17 * * *'
    - cron: '0 19 * * *'
    - cron: '0 21 * * *'
    - cron: '0 23 * * *'
  workflow_dispatch:
    inputs:
      max_template_blog:
        description: 'Template blog posts (default 12)'
        required: false
        default: '12'
      max_template_case_studies:
        description: 'Template case studies (default 12)'
        required: false
        default: '12'
      max_industry_pages:
        description: 'Industry solution pages (default 6)'
        required: false
        default: '6'
      max_product_pages:
        description: 'New Zion AI product pages (default 4)'
        required: false
        default: '4'
      trigger_deploy:
        description: 'Trigger deploy after commit (GitHub Pages)'
        required: false
        default: true
        type: boolean

jobs:
  burst:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    env:
      NEXT_TELEMETRY_DISABLED: "1"
      NODE_OPTIONS: '--max-old-space-size=4096'
      NEXT_BUILD_WORKER_COUNT: 1
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          token: ${{ github.token }}

      - uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6.3.0
        with:
          node-version-file: '.nvmrc'
          cache: 'npm'
          cache-dependency-path: package-lock.json

      - name: Install dependencies
        run: npm ci --prefer-offline --no-audit --fund=false

      - name: Run content burst (template-only, no LLM)
        env:
#           NETLIFY_BUILD_HOOK removed (Netlify decommissioned → GitHub Pages)
          MAX_TEMPLATE_BLOG: ${{ github.event.inputs.max_template_blog || '12' }}
          MAX_TEMPLATE_CASE_STUDIES: ${{ github.event.inputs.max_template_case_studies || '12' }}
          MAX_INDUSTRY_PAGES: ${{ github.event.inputs.max_industry_pages || '6' }}
          MAX_PRODUCT_PAGES: ${{ github.event.inputs.max_product_pages || '4' }}
          MAX_ADD: "8"
        run: node automation/ai-content-burst-agent.cjs

      - name: Validate build (catch content errors before push)
        run: |
          set -euo pipefail
          npm run rsc:guard
          npm run build

      - name: Commit, push, and deploy
        env:
          TRIGGER_DEPLOY: ${{ github.event.inputs.trigger_deploy != 'false' && '1' || '' }}
#           NETLIFY_BUILD_HOOK removed (Netlify decommissioned → GitHub Pages)
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -A
          if ! git diff --staged --quiet; then
            git commit -m "chore(content): content burst - template blog + case studies + industry pages"
            git push
            if false # Netlify build hook removed (migrated to GitHub Pages) && [ "$TRIGGER_DEPLOY" = "1" ]; then
              echo "# NO-OP: Netlify deploy removed (migrated to GitHub Pages)"
            fi
          fi