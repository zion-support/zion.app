# Ensures ai-autonomy-intelligence-planner-daily.yml keeps schedule/issue/artifact anchors (grep-only).
name: ai autonomy intelligence planner workflow smoke (weekly)

permissions:
  contents: read

on:
  schedule:
    - cron: '20 12 * * 3' # Wednesdays 12:20 UTC
  workflow_dispatch:

concurrency:
  group: ai-autonomy-intelligence-planner-daily-smoke-weekly
  cancel-in-progress: true

jobs:
  autonomy-planner-anchors:
    runs-on: ubuntu-latest
    timeout-minutes: 2
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: ai-autonomy-intelligence-planner-daily.yml anchors
        run: |
          set -euo pipefail
          f=.github/workflows/ai-autonomy-intelligence-planner-daily.yml
          test -f "$f"
          test -s "$f"
          grep -Fq 'name: AI autonomy intelligence planner' "$f"
          grep -Fq 'group: ai-autonomy-intelligence-planner' "$f"
          grep -Fq 'cancel-in-progress: false' "$f"
          grep -Fq "cron: '40 8 * * *'" "$f"
          grep -Fq 'npm run autonomy:intelligence:plan' "$f"
          grep -Fq 'gh-issue-dedupe-or-create.cjs' "$f"
          grep -Fq 'gh-issue-close-on-recovery.cjs' "$f"
          grep -Fq 'actions/upload-artifact@' "$f"
          grep -Fq 'autonomy-intelligence-plan-' "$f"
          grep -Fq 'GH_TOKEN:' "$f" && grep -Fq 'github.token' "$f"
          echo "ok: $f"
