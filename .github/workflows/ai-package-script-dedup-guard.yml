name: AI Package Script Dedup Guard

permissions:
  contents: read
  issues: write

concurrency:
  group: ai-package-script-dedup-guard
  cancel-in-progress: false

on:
  schedule:
    - cron: '25 14 * * 1-5'
  workflow_dispatch:

jobs:
  dedup-guard:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Setup Node.js
        uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6.3.0
        with:
          node-version-file: '.nvmrc'
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Install dependencies
        run: npm ci --prefer-offline --no-audit --fund=false

      - name: Check duplicate package scripts
        id: dedup_check
        continue-on-error: true
        run: npm run package:scripts:dedup-check

      - name: Upload dedup report artifact
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: package-script-dedup-${{ github.run_id }}
          path: automation/reports/package-script-duplicates-latest.json
          if-no-files-found: error
          retention-days: 30

      - name: Open issue if duplicates are found
        if: steps.dedup_check.outcome != 'success'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          report="automation/reports/package-script-duplicates-latest.json"
          [ -f "$report" ] || exit 0
          dup_count=$(node -e "const fs=require('fs');const r=JSON.parse(fs.readFileSync('$report','utf8'));console.log(Number(r.duplicateCount||0))")
          [ "$dup_count" -gt 0 ] || exit 0
          body_file="package-script-dedup-issue.md"
          {
            echo "## Duplicate npm script keys detected"
            echo ""
            echo "- Repository: \`${{ github.repository }}\`"
            echo "- Workflow run: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
            echo "- Duplicate key count: ${dup_count}"
            echo ""
            echo "### Duplicate keys"
            node -e "const fs=require('fs');const r=JSON.parse(fs.readFileSync('$report','utf8'));for(const key of (r.duplicates||[])){console.log('- `'+key+'`')}"
            echo ""
            echo "Remove duplicate script keys from \`package.json\` to avoid silent script shadowing."
          } > "$body_file"
          export ISSUE_TITLE="Duplicate npm scripts detected"
          export ISSUE_BODY_FILE="$body_file"
          export ISSUE_LABELS="bug"
          export ISSUE_FINGERPRINT="package-script-dedup"
          export COOLDOWN_HOURS="12"
          node scripts/automation/gh-issue-dedupe-or-create.cjs || true

      - name: Fail workflow on duplicate keys
        if: steps.dedup_check.outcome != 'success'
        run: |
          echo "::error::Duplicate npm script keys detected. See artifact and issue for details."
          exit 1
