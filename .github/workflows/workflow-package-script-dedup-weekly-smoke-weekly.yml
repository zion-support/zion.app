# Ensures workflow-package-script-dedup-weekly.yml keeps Tuesday schedule + dedupe checker (grep-only).
name: package script dedup weekly smoke (weekly)
permissions:
  contents: read
on:
  schedule:
    - cron: '32 10 * * 4' # Thursdays 10:32 UTC
  workflow_dispatch:
concurrency:
  group: workflow-package-script-dedup-weekly-smoke-weekly
  cancel-in-progress: true
jobs:
  dedup-weekly:
    runs-on: ubuntu-latest
    timeout-minutes: 2
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - name: workflow-package-script-dedup-weekly.yml anchors
        run: |
          set -euo pipefail
          f=.github/workflows/workflow-package-script-dedup-weekly.yml
          test -f "$f"
          test -s "$f"
          grep -Fq 'name: Package script dedup check (weekly)' "$f"
          grep -Fq "cron: '28 6 * * 2'" "$f"
          grep -Fq 'group: workflow-package-script-dedup-weekly' "$f"
          grep -Fq 'check-package-script-duplicates.cjs' "$f"
          grep -Fq "node-version-file: '.nvmrc'" "$f"
          echo "ok: $f"
