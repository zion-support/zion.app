# Ensures reusable-workflow-ci.yml keeps core workflow_call + validate/contracts anchors (grep-only).

name: reusable workflow CI smoke (weekly)

permissions:
  contents: read

on:
  schedule:
    - cron: '55 7 * * 2' # Tuesdays 07:55 UTC
  workflow_dispatch:

concurrency:
  group: workflow-reusable-ci-smoke-weekly
  cancel-in-progress: true

jobs:
  reusable-ci:
    runs-on: ubuntu-latest
    timeout-minutes: 2
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: reusable-workflow-ci.yml anchors
        run: |
          set -euo pipefail
          f=.github/workflows/reusable-workflow-ci.yml
          test -f "$f"
          test -s "$f"
          grep -Fq 'name: Reusable workflow CI' "$f"
          grep -Fq 'workflow_call:' "$f"
          grep -Fq 'run_contracts:' "$f"
          grep -Fq "type: boolean" "$f"
          grep -Fq "node-version-file: '.nvmrc'" "$f"
          grep -Fq 'npm run workflows:validate:light' "$f"
          grep -Fq 'npm run workflows:contracts:node' "$f"
          echo "ok: $f"
