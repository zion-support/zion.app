name: Dependency Review

permissions:
  contents: read
  pull-requests: write

on:
  pull_request:
    branches: [main]

concurrency:
  group: dependency-review-${{ github.ref }}
  cancel-in-progress: true

jobs:
  dependency-review:
    name: Review Dependencies
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Dependency Review
        uses: actions/dependency-review-action@a1d282b36b6f3519aa1f3fc636f609c47dddb294 # v4
        with:
          fail-on-severity: high
          comment-summary-in-pr: always
          deny-licenses: GPL-3.0, AGPL-3.0

      - name: Summary
        if: always()
        run: |
          echo "## Dependency Review" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "Scanned dependency changes for:" >> "$GITHUB_STEP_SUMMARY"
          echo "- Known vulnerabilities (fail on **high** severity)" >> "$GITHUB_STEP_SUMMARY"
          echo "- Restrictive licenses (GPL-3.0, AGPL-3.0)" >> "$GITHUB_STEP_SUMMARY"
