permissions:
  contents: read
name: "Autonomous Bundle Split Analyzer"

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    - cron: '0 17 * * 2'  # Weekly Tuesday 17:00 UTC
  workflow_dispatch:

jobs:
  bundle-split:
    name: Bundle Split Analyzer
    runs-on: ubuntu-latest
    permissions:
      contents: read
      issues: write
      pull-requests: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build site (generate stats)
        run: npm run build

      - name: Run Bundle Split Analyzer
        id: analyzer
        continue-on-error: true
        env:
          GITHUB_SHA: ${{ github.sha }}
          GITHUB_REF: ${{ github.ref }}
        run: |
          node automation/bundle-split-analyzer.cjs > /tmp/bundle-split-output.txt || true
          echo "exit_code=$?" >> $GITHUB_OUTPUT

      - name: Upload report artifact
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: bundle-split-report
          path: |
            .hermes/memory/bundle-split/latest-report.json
            .hermes/memory/bundle-split/baseline-stats.json
          retention-days: 7

      - name: Check for warnings
        run: |
          if [ "${{ steps.analyzer.outputs.exit_code }}" -ne 0 ]; then
            echo "Bundle split warnings detected"
            exit 1
          fi

      - name: Comment on PR with recommendations
        if: github.event_name == 'pull_request' && failure()
        uses: actions/github-script@v9
        with:
          script: |
            const fs = require('fs');
            const reportPath = '.hermes/memory/bundle-split/latest-report.json';
            let body = '📦 **Bundle Split Analysis — Recommendations**\n\n';
            try {
              const data = JSON.parse(fs.readFileSync(reportPath, 'utf8'));
              if (data.warnings === 0) {
                body += 'All route bundles within thresholds. Great job!';
              } else {
                body += `Found **${data.warnings}** route(s) with large bundles:\n\n`;
                for (const route of data.routes.filter(r => r.warnings.length)) {
                  body += `### ${route.route} (${route.gzipTotalKB}KB gzipped)\n`;
                  if (route.initial) body += `_Initial chunk — critical for LCP_\n`;
                  for (const rec of route.recommendations) {
                    body += `- ${rec}\n`;
                  }
                  body += '\n';
                }
                body += '💡 Consider applying these dynamic import optimizations to improve initial load performance.';
              }
            } catch (e) {
              body += 'Could not parse report. Check workflow logs.';
            }
            github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body
            });

      - name: Open GitHub issue on main branch regressions
        if: github.event_name == 'push' && failure() && github.ref == 'refs/heads/main'
        uses: actions/github-script@v9
        with:
          script: |
            const fs = require('fs');
            const reportPath = '.hermes/memory/bundle-split/latest-report.json';
            const title = '📦 Bundle Split Regressions on Main';
            let body = '**Route bundle sizes have grown.** Consider code splitting to improve initial page load.\n\n';
            try {
              const data = JSON.parse(fs.readFileSync(reportPath, 'utf8'));
              body += `**Routes exceeding thresholds:** ${data.warnings}\n\n`;
              for (const route of data.routes.filter(r => r.warnings.length)) {
                body += `- **${route.route}** — ${route.gzipTotalKB}KB gzipped ${route.initial ? '(initial chunk)' : ''}\n`;
                for (const rec of route.recommendations) {
                  body += `  > ${rec}\n`;
                }
                body += '\n';
              }
            } catch (e) {
              body += 'Could not parse full report; see artifact.\n';
            }
            body += `\n*Committed by: ${context.payload.committer?.name || 'unknown'}*\n`;
            body += `*Commit: ${context.payload.headCommit?.id?.slice(0, 7) || 'N/A'}*\n`;

            const existing = await github.rest.issues.listForRepo({
              owner: context.repo.owner,
              repo: context.repo.repo,
              labels: ['bundle-split', 'performance'],
              state: 'open'
            });
            const already = existing.data.find((i: any) => i.title === title);
            if (!already) {
              await github.rest.issues.create({
                owner: context.repo.owner,
                repo: context.repo.repo,
                title,
                body,
                labels: ['bundle-split', 'performance', 'autonomous']
              });
            }

      - name: Weekly Telegram Digest (only on schedule & success)
        if: success() && github.event_name == 'schedule'
        run: |
          node automation/notify-telegram.js "✅ Weekly bundle split scan complete — $(cat .hermes/memory/bundle-split/latest-report.json | jq -r '.routes | map(select(.warnings | length > 0)) | length') routes need attention."

      - name: Notify Telegram on failure
        if: failure()
        run: |
          node automation/notify-telegram.js "🚨 Bundle split analyzer found large route bundles. Check GitHub issues for details."
