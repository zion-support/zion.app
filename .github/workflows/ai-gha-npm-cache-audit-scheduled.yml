name: AI GHA npm cache audit

permissions:
  contents: read

concurrency:
  group: ai-gha-npm-cache-audit
  cancel-in-progress: false

on:
  workflow_dispatch:
  schedule:
    - cron: '35 9 * * 1'

jobs:
  audit:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Setup Node.js
        uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6.3.0
        with:
          node-version-file: '.nvmrc'
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Install dependencies
        run: npm ci --prefer-offline --no-audit --fund=false

      - name: Audit workflows for setup-node npm cache gaps
        run: node automation/gha-npm-cache-audit.cjs

      - name: Upload audit report
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7.0.0
        with:
          name: gha-npm-cache-audit-${{ github.run_id }}
          path: automation/reports/gha-npm-cache-audit-latest.json
          if-no-files-found: ignore
          retention-days: 90
