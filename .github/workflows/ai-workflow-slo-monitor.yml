name: AI Workflow SLO Monitor

permissions:
  contents: read
  actions: read
  issues: write

concurrency:
  group: ai-workflow-slo-monitor
  cancel-in-progress: false

on:
  schedule:
    - cron: '20 13 * * 1'
  workflow_dispatch:

jobs:
  slo-monitor:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    env:
      NEXT_TELEMETRY_DISABLED: "1"
      SLO_LOOKBACK_DAYS: "14"
      SLO_BRANCH: main
      SLO_MIN_RUNS_FOR_ALERT: "5"
      SLO_FAILURE_RATE_ALERT: "0.15"
      SLO_P95_MINUTES_ALERT: "20"
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Setup Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version-file: '.nvmrc'
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Install dependencies
        run: npm ci --prefer-offline --no-audit --fund=false

      - name: Generate workflow SLO report
        env:
          GITHUB_TOKEN: ${{ github.token }}
        run: node automation/ai-workflow-slo-monitor.cjs

      - name: Upload workflow SLO artifacts
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: workflow-slo-${{ github.run_id }}
          path: |
            automation/reports/workflow-slo-latest.json
            automation/reports/workflow-slo-latest.md
          if-no-files-found: error
          retention-days: 30

      - name: Open issue on SLO regressions
        if: always()
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          report="automation/reports/workflow-slo-latest.json"
          [ -f "$report" ] || exit 0
          flagged=$(node -e "const fs=require('fs');const r=JSON.parse(fs.readFileSync('$report','utf8'));console.log((r.flagged||[]).length)")
          if [ "$flagged" = "0" ]; then
            echo "No SLO regressions detected."
            export ISSUE_FINGERPRINT="workflow-slo-regressions"
            export CLOSE_COMMENT="Auto-closing: workflow SLO monitor reports no regressions."
            node scripts/automation/gh-issue-close-on-recovery.cjs || true
            exit 0
          fi
          body_file="workflow-slo-regressions.md"
          {
            echo "## Workflow SLO regressions"
            echo ""
            echo "- Flagged workflow count: **${flagged}**"
            echo "- Repository: \`${{ github.repository }}\`"
            echo "- Workflow run: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
            echo "- Thresholds: failure >= 15% or p95 >= 20 min (min 5 runs)"
            echo ""
            echo "### Flagged workflows"
            node -e "const fs=require('fs');const r=JSON.parse(fs.readFileSync('$report','utf8'));for(const wf of (r.flagged||[])){console.log('- '+wf.name+' (failure '+(wf.failureRate*100).toFixed(1)+'%, p95 '+wf.p95Minutes.toFixed(2)+' min, runs '+wf.totalRuns+')')}"
          } > "$body_file"
          export ISSUE_TITLE="Workflow SLO regressions detected"
          export ISSUE_BODY_FILE="$body_file"
          export ISSUE_LABELS="bug"
          export ISSUE_FINGERPRINT="workflow-slo-regressions"
          export COOLDOWN_HOURS="12"
          node scripts/automation/gh-issue-dedupe-or-create.cjs || true
