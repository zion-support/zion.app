# AI Content Maximum Velocity
# One daily "big" content run with elevated limits: ultra-fast pipeline with more blog posts,
# product pages, industry pages, and template content. Pushes to main and triggers deploy.
# Runs 10 UTC daily; use workflow_dispatch for manual run.

name: AI Content Maximum Velocity

concurrency:
  group: autonomous-main-writer
  cancel-in-progress: false

permissions:
  contents: write
  actions: read

on:
  schedule:
    - cron: '0 10 * * *'
  workflow_dispatch:
    inputs:
      max_blog_posts:
        description: 'Max blog posts (default 14)'
        required: false
        default: '14'
      max_product_pages:
        description: 'New product pages (default 5)'
        required: false
        default: '5'
      max_industry_pages:
        description: 'New industry solution pages (default 5)'
        required: false
        default: '5'
      max_template_blog:
        description: 'Template blog posts (default 8)'
        required: false
        default: '8'
      max_template_case_studies:
        description: 'Template case studies (default 8)'
        required: false
        default: '8'
      trigger_deploy:
        description: 'Trigger deploy after commit (GitHub Pages)'
        required: false
        default: true
        type: boolean

jobs:
  maximum-velocity:
    runs-on: ubuntu-latest
    timeout-minutes: 55
    env:
      NEXT_TELEMETRY_DISABLED: "1"
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          token: ${{ github.token }}

      - uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6.3.0
        with:
          node-version-file: '.nvmrc'
          cache: 'npm'
          cache-dependency-path: package-lock.json

      - name: Restore content runtime cache
        uses: actions/cache@668228422ae6a00e4ad889ee87cd7109ec5666a7 # v5.0.4
        with:
          path: |
            automation/reports/.runtime
          key: content-runtime-${{ runner.os }}-${{ hashFiles('automation/openrouter-content-generator.cjs') }}
          restore-keys: |
            content-runtime-${{ runner.os }}-

      - name: Install dependencies
        run: npm ci --prefer-offline --no-audit --fund=false

      - name: Writer queue guard (wait)
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          QUEUE_GUARD_BRANCH: main
          QUEUE_GUARD_WAIT_MAX_MINUTES: "50"
          QUEUE_GUARD_WAIT_POLL_SECONDS: "30"
        run: node scripts/automation/autonomous-writer-queue-guard.cjs --strict --wait

      - name: Run maximum velocity content pipeline
        env:
          OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
          OPENROUTER_MODEL: openrouter/free
          AUTO_COMMIT: "1"
          TRIGGER_DEPLOY: ${{ github.event.inputs.trigger_deploy != 'false' && '1' || '' }}
#           NETLIFY_BUILD_HOOK removed (Netlify decommissioned → GitHub Pages)
          MAX_BLOG_POSTS: ${{ github.event.inputs.max_blog_posts || '14' }}
          MAX_PRODUCT_PAGES: ${{ github.event.inputs.max_product_pages || '5' }}
          MAX_INDUSTRY_PAGES: ${{ github.event.inputs.max_industry_pages || '5' }}
          MAX_TEMPLATE_BLOG: ${{ github.event.inputs.max_template_blog || '8' }}
          MAX_TEMPLATE_CASE_STUDIES: ${{ github.event.inputs.max_template_case_studies || '8' }}
          MAX_CONCURRENCY: "12"
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          node automation/ai-ultra-fast-content-pipeline.cjs
          git add -A
          if git diff --staged --quiet; then
            exit 0
          fi
          bash scripts/automation/commit-and-push-main.sh "chore(content): maximum velocity - industry + blog + front page + products"
