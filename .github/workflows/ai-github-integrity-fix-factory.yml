name: AI GitHub integrity fix factory

permissions:
  contents: write
  issues: write

on:
  schedule:
    - cron: '*/10 * * * *'
  workflow_dispatch:

concurrency:
  group: ai-github-integrity-fix-factory
  cancel-in-progress: false

jobs:
  integrity-and-plan:
    runs-on: ubuntu-latest
    timeout-minutes: 12
    env:
      NEXT_TELEMETRY_DISABLED: "1"
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          token: ${{ github.token }}
          ref: main

      - name: Setup Node.js
        uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6.3.0
        with:
          node-version-file: '.nvmrc'
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Install dependencies
        run: npm ci --prefer-offline --no-audit --fund=false

      - name: GitHub Actions integrity audit
        env:
          GH_TOKEN: ${{ github.token }}
        run: node automation/github-actions-integrity-auditor.cjs

      - name: Build autonomous fix-factory queue
        env:
          GH_TOKEN: ${{ github.token }}
        run: node automation/autonomous-fix-factory-orchestrator.cjs

      - name: Upload integrity/factory artifacts
        if: always()
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7.0.0
        with:
          name: github-integrity-factory-${{ github.run_id }}
          path: |
            automation/reports/github-actions-integrity-audit-latest.json
            automation/reports/autonomous-fix-factory-plan-latest.json
            automation/reports/autonomous-fix-factory-plan-latest.md
            automation/reports/autonomous-fix-factory-queue.json
          if-no-files-found: ignore
          retention-days: 21

      - name: Commit report state
        env:
          GITHUB_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          for f in \
            automation/reports/github-actions-integrity-audit-latest.json \
            automation/reports/autonomous-fix-factory-plan-latest.json \
            automation/reports/autonomous-fix-factory-plan-latest.md \
            automation/reports/autonomous-fix-factory-queue.json
          do
            if [ -f "$f" ]; then
              git add "$f"
            fi
          done
          if git diff --staged --quiet; then
            echo "No integrity/factory report changes."
            exit 0
          fi
          bash scripts/automation/commit-and-push-main.sh "chore(reports): refresh github integrity fix-factory state"
