name: API Schema Validation

on:
  pull_request:
    branches: [main]
    paths:
      - 'app/api/**'
      - 'openapi/**'
      - ' automation/api-schema-validator.cjs'
      - '.github/workflows/api-schema-validation.yml'
  push:
    branches: [main]
    paths:
      - 'app/api/**'
      - 'openapi/**'
  workflow_dispatch:

permissions:
  contents: read
  pull-requests: write

jobs:
  schema-check:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Validate API schemas
        env:
          API_SCHEMA_API_DIR: app/api
          API_SCHEMA_OPENAPI_DIR: openapi
          API_SCHEMA_REQUIRE_REQUEST: ${{ secrets.API_SCHEMA_REQUIRE_REQUEST || 'true' }}
          API_SCHEMA_REQUIRE_RESPONSE: ${{ secrets.API_SCHEMA_REQUIRE_RESPONSE || 'true' }}
          API_SCHEMA_CHECK_OPENAPI: ${{ secrets.API_SCHEMA_CHECK_OPENAPI || 'false' }}
        run: node automation/api-schema-validator.cjs

      - name: Post PR comment on failure
        if: github.event_name == 'pull_request' && failure()
        uses: actions/github-script@v9
        with:
          script: |
            const fs = require('fs');
            let statePath = '.hermes/memory/api-schema/history.json';
            let comment = '🚨 **API Schema Validation Failed**\n\n';
            comment += 'One or more API routes are missing required Zod validation schemas. Please ensure each `route.ts` exports:\n';
            comment += '- `export const schema = z.object(...)` for request validation (or `requestSchema`)\n';
            comment += '- `export const responseSchema = z.object(...)` (or `outputSchema`) for response typing\n\n';
            try {
              const history = JSON.parse(fs.readFileSync(statePath, 'utf8'));
              const latest = history[history.length - 1];
              if (latest && latest.violations) {
                comment += '**Violations:**\n';
                latest.violations.forEach(v => {
                  comment += `- ${v}\n`;
                });
              }
            } catch (e) {
              comment += 'Could not load violation details.';
            }
            comment += '\n*See workflow logs for full details.*';
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: comment
            });

      - name: Notify Telegram on failure
        if: failure()
        run: |
          node automation/notify-telegram.js "⚠️ API Schema Validation failed on ${{ github.repository }} (PR #${{ github.event.pull_request.number || 'main push' }}). Check: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
