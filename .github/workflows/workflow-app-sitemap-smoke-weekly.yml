# Ensures app/sitemap.ts keeps static sitemap export + canonical site URL (grep-only).

name: app/sitemap.ts smoke (weekly)

permissions:
  contents: read

on:
  schedule:
    - cron: '53 7 * * 2' # Tuesdays 07:53 UTC
  workflow_dispatch:

concurrency:
  group: workflow-app-sitemap-smoke-weekly
  cancel-in-progress: true

jobs:
  sitemap:
    runs-on: ubuntu-latest
    timeout-minutes: 2
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: sitemap.ts static export shape
        run: |
          set -euo pipefail
          test -f app/sitemap.ts
          test -s app/sitemap.ts
          grep -Fq "export const dynamic = 'force-static'" app/sitemap.ts
          grep -Fq 'export default function sitemap' app/sitemap.ts
          grep -Fq 'MetadataRoute.Sitemap' app/sitemap.ts
          grep -Fq "const baseUrl = 'https://ziontechgroup.com'" app/sitemap.ts
          echo 'ok: app/sitemap.ts'
