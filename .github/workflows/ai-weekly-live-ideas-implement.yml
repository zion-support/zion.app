# Weekly Live Audit -> Ideas -> Implement
# Lightweight: live UX + system intel + conversion funnel -> evolution ideas -> backlog apply -> optional commit/deploy.
# Tue 8 UTC. Complements full evolution pipeline (Wed/Sat).

name: Weekly Live Ideas Implement

permissions:
  contents: write

on:
  schedule:
    - cron: '0 8 * * 2'
  workflow_dispatch:
    inputs:
      auto_commit:
        description: 'Commit and push changes to main'
        required: false
        default: true
        type: boolean
      trigger_deploy:
        description: 'Trigger Netlify deploy after push'
        required: false
        default: false
        type: boolean

concurrency:
  group: weekly-live-ideas-implement
  cancel-in-progress: false

jobs:
  live-ideas-implement:
    runs-on: ubuntu-latest
    timeout-minutes: 35
    env:
      NEXT_TELEMETRY_DISABLED: "1"
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          token: ${{ github.token }}

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version-file: '.nvmrc'
          cache: 'npm'
          cache-dependency-path: package-lock.json

      - name: Install dependencies
        run: npm ci --prefer-offline --no-audit --fund=false

      - name: Live Site UX Audit
        run: node automation/ai-live-site-ux-audit-agent.cjs

      - name: System Intelligence Audit
        run: node automation/ai-system-intelligence-audit-agent.cjs

      - name: Conversion Funnel Audit
        run: node automation/ai-conversion-funnel-audit-agent.cjs

      - name: Evolution ideas from audits
        run: node automation/ai-evolution-ideas-from-audits-agent.cjs

      - name: Evolution backlog apply
        env:
          AUTO_APPLY: '1'
          MAX_APPLY: '3'
        run: node automation/ai-evolution-backlog-implementor-agent.cjs

      - name: Configure git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Commit and push
        id: commit
        run: |
          git status
          if git diff --quiet automation/ app/ 2>/dev/null; then
            echo "No changes to commit."
            echo "committed=false" >> "$GITHUB_OUTPUT"
          else
            git add automation/ app/ 2>/dev/null || true
            if git diff --cached --quiet; then
              echo "committed=false" >> "$GITHUB_OUTPUT"
            else
              COMMIT_AND_PUSH_RECORD_OUTPUT=true bash scripts/automation/commit-and-push-main.sh "chore(app): weekly live audit ideas and backlog apply"
            fi
          fi

      - name: Deploy (GitHub Pages auto-deploy after push)
        if: steps.commit.outputs.committed == 'true'
        run: |
          echo "Deploy handled by GitHub Pages"

      - name: Upload reports
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: weekly-live-ideas-report
          path: automation/reports/live-site-ux-audit-latest.json
          if-no-files-found: ignore
          retention-days: 14
