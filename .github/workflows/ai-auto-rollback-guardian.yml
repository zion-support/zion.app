name: AI Auto Rollback Guardian

on:
  schedule:
    - cron: '*/15 * * * *'  # Every 15 minutes
  workflow_dispatch:

permissions:
  contents: read
  issues: write

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  rollback-guardian:
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm ci --prefer-offline --no-audit --fund=false

      - name: Run rollback guardian
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          NETLIFY_ROLLBACK_HOOK: ${{ secrets.NETLIFY_ROLLBACK_HOOK }}
        run: node scripts/run-rollback-guardian.cjs