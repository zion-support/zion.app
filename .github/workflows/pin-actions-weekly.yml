name: Pin Actions Weekly

permissions:
  contents: write
  actions: read

on:
  schedule:
    - cron: '0 2 * * 1'
  workflow_dispatch:

concurrency:
  group: pin-actions-weekly
  # Queue: this job commits and pushes to main; canceling mid-run can strand a half-done pin update.
  cancel-in-progress: false

jobs:
  main:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    env:
      NEXT_TELEMETRY_DISABLED: "1"
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          token: ${{ github.token }}

      - name: Setup Node
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version-file: '.nvmrc'
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Install dependencies
        run: npm ci --prefer-offline --no-audit --fund=false

      - name: Configure Git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

      - name: Run pin actions weekly
        run: npm run pin-actions

      - name: Push pinned actions
        run: |
          if [[ -z "$(git status --porcelain)" ]]; then
            echo "No changes to push"
            exit 0
          fi
          git add .github/workflows/
          bash scripts/automation/commit-and-push-main.sh "chore: pin actions to SHA digests"

      - name: Upload results
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        if: always()
        with:
          name: workflow-results-${{ github.run_id }}
          path: .github/workflows/
          retention-days: 7
