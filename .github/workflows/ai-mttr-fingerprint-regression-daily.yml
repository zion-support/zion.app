name: AI MTTR fingerprint regression guard (daily)

permissions:
  contents: write
  issues: write

concurrency:
  group: ai-mttr-fingerprint-regression-daily
  cancel-in-progress: false

on:
  schedule:
    - cron: '15 11 * * *'
  workflow_dispatch:

jobs:
  guard:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    env:
      NEXT_TELEMETRY_DISABLED: "1"
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          token: ${{ github.token }}
          ref: main

      - name: Setup Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version-file: '.nvmrc'
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Install dependencies
        run: npm ci --prefer-offline --no-audit --fund=false

      - name: Refresh automation issue index (with MTTR)
        env:
          GH_TOKEN: ${{ github.token }}
        run: node automation/generate-automation-issue-index.cjs

      - name: MTTR fingerprint regression guard
        env:
          GH_TOKEN: ${{ github.token }}
          MTTR_FP_REGRESSION_DELTA_HOURS: '6'
          MTTR_FP_REGRESSION_STREAK: '2'
          MTTR_FP_MIN_SAMPLES: '3'
          MTTR_FP_TOP_LIMIT: '12'
          MTTR_FP_MAX_ESCALATIONS_PER_RUN: '3'
          MTTR_FP_COOLDOWN_HOURS: '24'
          MTTR_FP_MESH_SUPPRESSION_HOURS: '8'
          MTTR_FP_CRITICAL_DELTA_HOURS: '18'
          MTTR_FP_CRITICAL_STREAK: '3'
        run: node automation/ai-mttr-fingerprint-regression-guard.cjs

      - name: Upload MTTR fingerprint guard artifacts
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: mttr-fingerprint-regression-guard-${{ github.run_id }}
          path: |
            automation/reports/automation-open-issues-index-latest.json
            automation/reports/automation-issue-mttr-history.json
            automation/reports/mttr-fingerprint-regression-latest.json
            automation/reports/mttr-fingerprint-regression-state.json
            automation/reports/mttr-fingerprint-suppression-explainability-latest.json
            automation/reports/automation-incident-cooldown-mesh.json
          if-no-files-found: ignore
          retention-days: 30

      - name: Commit MTTR fingerprint state
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -f automation/reports/automation-open-issues-index-latest.json
          git add -f automation/reports/automation-issue-mttr-history.json
          git add -f automation/reports/mttr-fingerprint-regression-latest.json
          git add -f automation/reports/mttr-fingerprint-regression-state.json
          git add -f automation/reports/mttr-fingerprint-suppression-explainability-latest.json
          git add -f automation/reports/automation-incident-cooldown-mesh.json
          if git diff --staged --quiet; then
            echo "No MTTR fingerprint regression state changes."
            exit 0
          fi
          bash scripts/automation/commit-and-push-main.sh "chore(reports): refresh MTTR fingerprint regression state"
