name: Telegram Daily Digest
on:
  schedule:
    - cron: '0 6 * * *'
  workflow_dispatch: {}

jobs:
  digest:
    runs-on: ubuntu-latest
    defaults:
      run:
        shell: bash
    steps:
      - name: 'checkout'
        uses: actions/checkout@v4

      - name: 'build digest payload'
        run: |
          set -euo pipefail
          node - <<'NODE'
const fs = require('fs');
const healthPath = 'public/api/automation-health.json';
const historyPath = 'public/api/automation-health-history.json';
const outputPath = 'digest.json';
let text = '';
try {
  const health = JSON.parse(fs.readFileSync(healthPath, 'utf8'));
  const history = JSON.parse(fs.readFileSync(historyPath, 'utf8'));
  const currentScore = health.sloScore ?? 'n/a';
  const prev = history.length > 1 ? history[history.length - 2] : null;
  const prevScore = prev?.sloScore ?? 'n/a';
  text += `Zion Daily Digest\nSLO Score: ${currentScore}\nPrevious: ${prevScore}\nDeploy Status: ${health.deployStatus ?? 'unknown'}\nOpen Incident Fingerprints: ${health.openFingerprintIssues ?? 'n/a'}`;
} catch (e) {
  text = 'Zion Daily Digest\nCould not parse automation health data: ' + e.message;
}
const payload = { text };
fs.writeFileSync(outputPath, JSON.stringify(payload));
console.log('digest', text);
NODE

      - name: 'send Telegram digest'
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: |
          set -euo pipefail
          PAYLOAD=$(cat digest.json)
          curl -s -X POST "https://api.telegram.org/bot${TELEGRAM_BOT_TOKEN}/sendMessage" \
            -H 'Content-Type: application/json' \
            -d "${PAYLOAD}" \
            >/dev/null
