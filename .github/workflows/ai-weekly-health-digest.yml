name: Weekly AI Health Digest

on:
  schedule:
    - cron: '0 9 * * 1'  # Monday at 9 AM
  workflow_dispatch:

permissions:
  contents: read
  issues: write

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  digest:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: npm
      
      - name: Install dependencies
        run: npm ci --prefer-offline --no-audit --fund=false
      
      - name: Generate weekly digest
        env:
          ZION_BASE_URL: https://ziontechgroup.com
        run: |
          npm run observability:digest || true
          npm run release:risk:score || true
          npm run reports:aggregate || true
      
      - name: Upload digest
        uses: actions/upload-artifact@v4
        with:
          name: weekly-health-digest-${{ github.run_id }}
          path: automation/reports/
          retention-days: 90
      
      - name: Post digest to Telegram
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: |
          curl -X POST "https://api.telegram.org/bot$TELEGRAM_BOT_TOKEN/sendMessage" \
            -d chat_id="$TELEGRAM_CHAT_ID" \
            -d text="📊 Weekly AI Health Digest ready. Check artifacts for full report." || true