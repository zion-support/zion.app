# Ensures ai-ai-experiences-health.yml keeps schedule/script/artifact anchors (grep-only).
name: ai ai experiences health workflow smoke (weekly)

permissions:
  contents: read

on:
  schedule:
    - cron: '40 12 * * 2' # Tuesdays 12:40 UTC
  workflow_dispatch:

concurrency:
  group: ai-ai-experiences-health-smoke-weekly
  cancel-in-progress: false

jobs:
  experiences-health-anchors:
    runs-on: ubuntu-latest
    timeout-minutes: 2
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: ai-ai-experiences-health.yml anchors
        run: |
          set -euo pipefail
          f=.github/workflows/ai-ai-experiences-health.yml
          test -f "$f"
          test -s "$f"
          grep -Fq 'name: AI Experiences Health' "$f"
          grep -Fq 'group: ai-ai-experiences-health' "$f"
          grep -Fq 'cancel-in-progress: false' "$f"
          grep -Fq "cron: '15 * * * *'" "$f"
          grep -Fq 'npm run app:ai-experiences-health' "$f"
          grep -Fq 'ai-experiences-health-' "$f"
          grep -Fq 'ai-experiences-health-latest.json' "$f"
          grep -Fq 'ai-experiences-health.log' "$f"
          grep -Fq 'actions/upload-artifact@' "$f"
          echo "ok: $f"
