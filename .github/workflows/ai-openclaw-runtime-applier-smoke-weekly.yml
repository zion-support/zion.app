# Ensures ai-openclaw-runtime-applier.yml keeps cadence/tuner/escalation anchors (grep-only).
name: ai openclaw runtime applier workflow smoke (weekly)
permissions:
  contents: read
on:
  schedule:
    - cron: '45 11 * * 3' # Wednesdays 11:45 UTC
  workflow_dispatch:
concurrency:
  group: ai-openclaw-runtime-applier-smoke-weekly
  cancel-in-progress: true
jobs:
  openclaw-runtime-applier-anchors:
    runs-on: ubuntu-latest
    timeout-minutes: 2
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - name: ai-openclaw-runtime-applier.yml anchors
        run: |
          set -euo pipefail
          f=.github/workflows/ai-openclaw-runtime-applier.yml
          test -f "$f"
          test -s "$f"
          grep -Fq 'name: AI Openclaw Runtime Applier' "$f"
          grep -Fq 'group: ai-openclaw-runtime-applier' "$f"
          grep -Fq "cron: '25 */6 * * *'" "$f"
          grep -Fq 'npm run openclaw:skills:audit' "$f"
          grep -Fq 'npm run openclaw:skills:tune' "$f"
          grep -Fq 'npm run openclaw:runtime:apply' "$f"
          grep -Fq 'openclaw-runtime-applier-latest.json' "$f"
          grep -Fq 'gh-issue-close-on-recovery.cjs' "$f"
          grep -Fq 'gh-issue-dedupe-or-create.cjs' "$f"
          grep -Fq 'actions/upload-artifact@' "$f"
          echo "ok: $f"
