permissions:
  contents: read
name: "Autonomous Accessibility Scorecard Dashboard"

on:
  schedule:
    - cron: '0 8 * * *'  # Daily 08:30 UTC
  workflow_dispatch:

jobs:
  scorecard:
    name: Accessibility Scorecard
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Download latest accessibility audit artifacts from #13
        id: download
        continue-on-error: true
        run: |
          mkdir -p .hermes/artifacts/accessibility-audit
          # Use GitHub API to fetch latest successful workflow run for accessibility-audit.yml
          RUN_ID=$(curl -s -H "Authorization: token ${{ secrets.GITHUB_TOKEN }}" \
            "https://api.github.com/repos/${{ github.repository }}/actions/workflows/accessibility-audit.yml/runs?status=success&per_page=1" \
            | jq -r '.workflow_runs[0].id')
          if [ -n "$RUN_ID" ] && [ "$RUN_ID" != "null" ]; then
            echo "Downloading artifacts from run $RUN_ID..."
            curl -s -H "Authorization: token ${{ secrets.GITHUB_TOKEN }}" \
              "https://api.github.com/repos/${{ github.repository }}/actions/runs/$RUN_ID/artifacts" \
              | jq -r '.artifacts[].archive_download_url' | head -1 | while read URL; do
                curl -s -L -H "Authorization: token ${{ secrets.GITHUB_TOKEN }}" "$URL" -o artifact.zip
                unzip -q artifact.zip -d .hermes/artifacts/accessibility-audit/
              done
            echo "Artifacts downloaded."
          else
            echo "No previous successful accessibility audit runs found. Scorecard will use any local artifacts."
          fi

      - name: Run Accessibility Scorecard
        id: scorecard
        continue-on-error: true
        run: |
          node automation/accessibility-scorecard.cjs > /tmp/scorecard-output.txt || true
          echo "exit_code=$?" >> $GITHUB_OUTPUT

      - name: Upload scorecard artifact
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: accessibility-scorecard
          path: |
            .hermes/memory/accessibility-scorecard/scorecard.json
            .hermes/memory/accessibility-scorecard/history.json
          retention-days: 90

      - name: Check for alerts
        run: |
          if [ "${{ steps.scorecard.outputs.exit_code }}" -ne 0 ]; then
            echo "Accessibility regressions detected"
            exit 1
          fi

      - name: Open GitHub issue on regression
        if: failure()
        uses: actions/github-script@v9
        with:
          script: |
            const fs = require('fs');
            const historyPath = '.hermes/memory/accessibility-scorecard/history.json';
            let data = {};
            try { data = JSON.parse(fs.readFileSync(historyPath, 'utf8')); } catch(e) {}
            const latest = data.entries?.[data.entries.length-1];
            if (!latest) return;

            const body = `🚨 **Accessibility Scorecard Regression**\n\n`;
            body += `**Date:** ${latest.date}\n`;
            body += `**Median Accessibility Score:** ${latest.stats?.median?.toFixed(1) || 'N/A'}/100\n`;
            body += `**Routes analyzed:** ${latest.routeCount}\n`;
            body += `**Failing routes (<${FAILURE_THRESHOLD}):** ${latest.stats?.failing || 0}\n\n`;
            if (latest.alerts && latest.alerts.length) {
              body += `**Alerts:**\n`;
              for (const a of latest.alerts) body += `- ${a}\n`;
            }
            body += `\n*Committed by: ${context.payload.committer?.name || 'scheduler'}*\n`;

            const title = `🚨 Accessibility Regression — ${latest.date}`;
            const existing = await github.rest.issues.listForRepo({
              owner: context.repo.owner,
              repo: context.repo.repo,
              labels: ['accessibility', 'a11y', 'autonomous'],
              state: 'open'
            });
            const already = existing.data.find((i: any) => i.title.startsWith('🚨 Accessibility Regression'));
            if (!already) {
              await github.rest.issues.create({
                owner: context.repo.owner,
                repo: context.repo.repo,
                title,
                body,
                labels: ['accessibility', 'a11y', 'autonomous', 'blocker']
              });
            }

      - name: Weekly accessibility digest
        if: success() && github.event_name == 'schedule' && github.event.schedule == '0 8 * * 0'
        run: |
          node automation/notify-telegram.js "♿ Weekly accessibility scorecard: median and trend analysis complete. See artifacts for details."

      - name: Notify Telegram on errors
        if: failure()
        run: |
          node automation/notify-telegram.js "⚠️ Accessibility scorecard encountered errors. Check workflow logs."
