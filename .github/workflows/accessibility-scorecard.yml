permissions:
  contents: read
name: Autonomous Accessibility Scorecard Dashboard
true:
  schedule:
  - cron: 0 8 * * *
  workflow_dispatch: null
jobs:
  scorecard:
    name: Accessibility Scorecard
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
    - name: Checkout repository
      uses: actions/checkout@v6.0.2
      with:
        fetch-depth: 0
    - name: Setup Node.js
      uses: actions/setup-node@v6.3.0
      with:
        node-version: '20'
        cache: npm
    - name: Install dependencies
      run: npm ci
    - name: Download latest accessibility audit artifacts from
      id: download
      continue-on-error: true
      run: "mkdir -p .hermes/artifacts/accessibility-audit\n# Use GitHub API to fetch\
        \ latest successful workflow run for accessibility-audit.yml\nRUN_ID=$(curl\
        \ -s -H \"Authorization: token ${{ secrets.GITHUB_TOKEN }}\" \\\n  \"https://api.github.com/repos/${{\
        \ github.repository }}/actions/workflows/accessibility-audit.yml/runs?status=success&per_page=1\"\
        \ \\\n  | jq -r '.workflow_runs[0].id')\nif [ -n \"$RUN_ID\" ] && [ \"$RUN_ID\"\
        \ != \"null\" ]; then\n  echo \"Downloading artifacts from run $RUN_ID...\"\
        \n  curl -s -H \"Authorization: token ${{ secrets.GITHUB_TOKEN }}\" \\\n \
        \   \"https://api.github.com/repos/${{ github.repository }}/actions/runs/$RUN_ID/artifacts\"\
        \ \\\n    | jq -r '.artifacts[].archive_download_url' | head -1 | while read\
        \ URL; do\n      curl -s -L -H \"Authorization: token ${{ secrets.GITHUB_TOKEN\
        \ }}\" \"$URL\" -o artifact.zip\n      unzip -q artifact.zip -d .hermes/artifacts/accessibility-audit/\n\
        \    done\n  echo \"Artifacts downloaded.\"\nelse\n  echo \"No previous successful\
        \ accessibility audit runs found. Scorecard will use any local artifacts.\"\
        \nfi\n"
    - name: Run Accessibility Scorecard
      id: scorecard
      continue-on-error: true
      run: 'node automation/accessibility-scorecard.cjs > /tmp/scorecard-output.txt
        || true

        echo "exit_code=$?" >> $GITHUB_OUTPUT

        '
    - name: Upload scorecard artifact
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: accessibility-scorecard
        path: '.hermes/memory/accessibility-scorecard/scorecard.json

          .hermes/memory/accessibility-scorecard/history.json

          '
        retention-days: 90
    - name: Check for alerts
      run: "if [ \"${{ steps.scorecard.outputs.exit_code }}\" -ne 0 ]; then\n  echo\
        \ \"Accessibility regressions detected\"\n  exit 1\nfi\n"
    - name: Open GitHub issue on regression
      if: failure()
      uses: actions/github-script@v7
      with:
        script: "const fs = require('fs');\nconst historyPath = '.hermes/memory/accessibility-scorecard/history.json';\n\
          let data = {};\ntry { data = JSON.parse(fs.readFileSync(historyPath, 'utf8'));\
          \ } catch(e) {}\nconst latest = data.entries?.[data.entries.length-1];\n\
          if (!latest) return;\n\nconst body = `\U0001F6A8 **Accessibility Scorecard\
          \ Regression**\\n\\n`;\nbody += `**Date:** ${latest.date}\\n`;\nbody +=\
          \ `**Median Accessibility Score:** ${latest.stats?.median?.toFixed(1) ||\
          \ 'N/A'}/100\\n`;\nbody += `**Routes analyzed:** ${latest.routeCount}\\\
          n`;\nbody += `**Failing routes (<${FAILURE_THRESHOLD}):** ${latest.stats?.failing\
          \ || 0}\\n\\n`;\nif (latest.alerts && latest.alerts.length) {\n  body +=\
          \ `**Alerts:**\\n`;\n  for (const a of latest.alerts) body += `- ${a}\\\
          n`;\n}\nbody += `\\n*Committed by: ${context.payload.committer?.name ||\
          \ 'scheduler'}*\\n`;\n\nconst title = `\U0001F6A8 Accessibility Regression\
          \ \u2014 ${latest.date}`;\nconst existing = await github.rest.issues.listForRepo({\n\
          \  owner: context.repo.owner,\n  repo: context.repo.repo,\n  labels: ['accessibility',\
          \ 'a11y', 'autonomous'],\n  state: 'open'\n});\nconst already = existing.data.find((i:\
          \ any) => i.title.startsWith('\U0001F6A8 Accessibility Regression'));\n\
          if (!already) {\n  await github.rest.issues.create({\n    owner: context.repo.owner,\n\
          \    repo: context.repo.repo,\n    title,\n    body,\n    labels: ['accessibility',\
          \ 'a11y', 'autonomous', 'blocker']\n  });\n}\n"
    - name: Weekly accessibility digest
      if: success() && github.event_name == 'schedule' && github.event.schedule ==
        '0 8 * * 0'
      run: "node automation/notify-telegram.js \"\u267F Weekly accessibility scorecard:\
        \ median and trend analysis complete. See artifacts for details.\"\n"
    - name: Notify Telegram on errors
      if: failure()
      run: "node automation/notify-telegram.js \"\u26A0\uFE0F Accessibility scorecard\
        \ encountered errors. Check workflow logs.\"\n"
    timeout-minutes: 10
