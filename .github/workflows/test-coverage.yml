name: Test Coverage Enforcement

on:
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pull-requests: write

jobs:
  coverage:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run tests with coverage
        run: npm test -- --coverage --silent

      - name: Enforce coverage thresholds
        env:
          COVERAGE_MIN_GLOBAL: ${{ secrets.COVERAGE_MIN_GLOBAL || '80' }}
          COVERAGE_REGRESSION_PCT: ${{ secrets.COVERAGE_REGRESSION_PCT || '5' }}
          COVERAGE_INPUT: coverage/coverage-final.json
          COVERAGE_UPDATE_BASELINE_ON_MAIN: ${{ secrets.COVERAGE_UPDATE_BASELINE_ON_MAIN || 'false' }}
          GITHUB_REF: ${{ github.ref }}
          GITHUB_EVENT_NAME: ${{ github.event_name }}
        run: node automation/test-coverage-enforcer.cjs

      - name: Post coverage comment on PR
        if: github.event_name == 'pull_request'
        uses: actions/github-script@v9
        with:
          script: |
            const fs = require('fs');
            let comment = '📊 **Test Coverage Report**\n\n';
            try {
              const summary = JSON.parse(fs.readFileSync('coverage/coverage-summary.json', 'utf8'));
              const total = summary.total;
              comment += `- **Global:** ${total.lines.pct.toFixed(2)}% lines, ${total.branches.pct.toFixed(2)}% branches, ${total.functions.pct.toFixed(2)}% functions, ${total.statements.pct.toFixed(2)}% statements\n`;
            } catch (e) {
              comment += '⚠️ Could not parse coverage summary.';
            }
            comment += '\n*Coverage thresholds: global ≥ 80%, regression ≤ 5%. Baseline will update on merge to main.*';
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: comment
            });

      - name: Notify Telegram on failure
        if: failure()
        run: |
          node automation/notify-telegram.js "⚠️ Test coverage check failed on ${{ github.repository }} PR #${{ github.event.pull_request.number || 'unknown' }}. See: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
