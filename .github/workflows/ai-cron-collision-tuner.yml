name: AI Cron Collision Tuner

permissions:
  contents: read
  issues: write

concurrency:
  group: ai-cron-collision-tuner
  cancel-in-progress: false

on:
  schedule:
    - cron: '50 13 * * 1'
  workflow_dispatch:

jobs:
  cron-collision-tuner:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    env:
      NEXT_TELEMETRY_DISABLED: "1"
      CRON_DENSITY_THRESHOLD: "4"
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Setup Node.js
        uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6.3.0
        with:
          node-version-file: '.nvmrc'
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Install dependencies
        run: npm ci --prefer-offline --no-audit --fund=false

      - name: Run cron collision tuner
        run: node automation/ai-cron-collision-tuner.cjs

      - name: Upload cron collision report
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: cron-collision-${{ github.run_id }}
          path: |
            automation/reports/cron-collision-latest.json
            automation/reports/cron-collision-latest.md
          if-no-files-found: error
          retention-days: 30

      - name: Open issue on severe cron collisions
        if: always()
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          report="automation/reports/cron-collision-latest.json"
          [ -f "$report" ] || exit 0
          severe=$(node -e "const fs=require('fs');const r=JSON.parse(fs.readFileSync('$report','utf8'));console.log((r.exactCollisions||[]).length + (r.denseWindows||[]).length)")
          if [ "$severe" = "0" ]; then
            echo "No severe cron collisions detected."
            export ISSUE_FINGERPRINT="cron-collision-hotspots"
            export CLOSE_COMMENT="Auto-closing: no severe cron collision hotspots."
            node scripts/automation/gh-issue-close-on-recovery.cjs || true
            exit 0
          fi
          body_file="cron-collision-hotspots.md"
          {
            echo "## Cron collision hotspots"
            echo ""
            echo "- Severe hotspot count: **${severe}**"
            echo "- Workflow run: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
            echo ""
            echo "### Summary"
            node -e "const fs=require('fs');const r=JSON.parse(fs.readFileSync('$report','utf8'));console.log('- Exact collisions: '+(r.exactCollisions||[]).length);console.log('- Dense windows: '+(r.denseWindows||[]).length);console.log('- Recommendation: '+(r.recommendation||'n/a'));"
          } > "$body_file"
          export ISSUE_TITLE="Cron collision hotspots detected"
          export ISSUE_BODY_FILE="$body_file"
          export ISSUE_LABELS="enhancement"
          export ISSUE_FINGERPRINT="cron-collision-hotspots"
          export COOLDOWN_HOURS="12"
          node scripts/automation/gh-issue-dedupe-or-create.cjs || true
