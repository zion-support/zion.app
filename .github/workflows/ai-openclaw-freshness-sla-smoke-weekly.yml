# Ensures ai-openclaw-freshness-sla.yml keeps freshness SLA anchors (grep-only).
name: ai openclaw freshness SLA workflow smoke (weekly)
permissions:
  contents: read
on:
  schedule:
    - cron: '50 11 * * 3' # Wednesdays 11:50 UTC
  workflow_dispatch:
concurrency:
  group: ai-openclaw-freshness-sla-smoke-weekly
  cancel-in-progress: true
jobs:
  openclaw-freshness-sla-anchors:
    runs-on: ubuntu-latest
    timeout-minutes: 2
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - name: ai-openclaw-freshness-sla.yml anchors
        run: |
          set -euo pipefail
          f=.github/workflows/ai-openclaw-freshness-sla.yml
          test -f "$f"
          test -s "$f"
          grep -Fq 'name: AI Openclaw Freshness SLA' "$f"
          grep -Fq "cron: '40 */4 * * *'" "$f"
          grep -Fq 'npm run openclaw:autonomous-once' "$f"
          grep -Fq 'openclaw-autonomous-app-improver-latest.json' "$f"
          grep -Fq 'openclaw-freshness-sla' "$f"
          grep -Fq 'gh-issue-close-on-recovery.cjs' "$f"
          grep -Fq 'gh-issue-dedupe-or-create.cjs' "$f"
          echo "ok: $f"
