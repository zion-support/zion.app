# AI Live Site Accessibility Audit
# Runs axe-core against live ziontechgroup.com; uploads report.
# Schedule: Thursday 07:00 UTC. workflow_dispatch.

name: AI Live Site Accessibility Audit

permissions:
  contents: read

concurrency:
  group: ai-live-accessibility-audit
  cancel-in-progress: false

on:
  schedule:
    - cron: '0 7 * * 4'
  workflow_dispatch:

jobs:
  live-a11y:
    runs-on: ubuntu-latest
    timeout-minutes: 25
    env:
      NEXT_TELEMETRY_DISABLED: "1"
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Setup Node.js
        uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6.3.0
        with:
          node-version-file: '.nvmrc'
          cache: 'npm'
          cache-dependency-path: package-lock.json

      - name: Install dependencies
        run: npm ci --prefer-offline --no-audit --fund=false

      - name: Run live site accessibility audit
        run: npm run a11y:live

      - name: Summary to job output
        if: always()
        run: |
          if [ -f automation/reports/live-site-accessibility-audit-latest.json ]; then
            node -e "
              const r = require('./automation/reports/live-site-accessibility-audit-latest.json');
              const total = (r.pages || []).reduce((s, p) => s + (p.violations && p.violations.length || 0), 0);
              console.log('Total violations:', total);
              console.log('Pages audited:', (r.pages || []).length);
            "
          fi

      - name: Upload accessibility report
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: live-accessibility-audit-${{ github.run_id }}
          path: automation/reports/live-site-accessibility-audit-latest.json
          if-no-files-found: ignore
          retention-days: 30
