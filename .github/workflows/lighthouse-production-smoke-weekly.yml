# Ensures lighthouse-production.yml keeps schedule, pinned actions, and production audit anchors (grep-only).
name: lighthouse production workflow smoke (weekly)
permissions:
  contents: read
on:
  schedule:
    - cron: '35 11 * * 3' # Wednesdays 11:35 UTC
  workflow_dispatch:
concurrency:
  group: lighthouse-production-smoke-weekly
  cancel-in-progress: true
jobs:
  lighthouse-production-anchors:
    runs-on: ubuntu-latest
    timeout-minutes: 2
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - name: lighthouse-production.yml anchors
        run: |
          set -euo pipefail
          f=.github/workflows/lighthouse-production.yml
          test -f "$f"
          test -s "$f"
          grep -Fq 'name: Lighthouse Production Audit' "$f"
          grep -Fq 'group: lighthouse-production' "$f"
          grep -Fq "cron: '0 12 * * 0'" "$f"
          grep -Fq 'name: Setup Node.js' "$f"
          grep -Fq "node-version-file: '.nvmrc'" "$f"
          grep -Fq 'npm ci --prefer-offline --no-audit --fund=false' "$f"
          grep -Fq 'npm run lighthouse:production' "$f"
          grep -Fq 'actions/upload-artifact@' "$f"
          grep -Fq 'automation/reports/lighthouse-production-latest.json' "$f"
          echo "ok: $f"
