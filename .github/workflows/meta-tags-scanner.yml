permissions:
  contents: read
name: "Autonomous Meta Tags Quality Scanner"

on:
  schedule:
    - cron: '0 11 * * 3'  # Weekly Wednesday 11:00 UTC
  workflow_dispatch:

jobs:
  meta-tags-check:
    name: Meta Tags Quality Scan
    runs-on: ubuntu-latest
    permissions:
      contents: write
      issues: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci --include=dev

      - name: Ensure local site accessible
        id: site-check
        continue-on-error: true
        run: |
          if curl -s -o /dev/null -w "%{http_code}" http://localhost:3000 | grep -q '^2'; then
            echo "site_up=true" >> $GITHUB_OUTPUT
          else
            echo "Site not up; attempting build+start..."
            npm run build || true
            nohup npm start &>/tmp/next-start.log &
            sleep 30
            echo "site_up=attempted" >> $GITHUB_OUTPUT
          fi

      - name: Run Meta Tags Scanner
        id: scanner
        continue-on-error: true
        run: |
          node automation/meta-tags-scanner.cjs > /tmp/meta-tags-output.txt || true
          echo "exit_code=$?" >> $GITHUB_OUTPUT

      - name: Upload scanner artifacts
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: meta-tags-scanner-state
          path: |
            .hermes/memory/meta-tags-scanner/
            /tmp/meta-tags-output.txt
          retention-days: 30

      - name: Notify Telegram on completion
        if: success()
        run: |
          node automation/notify-telegram.js "🏷️ Meta tags scan complete. Check artifacts for quality report."

      - name: Notify Telegram on errors
        if: failure()
        run: |
          node automation/notify-telegram.js "⚠️ Meta tags scan failed. Check workflow logs."
