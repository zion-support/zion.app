name: Workflow Ruby parse only (manual)

permissions:
  contents: read

on:
  workflow_dispatch:

concurrency:
  group: workflow-parse-ruby-only-dispatch
  cancel-in-progress: true

jobs:
  parse:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Parse workflow YAML (names, concurrency, job ids, local uses, cron, timeouts)
        run: ruby scripts/automation/parse-github-workflows-yaml.rb
