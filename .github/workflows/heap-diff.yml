permissions:
  contents: read
name: Autonomous Memory Leak Detector
true:
  schedule:
  - cron: 0 * * * *
  workflow_dispatch: null
jobs:
  heap-diff:
    name: Memory Leak Detector
    runs-on: ubuntu-latest
    permissions:
      contents: read
      issues: write
    steps:
    - name: Checkout repository
      uses: actions/checkout@v6
      with:
        fetch-depth: 0
    - name: Setup Node.js
      uses: actions/setup-node@v6
      with:
        node-version: '20'
        cache: npm
    - name: Install dependencies
      run: npm ci
    - name: Install PM2 globally (for process query)
      run: npm install -g pm2
    - name: Start test app if not running
      id: start-app
      continue-on-error: true
      run: "# Check if any PM2 processes exist; if not, start a long-running Node\
        \ app to simulate\nif ! pm2 jlist --format json | grep -q '\"name\"'; then\n\
        \  echo \"No PM2 processes found. Starting sample long-lived app for demo...\"\
        \n  cat > /tmp/heap-test-app.js << 'EOF'\n    setInterval(() => { const arr\
        \ = new Array(1000000).fill('x'); }, 1000);\n  EOF\n  pm2 start /tmp/heap-test-app.js\
        \ --name heap-test || true\n  sleep 2\nelse\n  echo \"PM2 processes already\
        \ running.\"\nfi\n"
    - name: Run Heap Diff Detector
      id: detector
      continue-on-error: true
      run: 'node automation/heap-diff-detector.cjs > /tmp/heap-diff-output.txt ||
        true

        echo "exit_code=$?" >> $GITHUB_OUTPUT

        '
    - name: Upload snapshot artifact
      if: always()
      uses: actions/upload-artifact@v7
      with:
        name: heap-diff-snapshot
        path: .hermes/memory/heap-diff/snapshots/*.json
        retention-days: 7
    - name: Check for alerts
      run: "if [ \"${{ steps.detector.outputs.exit_code }}\" -ne 0 ]; then\n  echo\
        \ \"Memory leak alerts detected\"\n  exit 1\nfi\n"
    - name: Open GitHub issue on sustained alerts
      if: failure()
      uses: actions/github-script@v9
      with:
        script: "const fs = require('fs');\nconst snapshotDir = '.hermes/memory/heap-diff/snapshots';\n\
          const files = fs.readdirSync(snapshotDir).sort().slice(-3); // last 3 snapshots\n\
          let body = '\U0001F6A8 **Potential Memory Leak Detected**\\n\\n';\nbody\
          \ += 'Heap retention growth exceeded threshold across one or more processes.\\\
          n\\n';\nbody += '**Recent snapshots:**\\n';\nfor (const f of files) {\n\
          \  const data = JSON.parse(fs.readFileSync(path.join(snapshotDir, f), 'utf8'));\n\
          \  body += `- ${f} (${data.timestamp}): ${data.processes.map((p: any) =>\
          \ `${p.name} ${p.heapUsedMB}MB${p.alert ? ' \U0001F534' : ''}`).join(',\
          \ ')}\\n`;\n}\nbody += '\\nReview the attached artifacts and process metrics.\
          \ Consider heap profile analysis and code review for leak sources.';\nbody\
          \ += `\\n\\n*Committed by: ${context.payload.committer?.name || 'scheduler'}*\\\
          n`;\n\nconst title = `\U0001F6A8 Memory Leak Alert \u2014 ${new Date().toISOString().slice(0,10)}`;\n\
          const existing = await github.rest.issues.listForRepo({\n  owner: context.repo.owner,\n\
          \  repo: context.repo.repo,\n  labels: ['memory-leak', 'autonomous', 'performance'],\n\
          \  state: 'open'\n});\nconst already = existing.data.find((i: any) => i.title.startsWith('\U0001F6A8\
          \ Memory Leak Alert'));\nif (!already) {\n  await github.rest.issues.create({\n\
          \    owner: context.repo.owner,\n    repo: context.repo.repo,\n    title,\n\
          \    body,\n    labels: ['memory-leak', 'autonomous', 'performance', 'blocker']\n\
          \  });\n}\n"
    - name: Notify Telegram on alerts
      if: failure()
      run: "node automation/notify-telegram.js \"\U0001F6A8 Memory leak detected.\
        \ Check GitHub issues for heap diff details.\"\n"
    - name: Weekly memory health digest
      if: success() && github.event_name == 'schedule' && github.event.schedule ==
        '0 0 * * 0'
      run: "node automation/notify-telegram.js \"\u2705 Weekly memory leak scan complete\
        \ \u2014 no abnormal heap growth.\"\n"
    timeout-minutes: 10
