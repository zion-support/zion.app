# AI Content Max Velocity Deploy
# 5x daily: ideation + audit ideas + front page expansion + content burst → build → commit + deploy.
# Maximizes content velocity with guaranteed deploy; uses content-commit concurrency.

name: AI Content Max Velocity Deploy

concurrency:
  group: autonomous-main-writer
  cancel-in-progress: false

permissions:
  contents: write

on:
  schedule:
    - cron: '0 3 * * *'
    - cron: '0 9 * * *'
    - cron: '0 12 * * *'
    - cron: '0 18 * * *'
    - cron: '0 21 * * *'
  workflow_dispatch:
    inputs:
      skip_ideation:
        description: 'Skip ideation'
        required: false
        default: false
        type: boolean
      skip_front_page:
        description: 'Skip front page expansion'
        required: false
        default: false
        type: boolean
      skip_burst:
        description: 'Skip content burst'
        required: false
        default: false
        type: boolean
      max_template_blog:
        description: 'Template blog posts (default 5)'
        required: false
        default: '5'
      max_template_case_studies:
        description: 'Template case studies (default 5)'
        required: false
        default: '5'
      max_industry_pages:
        description: 'Industry pages (default 4)'
        required: false
        default: '4'
      max_add:
        description: 'Apps to promote to front page (default 6)'
        required: false
        default: '6'
      trigger_deploy:
        description: 'Trigger deploy after commit (GitHub Pages)'
        required: false
        default: true
        type: boolean

jobs:
  max-velocity:
    runs-on: ubuntu-latest
    timeout-minutes: 28
    env:
      NEXT_TELEMETRY_DISABLED: "1"
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          token: ${{ github.token }}

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version-file: '.nvmrc'
          cache: 'npm'
          cache-dependency-path: package-lock.json

      - name: Restore content runtime cache
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        with:
          path: |
            automation/reports/.runtime
          key: content-runtime-${{ runner.os }}-${{ hashFiles('automation/openrouter-content-generator.cjs') }}
          restore-keys: |
            content-runtime-${{ runner.os }}-

      - name: Install dependencies
        run: npm ci --prefer-offline --no-audit --fund=false

      - name: Run content ideas to deploy pipeline
        env:
          AUTO_COMMIT: "1"
          TRIGGER_DEPLOY: ${{ github.event.inputs.trigger_deploy != 'false' && '1' || '1' }}
          OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
          OPENROUTER_MODEL: openrouter/free
#           NETLIFY_BUILD_HOOK removed (Netlify decommissioned → GitHub Pages)
          SKIP_IDEATION: ${{ github.event.inputs.skip_ideation == 'true' && '1' || '' }}
          SKIP_FRONT_PAGE: ${{ github.event.inputs.skip_front_page == 'true' && '1' || '' }}
          SKIP_BURST: ${{ github.event.inputs.skip_burst == 'true' && '1' || '' }}
          MAX_TEMPLATE_BLOG: ${{ github.event.inputs.max_template_blog || '5' }}
          MAX_TEMPLATE_CASE_STUDIES: ${{ github.event.inputs.max_template_case_studies || '5' }}
          MAX_INDUSTRY_PAGES: ${{ github.event.inputs.max_industry_pages || '4' }}
          MAX_ADD: ${{ github.event.inputs.max_add || '6' }}
        run: node automation/ai-content-ideas-to-deploy-pipeline.cjs

      - name: Validate build (before commit)
        run: |
          set -euo pipefail
          npm run rsc:guard
          npm run build

      - name: Commit, push, and deploy
        env:
          TRIGGER_DEPLOY: ${{ github.event.inputs.trigger_deploy != 'false' && '1' || '' }}
#           NETLIFY_BUILD_HOOK removed (Netlify decommissioned → GitHub Pages)
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -A
          if ! git diff --staged --quiet; then
            bash scripts/automation/commit-and-push-main.sh "chore(content): max velocity deploy - ideation + front page + burst"
            if false # Netlify build hook removed (migrated to GitHub Pages) && [ "$TRIGGER_DEPLOY" = "1" ]; then
              echo "# NO-OP: Netlify deploy removed (migrated to GitHub Pages)"
            fi
          fi
