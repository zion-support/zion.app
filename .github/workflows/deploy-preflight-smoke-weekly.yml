# Ensures deploy-preflight.yml keeps manual dispatch inputs + core quality gates (grep-only).
name: deploy preflight smoke (weekly)
permissions:
  contents: read
on:
  schedule:
    - cron: '50 10 * * 4' # Thursdays 10:50 UTC
  workflow_dispatch:
concurrency:
  group: deploy-preflight-smoke-weekly
  cancel-in-progress: true
jobs:
  deploy-preflight:
    runs-on: ubuntu-latest
    timeout-minutes: 2
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - name: deploy-preflight.yml anchors
        run: |
          set -euo pipefail
          f=.github/workflows/deploy-preflight.yml
          test -f "$f"
          test -s "$f"
          grep -Fq 'name: Deploy Preflight' "$f"
          grep -Fq 'workflow_dispatch:' "$f"
          grep -Fq 'trigger_deploy:' "$f"
          grep -Fq 'github.event.inputs.trigger_deploy' "$f"
          grep -Fq 'npm ci --prefer-offline --no-audit --fund=false' "$f"
          grep -Fq 'npm run lint:check' "$f"
          grep -Fq 'npm run type-check' "$f"
          grep -Fq 'npm run build' "$f"
          grep -Fq 'GitHub Pages' "$f"
          echo "ok: $f"
