name: AI Report Aggregator

permissions:
  contents: read

concurrency:
  group: ai-report-aggregator
  cancel-in-progress: false

on:
  schedule:
    - cron: '0 11 * * 1'
  workflow_dispatch:

jobs:
  report-aggregator:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    env:
      NEXT_TELEMETRY_DISABLED: "1"
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Setup Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version-file: '.nvmrc'
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Install dependencies
        run: npm ci --prefer-offline --no-audit --fund=false

      - name: Openclaw history merge + GHA cost estimate
        run: npm run openclaw:improver:history:merge && npm run gha:cost:estimate
        continue-on-error: true

      - name: Run health monitor
        run: node automation/ai-automation-health-monitor.cjs
        continue-on-error: true

      - name: Run Report Aggregator
        run: node automation/ai-report-aggregator-agent.cjs

      - name: Upload aggregate dashboard
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: aggregate-dashboard-${{ github.run_id }}
          path: |
            automation/reports/aggregate-dashboard.json
            automation/reports/aggregate-dashboard.html
          if-no-files-found: ignore
          retention-days: 30
