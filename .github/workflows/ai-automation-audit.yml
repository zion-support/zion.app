# AI Automation Audit
# Audits automation ecosystem: agents, workflows, cron. Identifies issues and suggests improvements.
# Runs: Weekly Saturday 11 AM UTC, or workflow_dispatch
#
# Setup: Add OPENROUTER_API_KEY to repo secrets for LLM-powered suggestions.

name: AI Automation Audit

permissions:
  contents: read

concurrency:
  group: ai-automation-audit
  cancel-in-progress: false

on:
  schedule:
    - cron: '0 11 * * 6'
  workflow_dispatch:

jobs:
  audit:
    runs-on: ubuntu-latest
    timeout-minutes: 25
    env:
      NEXT_TELEMETRY_DISABLED: "1"
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version-file: '.nvmrc'
          cache: 'npm'
          cache-dependency-path: package-lock.json

      - name: Install dependencies
        run: npm ci --prefer-offline --no-audit --fund=false

      - name: Automation preflight
        run: npm run automation:preflight

      - name: Run automation audit
        env:
          OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
          OPENROUTER_MODEL: meta-llama/llama-3.2-3b-instruct:free
        run: node automation/ai-automation-audit-agent.cjs run

      - name: Run automation self-healing
        run: node automation/ai-automation-self-healing-agent.cjs run

      - name: Upload report
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: automation-audit-report
          path: automation/reports/automation-audit-latest.json
          if-no-files-found: ignore
