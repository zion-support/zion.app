# Ensures ai-observability-ema-webhook-daily.yml keeps auth/concurrency/push-helper safety anchors (grep-only).

name: observability EMA webhook workflow smoke (weekly)

permissions:
  contents: read

on:
  schedule:
    - cron: '25 7 * * 2' # Tuesdays 07:25 UTC
  workflow_dispatch:

concurrency:
  group: workflow-observability-ema-webhook-smoke-weekly
  cancel-in-progress: false

jobs:
  observability-workflow:
    runs-on: ubuntu-latest
    timeout-minutes: 2
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: ai-observability-ema-webhook-daily.yml anchors
        run: |
          set -euo pipefail
          f=.github/workflows/ai-observability-ema-webhook-daily.yml
          test -f "$f"
          test -s "$f"
          grep -Fq 'name: Observability EMA webhook digest' "$f"
          grep -Fq 'group: ai-observability-ema-webhook-daily' "$f"
          grep -Fq 'cancel-in-progress: false' "$f"
          grep -Fq 'token:' "$f" && grep -Fq 'github.token' "$f"
          grep -Fq "node-version-file: '.nvmrc'" "$f"
          grep -Fq 'bash scripts/automation/commit-and-push-main.sh' "$f"
          echo "ok: $f"
