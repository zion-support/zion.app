# Ensures workflow-grep-guards-weekly.yml keeps Sunday schedule + full grep run (grep-only).
name: workflow grep guards weekly workflow smoke (weekly)
permissions:
  contents: read
on:
  schedule:
    - cron: '48 8 * * 4' # Thursdays 08:48 UTC
  workflow_dispatch:
concurrency:
  group: workflow-grep-guards-weekly-smoke-weekly
  cancel-in-progress: true
jobs:
  weekly-guards:
    runs-on: ubuntu-latest
    timeout-minutes: 2
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - name: workflow-grep-guards-weekly.yml anchors
        run: |
          set -euo pipefail
          f=.github/workflows/workflow-grep-guards-weekly.yml
          test -f "$f"
          test -s "$f"
          grep -Fq 'name: Workflow grep guards (weekly)' "$f"
          grep -Fq "cron: '55 6 * * 0'" "$f"
          grep -Fq 'group: workflow-grep-guards-weekly' "$f"
          grep -Fq 'bash scripts/automation/run-workflow-grep-guards.sh' "$f"
          echo "ok: $f"
