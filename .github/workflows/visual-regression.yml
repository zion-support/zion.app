permissions:
  contents: read
name: "Autonomous Visual Regression Detector"

on:
  schedule:
    - cron: '30 2 * * *'  # Daily 02:30 UTC
  workflow_dispatch:

jobs:
  visual-regression:
    name: UI Visual Regression
    runs-on: ubuntu-latest
    permissions:
      contents: read
      issues: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci --include=dev

      - name: Start app (needed for screenshots)
        run: |
          npm run build
          nohup npm start &
          for i in 1 2 3 4 5; do
            if curl -sf http://localhost:3000 > /dev/null; then
              echo "App started"
              break
            fi
            echo "Waiting for app..."
            sleep 5
          done

      - name: Run Visual Regression Detector
        id: detector
        continue-on-error: true
        run: |
          APP_URL=http://localhost:3000 node automation/visual-regression.cjs > /tmp/vr-output.txt || true
          echo "exit_code=$?" >> $GITHUB_OUTPUT

      - name: Upload artifacts
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: visual-regression-artifacts
          path: |
            .hermes/memory/visual-regression/current/*.png
            .hermes/memory/visual-regression/baseline/*.png
            .hermes/memory/visual-regression/diffs/*.png
          retention-days: 7

      - name: Check for alerts
        run: |
          if [ "${{ steps.detector.outputs.exit_code }}" -ne 0 ]; then
            echo "Visual regressions detected"
            exit 1
          fi

      - name: Open GitHub issue on visual regression
        if: failure()
        uses: actions/github-script@v9
        with:
          script: |
            const fs = require('fs');
            const diffDir = '.hermes/memory/visual-regression/diffs';
            const files = fs.readdirSync(diffDir).filter(f => f.endsWith('-diff.png'));
            const pages = files.map(f => f.replace('-diff.png', '')).join(', ');

            const body = `🚨 **Visual Regression Detected**\n\n`;
            body += `The following page/viewport combinations have visual changes exceeding threshold:\n\n`;
            body += `**Pages:** ${pages}\n\n`;
            body += `Review the attached diff images (red pixels show changes). If changes are intentional, update the baseline.\n\n`;
            body += `*Committed by: ${context.payload.committer?.name || 'scheduler'}*\n`;

            const title = `🚨 Visual Regression — ${new Date().toISOString().slice(0,10)}`;
            const existing = await github.rest.issues.listForRepo({
              owner: context.repo.owner,
              repo: context.repo.repo,
              labels: ['visual-regression', 'ui', 'autonomous'],
              state: 'open'
            });
            const already = existing.data.find((i: any) => i.title.startsWith('🚨 Visual Regression'));
            if (!already) {
              await github.rest.issues.create({
                owner: context.repo.owner,
                repo: context.repo.repo,
                title,
                body,
                labels: ['visual-regression', 'ui', 'autonomous', 'blocker']
              });
            }

      - name: Notify Telegram on alerts
        if: failure()
        run: |
          node automation/notify-telegram.js "🚨 Visual regression detected. Check GitHub issues for before/after/diff images."
