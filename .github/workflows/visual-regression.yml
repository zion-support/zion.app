permissions:
  contents: read
name: Autonomous Visual Regression Detector
true:
  schedule:
  - cron: 30 2 * * *
  workflow_dispatch: null
jobs:
  visual-regression:
    name: UI Visual Regression
    runs-on: ubuntu-latest
    permissions:
      contents: read
      issues: write
    steps:
    - name: Checkout repository
      uses: actions/checkout@v6
    - name: Setup Node.js
      uses: actions/setup-node@v6
      with:
        node-version: '20'
        cache: npm
    - name: Install dependencies
      run: npm ci --include=dev
    - name: Start app (needed for screenshots)
      run: "npm run build\nnohup npm start &\nfor i in 1 2 3 4 5; do\n  if curl -sf\
        \ http://localhost:3000 > /dev/null; then\n    echo \"App started\"\n    break\n\
        \  fi\n  echo \"Waiting for app...\"\n  sleep 5\ndone\n"
    - name: Run Visual Regression Detector
      id: detector
      continue-on-error: true
      run: 'APP_URL=http://localhost:3000 node automation/visual-regression.cjs >
        /tmp/vr-output.txt || true

        echo "exit_code=$?" >> $GITHUB_OUTPUT

        '
    - name: Upload artifacts
      if: always()
      uses: actions/upload-artifact@v7
      with:
        name: visual-regression-artifacts
        path: '.hermes/memory/visual-regression/current/*.png

          .hermes/memory/visual-regression/baseline/*.png

          .hermes/memory/visual-regression/diffs/*.png

          '
        retention-days: 7
    - name: Check for alerts
      run: "if [ \"${{ steps.detector.outputs.exit_code }}\" -ne 0 ]; then\n  echo\
        \ \"Visual regressions detected\"\n  exit 1\nfi\n"
    - name: Open GitHub issue on visual regression
      if: failure()
      uses: actions/github-script@v9
      with:
        script: "const fs = require('fs');\nconst diffDir = '.hermes/memory/visual-regression/diffs';\n\
          const files = fs.readdirSync(diffDir).filter(f => f.endsWith('-diff.png'));\n\
          const pages = files.map(f => f.replace('-diff.png', '')).join(', ');\n\n\
          const body = `\U0001F6A8 **Visual Regression Detected**\\n\\n`;\nbody +=\
          \ `The following page/viewport combinations have visual changes exceeding\
          \ threshold:\\n\\n`;\nbody += `**Pages:** ${pages}\\n\\n`;\nbody += `Review\
          \ the attached diff images (red pixels show changes). If changes are intentional,\
          \ update the baseline.\\n\\n`;\nbody += `*Committed by: ${context.payload.committer?.name\
          \ || 'scheduler'}*\\n`;\n\nconst title = `\U0001F6A8 Visual Regression \u2014\
          \ ${new Date().toISOString().slice(0,10)}`;\nconst existing = await github.rest.issues.listForRepo({\n\
          \  owner: context.repo.owner,\n  repo: context.repo.repo,\n  labels: ['visual-regression',\
          \ 'ui', 'autonomous'],\n  state: 'open'\n});\nconst already = existing.data.find((i:\
          \ any) => i.title.startsWith('\U0001F6A8 Visual Regression'));\nif (!already)\
          \ {\n  await github.rest.issues.create({\n    owner: context.repo.owner,\n\
          \    repo: context.repo.repo,\n    title,\n    body,\n    labels: ['visual-regression',\
          \ 'ui', 'autonomous', 'blocker']\n  });\n}\n"
    - name: Notify Telegram on alerts
      if: failure()
      run: "node automation/notify-telegram.js \"\U0001F6A8 Visual regression detected.\
        \ Check GitHub issues for before/after/diff images.\"\n"
    timeout-minutes: 10
