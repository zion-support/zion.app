name: robots-sitemap-compliance

on:
  schedule:
    - cron: '0 3 * * 1'  # Mondays 03:00 UTC
  workflow_dispatch:     # allow manual runs

permissions:
  contents: read
  issues: write

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: '20'

      - name: Install deps
        run: npm ci

      - name: Run robots/sitemap compliance check
        run: node automation/robots-sitemap-check.cjs
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
