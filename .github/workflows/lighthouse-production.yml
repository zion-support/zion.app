name: Lighthouse Production Audit

permissions:
  contents: read

concurrency:
  group: lighthouse-production
  cancel-in-progress: false

on:
  schedule:
    - cron: '0 12 * * 0'
  workflow_dispatch:

jobs:
  lighthouse-production:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Setup Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version-file: '.nvmrc'
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Install dependencies
        run: npm ci --prefer-offline --no-audit --fund=false

      - name: Run Lighthouse production audit
        run: npm run lighthouse:production

      - name: Upload report
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: lighthouse-production-${{ github.run_id }}
          path: automation/reports/lighthouse-production-latest.json
          if-no-files-found: ignore
          retention-days: 30
