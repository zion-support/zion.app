# AI Weekly Security Audit
# Runs npm audit, creates GitHub issue on high/critical vulnerabilities.
# Complements dependency-review (PR-time) and CodeQL (code security).
# Runs: Weekly Sunday 5 AM UTC, or workflow_dispatch

name: AI Weekly Security Audit

permissions:
  contents: read
  issues: write

concurrency:
  group: ai-weekly-security-audit
  cancel-in-progress: false

on:
  schedule:
    - cron: '0 5 * * 0'
  workflow_dispatch:

jobs:
  security-audit:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    env:
      NEXT_TELEMETRY_DISABLED: "1"
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Setup Node.js
        uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6.3.0
        with:
          node-version-file: '.nvmrc'
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Install dependencies
        run: npm ci --prefer-offline --no-audit --fund=false

      - name: Run vulnerability alert agent
        id: vuln
        run: |
          node automation/ai-dependency-vulnerability-alert-agent.cjs run
          if [ -f automation/reports/dependency-vulnerability-alert-latest.json ]; then
            CRITICAL=$(node -e "try{const r=require('./automation/reports/dependency-vulnerability-alert-latest.json');console.log(String(r.critical||0))}catch(e){console.log('0')}")
            HIGH=$(node -e "try{const r=require('./automation/reports/dependency-vulnerability-alert-latest.json');console.log(String(r.high||0))}catch(e){console.log('0')}")
            echo "critical=$CRITICAL" >> "$GITHUB_OUTPUT"
            echo "high=$HIGH" >> "$GITHUB_OUTPUT"
          else
            echo "critical=0" >> "$GITHUB_OUTPUT"
            echo "high=0" >> "$GITHUB_OUTPUT"
          fi

      - name: Create issue on high/critical vulnerabilities
        if: steps.vuln.outputs.critical != '0' || steps.vuln.outputs.high != '0'
        uses: actions/github-script@ed597411d8f924073f98dfc5c65a23a2325f34cd # v8.0.0
        with:
          script: |
            const fs = require('fs');
            const reportPath = 'automation/reports/dependency-vulnerability-alert-latest.json';
            let body = '## Weekly Security Audit\n\n';
            if (fs.existsSync(reportPath)) {
              const report = JSON.parse(fs.readFileSync(reportPath, 'utf8'));
              body += `**Critical:** ${report.critical || 0}\n**High:** ${report.high || 0}\n\n`;
              const vulns = [...(report.criticalList || []), ...(report.highList || [])];
              if (vulns.length) {
                body += '### Vulnerabilities\n\n';
                vulns.slice(0, 20).forEach(v => {
                  body += `- **${v.name}** (${v.severity || 'high'}): ${v.via || 'N/A'}\n`;
                });
              }
            }
            body += '\n\nRun `npm audit` for details. Consider `npm audit fix` for auto-fixable issues.';

            const { data: issues } = await github.rest.issues.listForRepo({
              ...context.repo,
              state: 'open',
              labels: 'security',
              per_page: 5,
            });

            const existing = issues.find(i => i.title.includes('Dependency Vulnerabilities'));
            if (existing) {
              await github.rest.issues.createComment({
                ...context.repo,
                issue_number: existing.number,
                body: `## Update — ${new Date().toISOString().split('T')[0]}\n\n${body}`,
              });
            } else {
              await github.rest.issues.create({
                ...context.repo,
                title: `🔒 Dependency Vulnerabilities — ${new Date().toISOString().split('T')[0]}`,
                body,
                labels: ['security', 'dependencies'],
              });
            }

      - name: Summary
        if: always()
        run: |
          echo "## Weekly Security Audit" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "| Severity | Count |" >> "$GITHUB_STEP_SUMMARY"
          echo "|----------|-------|" >> "$GITHUB_STEP_SUMMARY"
          echo "| Critical | ${{ steps.vuln.outputs.critical || '0' }} |" >> "$GITHUB_STEP_SUMMARY"
          echo "| High | ${{ steps.vuln.outputs.high || '0' }} |" >> "$GITHUB_STEP_SUMMARY"

      - name: Upload report
        if: always()
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7.0.0
        with:
          name: security-audit-${{ github.run_id }}
          path: automation/reports/dependency-vulnerability-alert-latest.json
          if-no-files-found: ignore
          retention-days: 30
