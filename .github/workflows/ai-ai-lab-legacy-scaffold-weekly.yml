name: AI AI Lab legacy scaffold weekly

permissions:
  contents: read
  issues: write

concurrency:
  group: ai-ai-lab-legacy-scaffold-weekly
  cancel-in-progress: false

on:
  workflow_dispatch:
  schedule:
    - cron: '25 10 * * 1'

jobs:
  legacy-scan:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Setup Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version-file: '.nvmrc'
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Install dependencies
        run: npm ci --prefer-offline --no-audit --fund=false

      - name: Run legacy scaffold scan
        run: node automation/ai-lab-legacy-scaffold-scan.cjs

      - name: Escalate or auto-close by threshold
        env:
          GH_TOKEN: ${{ github.token }}
          COOLDOWN_HOURS: '24'
        run: node automation/escalate-ai-lab-legacy-scaffold-drift.cjs

      - name: Upload legacy scan report
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: ai-lab-legacy-scaffold-scan-${{ github.run_id }}
          path: automation/reports/ai-lab-legacy-scaffold-scan-latest.json
          if-no-files-found: ignore
          retention-days: 30
