# Ensures workflow-push-helpers-bash-fast.yml keeps push-helper path triggers + bash -n (grep-only).
name: push helpers bash fast smoke (weekly)
permissions:
  contents: read
on:
  schedule:
    - cron: '14 10 * * 4' # Thursdays 10:14 UTC
  workflow_dispatch:
concurrency:
  group: workflow-push-helpers-bash-fast-smoke-weekly
  cancel-in-progress: true
jobs:
  bash-fast:
    runs-on: ubuntu-latest
    timeout-minutes: 2
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - name: workflow-push-helpers-bash-fast.yml anchors
        run: |
          set -euo pipefail
          f=.github/workflows/workflow-push-helpers-bash-fast.yml
          test -f "$f"
          test -s "$f"
          grep -Fq 'name: Workflow push helpers bash syntax (script files)' "$f"
          grep -Fq 'commit-and-push-main.sh' "$f"
          grep -Fq 'push-main-with-retry.sh' "$f"
          grep -Fq 'group: workflow-push-helpers-bash-fast-' "$f"
          grep -Fq 'github.ref' "$f"
          grep -Fq 'bash -n scripts/automation/commit-and-push-main.sh' "$f"
          echo "ok: $f"
