# AI App Quality Audit
# Runs Lighthouse, performance regression tracking, and live-site accessibility audit.
# Feeds into report aggregator for unified dashboard.
# Runs: Weekly Sunday 5 AM UTC

name: AI App Quality Audit

permissions:
  contents: read

on:
  schedule:
    - cron: '0 5 * * 0'
  workflow_dispatch:

concurrency:
  group: app-quality-audit
  cancel-in-progress: false

jobs:
  app-quality-audit:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    env:
      NEXT_TELEMETRY_DISABLED: "1"
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version-file: '.nvmrc'
          cache: 'npm'
          cache-dependency-path: package-lock.json

      - name: Install dependencies
        run: npm ci --prefer-offline --no-audit --fund=false

      - name: Lighthouse production audit
        run: npm run lighthouse:production

      - name: Performance regression check
        run: npm run perf:regression

      - name: Live site accessibility audit
        run: npm run a11y:live

      - name: Evolution ideas from quality
        run: npm run app:evolution-ideas-from-quality

      - name: Report aggregator
        run: node automation/ai-report-aggregator-agent.cjs

      - name: Upload quality reports
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: quality-audit-reports
          path: |
            automation/reports/lighthouse-production-latest.json
            automation/reports/performance-regression-latest.json
            automation/reports/live-site-accessibility-audit-latest.json
            automation/reports/evolution-ideas-from-quality-latest.json
          retention-days: 7
