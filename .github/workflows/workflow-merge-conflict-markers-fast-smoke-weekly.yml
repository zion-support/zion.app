# Ensures workflow-merge-conflict-markers-fast.yml keeps script path triggers + merge-marker scan (grep-only).
name: merge conflict markers fast smoke (weekly)
permissions:
  contents: read
on:
  schedule:
    - cron: '2 10 * * 4' # Thursdays 10:02 UTC
  workflow_dispatch:
concurrency:
  group: workflow-merge-conflict-markers-fast-smoke-weekly
  cancel-in-progress: true
jobs:
  merge-markers-fast:
    runs-on: ubuntu-latest
    timeout-minutes: 2
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - name: workflow-merge-conflict-markers-fast.yml anchors
        run: |
          set -euo pipefail
          f=.github/workflows/workflow-merge-conflict-markers-fast.yml
          test -f "$f"
          test -s "$f"
          grep -Fq 'name: Merge conflict markers check (script file)' "$f"
          grep -Fq 'check-merge-conflict-markers.cjs' "$f"
          grep -Fq 'group: workflow-merge-conflict-markers-fast-' "$f"
          grep -Fq 'github.ref' "$f"
          grep -Fq "node-version-file: '.nvmrc'" "$f"
          echo "ok: $f"
