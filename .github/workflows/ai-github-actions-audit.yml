# AI GitHub Actions & App Audit
# Audits all workflows and live ziontechgroup.com via OpenRouter LLM.
# Suggests workflow improvements, new automations, and app enhancements.
# Runs: Weekly Sunday 9 AM UTC, or workflow_dispatch

name: AI GitHub Actions & App Audit

permissions:
  contents: read

concurrency:
  group: ai-github-actions-audit
  cancel-in-progress: false

on:
  schedule:
    - cron: '0 9 * * 0'
  workflow_dispatch:
    inputs:
      auto_commit:
        description: 'Commit and push workflow improvements to main'
        required: false
        default: false
        type: boolean
  push:
    branches: [main]
    paths:
      - '.github/workflows/**/*.yml'
      - 'automation/**/*.cjs'
      - 'automation/**/*.mjs'
      - 'automation/**/*.ts'
      - 'automation/**/*.tsx'

jobs:
  audit:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    timeout-minutes: 25
    env:
      NEXT_TELEMETRY_DISABLED: "1"
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          token: ${{ github.token }}
      - name: Setup Node.js
        uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6.3.0
        with:
          node-version-file: '.nvmrc'
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Install dependencies
        run: npm ci --prefer-offline --no-audit --fund=false

      - name: Automation preflight
        run: npm run automation:preflight

      - name: Run GitHub Actions + App Audit
        env:
          OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
          OPENROUTER_MODEL: meta-llama/llama-3.2-3b-instruct:free
        run: node automation/ai-github-actions-audit-agent.cjs run

      - name: Configure git for commits
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

      - name: Apply safe workflow improvements
        env:
          AUTO_COMMIT: ${{ (github.event_name == 'schedule' || github.event.inputs.auto_commit == 'true') && '1' || '0' }}
        run: node automation/ai-github-actions-implementation-agent.cjs run

      - name: Merge app automation ideas into evolution backlog
        id: merge_ideas
        run: |
          node automation/merge-github-actions-app-ideas-to-backlog.cjs
          if git diff --quiet automation/data/app-evolution-backlog.json 2>/dev/null; then
            echo "backlog_updated=false" >> "$GITHUB_OUTPUT"
          else
            echo "backlog_updated=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Commit evolution backlog when updated
        if: steps.merge_ideas.outputs.backlog_updated == 'true' && (github.event_name == 'schedule' || github.event.inputs.auto_commit == 'true')
        run: |
          git add automation/data/app-evolution-backlog.json
          if git diff --staged --quiet; then
            exit 0
          fi
          bash scripts/automation/commit-and-push-main.sh "chore(automation): merge app automation ideas from GitHub Actions audit into evolution backlog"

      - name: Trigger deploy step skipped (was Netlify)
        if: false
        continue-on-error: true
        run: |
          echo "Deploy step skipped — Netlify retired, use GitHub Pages via deploy-on-push.yml"

      - name: Upload audit report
        if: always()
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7.0.0
        with:
          name: github-actions-audit-${{ github.run_id }}
          path: |
            automation/reports/github-actions-audit-latest.json
            automation/data/github-actions-audit-suggestions.json
          if-no-files-found: ignore
          retention-days: 30
