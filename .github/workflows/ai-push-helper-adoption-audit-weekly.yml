name: AI Push helper adoption audit (weekly)

permissions:
  contents: read

on:
  schedule:
    - cron: '34 15 * * 1'
  pull_request:
    paths:
      - "automation/audit-push-helper-adoption.cjs"
  workflow_dispatch:

concurrency:
  group: ai-push-helper-adoption-audit-weekly
  cancel-in-progress: true

jobs:
  audit:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    env:
      NEXT_TELEMETRY_DISABLED: "1"
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Setup Node.js
        uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6.3.0
        with:
          node-version-file: '.nvmrc'
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Install dependencies
        run: npm ci --prefer-offline --no-audit --fund=false

      - name: Run push-helper adoption audit
        run: node automation/audit-push-helper-adoption.cjs

      - name: Upload adoption report artifact
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: push-helper-adoption-${{ github.run_id }}
          path: automation/reports/workflow-push-helper-adoption-latest.json
          if-no-files-found: error
          retention-days: 14
