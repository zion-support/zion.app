name: AI Development Speed Accelerator

permissions:
  contents: write

concurrency:
  group: ai-development-speed-accelerator
  cancel-in-progress: false

on:
  schedule:
    - cron: '0 11 * * 2'
  workflow_dispatch:
    inputs:
      auto_commit:
        description: 'Allow agent to commit generated changes'
        required: false
        default: true
        type: boolean

jobs:
  development-speed-accelerator:
    runs-on: ubuntu-latest
    timeout-minutes: 45
    env:
      NEXT_TELEMETRY_DISABLED: "1"
    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 1
          token: ${{ github.token }}

      - name: Setup Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version-file: '.nvmrc'
          cache: 'npm'
          cache-dependency-path: package-lock.json

      - name: Install dependencies
        run: npm ci --prefer-offline --no-audit --fund=false

      - name: Configure Git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

      - name: Run AI Development Speed Accelerator
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          AUTO_COMMIT: ${{ (github.event_name == 'schedule' || github.event.inputs.auto_commit != 'false') && 'true' || 'false' }}
          AUTO_PUSH: 'false'
          CONTINUOUS_MODE: 'false'
          INTERVAL_SECONDS: '30'
          PARALLEL_TASKS: '4'
          MAX_FEATURES_PER_RUN: '6'
          FAST_MODE: 'true'
          SKIP_TESTS: 'true'
        run: node automation/ai-development-speed-accelerator.cjs run

      - name: Push changes
        if: success()
        run: |
          if [[ -z "$(git status --porcelain)" ]]; then
            echo "No changes to push"
            exit 0
          fi
          git fetch origin main --depth=1
          if ! git rebase origin/main; then
            echo "::warning::Rebase conflict — skipping push."
            git rebase --abort || true
            exit 0
          fi
          bash scripts/automation/push-main-with-retry.sh

