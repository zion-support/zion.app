# Scheduled scan for unresolved merge conflict markers on main (complements PR-scoped checks).

name: Merge conflict markers (weekly)

permissions:
  contents: read

on:
  schedule:
    - cron: '42 6 * * 0' # Sundays 06:42 UTC
  workflow_dispatch:

concurrency:
  group: workflow-merge-conflict-markers-weekly
  cancel-in-progress: true

jobs:
  scan:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    env:
      NEXT_TELEMETRY_DISABLED: "1"
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Setup Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version-file: '.nvmrc'
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Install dependencies
        run: npm ci --prefer-offline --no-audit --fund=false

      - name: Check tracked files for merge conflict markers
        run: node scripts/automation/check-merge-conflict-markers.cjs
