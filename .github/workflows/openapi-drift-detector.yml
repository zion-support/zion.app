permissions:
  contents: read
name: "OpenAPI Contract Drift Detector"

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    - cron: '0 12 * * *'  # Daily at 12:00 UTC
  workflow_dispatch:

jobs:
  openapi-drift:
    name: Detect OpenAPI Drift
    runs-on: ubuntu-latest
    permissions:
      contents: read
      issues: write
      pull-requests: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run OpenAPI Drift Detector
        id: drift
        env:
          OPENAPI_SPEC_PATH: ${{ runner.temp }}/openapi-spec.json
          OPENAPI_HISTORY_PATH: ${{ runner.temp }}/openapi-history.json
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: |
          node automation/openapi-drift-detector.cjs
          echo "drift_status=$?" >> $GITHUB_OUTPUT

      - name: Upload violations artifact
        if: failure()
        uses: actions/upload-artifact@v7
        with:
          name: openapi-violations
          path: .hermes/memory/openapi-drift/violations.json
          retention-days: 7

      - name: Comment on PR if drift detected
        if: github.event_name == 'pull_request' && failure()
        uses: actions/github-script@v9
        with:
          script: |
            const fs = require('fs');
            const violationsPath = '.hermes/memory/openapi-drift/violations.json';
            let msg = '🚨 **OpenAPI Contract Drift Detected**\n\n';
            try {
              const v = JSON.parse(fs.readFileSync(violationsPath, 'utf8'));
              msg += '**Breaking changes:**\n';
              v.breaking.forEach((b: string) => msg += `- ${b}\n`);
              if (v.additions?.length) {
                msg += '\n**Non-breaking additions:**\n';
                v.additions.forEach((a: string) => msg += `- ${a}\n`);
              }
              if (v.removals?.length) {
                msg += '\n**Deprecations/removals:**\n';
              v.removals.forEach((r: string) => msg += `- ${r}\n`);
              }
              msg += '\nPlease review the API contract changes before merging. The baseline spec has been updated in this run for reference.';
            } catch (e) {
              msg += 'Drift detected but could not read detailed violations file. Check workflow logs.';
            }
            github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body: msg
            });

      # Optional: open issue on main branch drift for sustained violations
      - name: Open GitHub issue on main branch drift
        if: github.event_name == 'push' && failure() && github.ref == 'refs/heads/main'
        uses: actions/github-script@v9
        with:
          script: |
            const fs = require('fs');
            const title = '🚨 API Contract Drift Detected on Main';
            const violationsPath = '.hermes/memory/openapi-drift/violations.json';
            let body = '**Breaking API contract changes detected on `main`.**\n\n';
            try {
              const v = JSON.parse(fs.readFileSync(violationsPath, 'utf8'));
              body += '**Breaking changes:**\n';
              v.breaking.forEach((b: string) => body += `- ${b}\n`);
              if (v.additions?.length) {
                body += '\n**Additions:**\n';
                v.additions.forEach((a: string) => body += `- ${a}\n`);
              }
            } catch (e) {
              body += 'Could not parse violations; see workflow logs.';
             }
            body += `\n*Committed by: ${context.payload.committer?.name || 'unknown'}*\n`;
            body += `*Commit: ${context.payload.headCommit?.id?.slice(0, 7) || 'N/A'}*\n`;
            const existing = await github.rest.issues.listForRepo({
              owner: context.repo.owner,
              repo: context.repo.repo,
              labels: ['openapi-drift', 'automation'],
              state: 'open'
            });
            const already = existing.data.find((i: any) => i.title === title);
            if (!already) {
              await github.rest.issues.create({
                owner: context.repo.owner,
                repo: context.repo.repo,
                title,
                body,
                labels: ['openapi-drift', 'autonomous', 'breaking-change', 'api']
              });
            }

      - name: Notify Telegram on failure
        if: failure()
        run: |
          node automation/notify-telegram.js "🚨 OpenAPI Drift Detector failed — breaking contract change detected. Check GitHub issues or workflow logs."

      - name: Notify Telegram on success (non-breaking updates)
        if: success() && steps.drift.outputs.stdout != ''
        run: |
          node automation/notify-telegram.js "✅ OpenAPI Drift Detector passed — no breaking changes. Contract baseline updated."
