name: AI Openclaw Auth Runtime Diagnostic

permissions:
  contents: read
  issues: write

concurrency:
  group: ai-openclaw-auth-runtime-diagnostic
  cancel-in-progress: false

on:
  schedule:
    - cron: '25 */6 * * *'
  workflow_dispatch:

jobs:
  auth-runtime-diagnostic:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    env:
      NEXT_TELEMETRY_DISABLED: "1"
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Setup Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version-file: '.nvmrc'
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Install dependencies
        run: npm ci --prefer-offline --no-audit --fund=false

      - name: Run Openclaw auth/runtime diagnostic
        run: npm run openclaw:auth:diagnose
        continue-on-error: true

      - name: Attempt Openclaw self-heal cycle before escalation
        if: always()
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          report="automation/reports/openclaw-auth-runtime-diagnostic-latest.json"
          [ -f "$report" ] || exit 0
          status=$(node -e "const fs=require('fs');const r=JSON.parse(fs.readFileSync('$report','utf8'));console.log(r.status||'unknown')")
          if [ "$status" = "ok" ]; then
            exit 0
          fi
          gh workflow run ai-openclaw-autonomous-cycle.yml || true

      - name: Upload diagnostic artifact
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: openclaw-auth-runtime-diagnostic-${{ github.run_id }}
          path: automation/reports/openclaw-auth-runtime-diagnostic-latest.json
          if-no-files-found: ignore
          retention-days: 30

      - name: Open issue on diagnostic failure
        if: always()
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          export COOLDOWN_HOURS=$(node -p "try{const j=require('./automation/reports/incident-suppression-registry-latest.json');Number(j.openclawCooldownHours||j.recommendedCooldownHours||12)}catch(e){12}")
          report="automation/reports/openclaw-auth-runtime-diagnostic-latest.json"
          [ -f "$report" ] || exit 0
          status=$(node -e "const fs=require('fs');const r=JSON.parse(fs.readFileSync('$report','utf8'));console.log(r.status||'unknown')")
          if [ "$status" = "ok" ]; then
            echo "Openclaw auth/runtime diagnostic healthy."
            export ISSUE_FINGERPRINT="openclaw-auth-runtime-diagnostic"
            export CLOSE_COMMENT="Auto-closing: Openclaw auth/runtime checks recovered."
            node scripts/automation/gh-issue-close-on-recovery.cjs || true
            exit 0
          fi
          body_file="openclaw-auth-runtime-diagnostic.md"
          {
            echo "## Openclaw auth/runtime diagnostic warning"
            echo ""
            echo "- **Dedupe key:** \`openclaw-auth-runtime-diagnostic\`"
            echo ""
            echo "- Workflow run: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
            echo "- Report: \`automation/reports/openclaw-auth-runtime-diagnostic-latest.json\`"
            echo ""
            node -e "const fs=require('fs');const r=JSON.parse(fs.readFileSync('$report','utf8'));console.log('### Failing checks');for(const c of (r.failingChecks||[])){console.log('- '+c)}"
            echo ""
            echo "Please remediate Openclaw runtime/auth drift and re-run diagnostic."
          } > "$body_file"
          export ISSUE_TITLE="Openclaw auth/runtime diagnostic warning"
          export ISSUE_BODY_FILE="$body_file"
          export ISSUE_LABELS="bug"
          export ISSUE_FINGERPRINT="openclaw-auth-runtime-diagnostic"
          node scripts/automation/gh-issue-dedupe-or-create.cjs || true
