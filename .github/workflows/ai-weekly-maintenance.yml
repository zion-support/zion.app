name: AI Weekly Maintenance

permissions:
  contents: read

concurrency:
  group: ai-weekly-maintenance
  cancel-in-progress: false

on:
  schedule:
    - cron: '0 12 * * 4'
  workflow_dispatch:

jobs:
  weekly-maintenance:
    runs-on: ubuntu-latest
    timeout-minutes: 35
    env:
      NEXT_TELEMETRY_DISABLED: "1"
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Setup Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version-file: '.nvmrc'
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Install dependencies
        run: npm ci --prefer-offline --no-audit --fund=false

      - name: Dependency outdated check
        run: node automation/ai-dependency-outdated-agent.cjs run

      - name: Dead code detector
        run: node automation/ai-dead-code-detector-agent.cjs run

      - name: Bundle size monitor
        run: node automation/ai-bundle-size-monitor-agent.cjs run

      - name: Upload maintenance reports
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: weekly-maintenance-${{ github.run_id }}
          path: |
            automation/reports/dependency-outdated-latest.json
            automation/reports/dead-code-detector-latest.json
            automation/reports/bundle-size-monitor-latest.json
            automation/data/bundle-size-history.json
            automation/data/dependency-outdated-history.json
          if-no-files-found: ignore
          retention-days: 14
