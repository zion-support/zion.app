permissions:
  contents: read
name: "Autonomous Structured Data (Schema.org) Validator"

on:
  schedule:
    - cron: '0 9 * * 1'  # Weekly Monday 09:00 UTC
  workflow_dispatch:

jobs:
  schema-validate:
    name: Validate Structured Data
    runs-on: ubuntu-latest
    permissions:
      contents: write
      issues: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci --include=dev

      - name: Ensure local site is accessible
        id: check-site
        continue-on-error: true
        run: |
          # Try to hit the site; if down, attempt local build+start (best-effort)
          if curl -s -o /dev/null -w "%{http_code}" http://localhost:3000 | grep -q '^2'; then
            echo "site_up=true" >> $GITHUB_OUTPUT
          else
            echo "Site not up; attempting local build..."
            npm run build || true
            # Background start (non-blocking; validator may still fail if site doesn't respond)
            nohup npm start &>/tmp/next-start.log &
            sleep 30
            echo "site_up=attempted" >> $GITHUB_OUTPUT
          fi

      - name: Run Schema Validator
        id: validator
        continue-on-error: true
        run: |
          node automation/schema-validator.cjs > /tmp/schema-validator-output.txt || true
          echo "exit_code=$?" >> $GITHUB_OUTPUT

      - name: Upload validator artifacts
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: schema-validator-state
          path: |
            .hermes/memory/schema-validator/
            /tmp/schema-validator-output.txt
          retention-days: 30

      - name: Notify Telegram on completion
        if: success()
        run: |
          node automation/notify-telegram.js "🔍 Schema validator: weekly scan complete. Check workflow artifacts for details."

      - name: Notify Telegram on errors
        if: failure()
        run: |
          node automation/notify-telegram.js "⚠️ Schema validator failed or site unreachable. Check workflow logs."
