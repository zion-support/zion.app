name: AutoRetryFailedWorkflows

on:
  check_suite:
    types: [completed]

jobs:
  retry:
    if: github.event.check_suite.conclusion == 'failure' && github.event.check_suite.check_runs[0].conclusion == 'failure'
    runs-on: ubuntu-latest
    steps:
      - name: Get workflow run ID
        id: runid
        run: |
          RUN_ID=$(curl -s -H "Authorization: token ${{ secrets.GITHUB_TOKEN }}" "https://api.github.com/repos/${{ github.repository_owner }}/${{ github.repository }}/actions/runs?check_suite_id=${{ github.event.check_suite.id }}" | jq -r '.workflow_runs[0].id')
          echo "run_id=$RUN_ID" >> $GITHUB_OUTPUT
      - name: Rerun
        run: |
          curl -X POST -H "Authorization: token ${{ secrets.GITHUB_TOKEN }}" "https://api.github.com/repos/${{ github.repository_owner }}/${{ github.repository }}/actions/runs/${{ steps.runid.outputs.run_id }}/rerun"