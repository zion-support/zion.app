name: Emergency Recovery - Minimal Build
true:
  workflow_dispatch: null
  push:
    branches:
    - main
jobs:
  recovery:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v6.0.2
    - uses: actions/setup-node@v6.3.0
      with:
        node-version: '20'
    - run: rm -rf node_modules .next node
    - run: npm install --force
    - run: npm run build
    timeout-minutes: 10
