name: AI Experiment Outcome Ledger

permissions:
  contents: read
  issues: write

concurrency:
  group: ai-experiment-outcome-ledger
  cancel-in-progress: false

on:
  schedule:
    - cron: '50 */6 * * *'
  workflow_dispatch:

jobs:
  ledger:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Setup Node.js
        uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6.3.0
        with:
          node-version-file: '.nvmrc'
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Install dependencies
        run: npm ci --prefer-offline --no-audit --fund=false

      - name: Refresh Openclaw inputs
        run: |
          npm run openclaw:skills:tune
          npm run openclaw:autonomous-once
        continue-on-error: true

      - name: Build experiment outcome ledger
        run: npm run ai:experiment:ledger

      - name: Upload ledger artifacts
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: experiment-outcome-ledger-${{ github.run_id }}
          path: |
            automation/reports/experiment-outcome-ledger-latest.json
            automation/reports/experiment-outcome-ledger-history.json
          if-no-files-found: ignore
          retention-days: 30

      - name: Escalate ledger degradation
        if: always()
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          report="automation/reports/experiment-outcome-ledger-latest.json"
          [ -f "$report" ] || exit 0
          status=$(node -e "const fs=require('fs');const j=JSON.parse(fs.readFileSync('$report','utf8'));console.log(j.status||'unknown')")
          if [ "$status" = "healthy" ]; then
            export ISSUE_FINGERPRINT="experiment-outcome-ledger-degraded"
            export CLOSE_COMMENT="Auto-closing: Experiment outcome ledger recovered to healthy status."
            node scripts/automation/gh-issue-close-on-recovery.cjs || true
            exit 0
          fi
          body_file="experiment-outcome-ledger.md"
          {
            echo "## Experiment outcome ledger degraded"
            echo ""
            echo "- Workflow run: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
            echo "- Report: \`automation/reports/experiment-outcome-ledger-latest.json\`"
            echo ""
            node -e "const fs=require('fs');const j=JSON.parse(fs.readFileSync('$report','utf8'));console.log('- signal: '+(j.signal??'n/a'));console.log('- deltaSignal: '+(j.deltaSignal??'n/a'));console.log('- recommendation: '+(j.recommendation||'n/a'));"
          } > "$body_file"
          export ISSUE_TITLE="Experiment outcome ledger degraded"
          export ISSUE_BODY_FILE="$body_file"
          export ISSUE_LABELS="automation,openclaw,experiments"
          export ISSUE_FINGERPRINT="experiment-outcome-ledger-degraded"
          node scripts/automation/gh-issue-dedupe-or-create.cjs || true
