name: AI Stale Promotion Guard

on:
  schedule:
    - cron: '0 */6 * * *'  # Every 6 hours
  workflow_dispatch:

permissions:
  contents: read
  issues: write

concurrency:
  group: ai-stale-promotion-guard
  cancel-in-progress: false

jobs:
  guard:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: npm
      
      - name: Install dependencies
        run: npm ci --prefer-offline --no-audit --fund=false
      
      - name: Run stale promotion check
        env:
          ZION_BASE_URL: https://ziontechgroup.com
        run: |
          npm run promotion:stale-check || true
      
      - name: Upload promotion report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: promotion-stale-report-${{ github.run_id }}
          path: automation/reports/promotion-stale-latest.json
          retention-days: 30
      
      - name: Create issue on stale promotion
        if: always()
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          report="automation/reports/promotion-stale-latest.json"
          if [ -f "$report" ]; then
            stale=$(node -e "const j=require('./$report');console.log(j.staleCount||0)")
            if [ "$stale" -gt 0 ]; then
              gh issue create --title "Stale Promotion Detected (${stale})" \
                --body "One or more promoted routes have become stale. Consider rolling back or updating." \
                --label "automation,maintenance" || true
            fi
          fi