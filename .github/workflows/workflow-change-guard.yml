name: Workflow Change Guard

permissions:
  contents: read

on:
  pull_request:
    paths:
      - '.github/workflows/**'
      - '.github/dependabot.yml'
      - '.github/CODEOWNERS'
      - 'automation/**'
      - 'scripts/automation/**'
      - 'package.json'
      - 'package-lock.json'
  push:
    branches: [main]
    paths:
      - '.github/workflows/**'
      - '.github/dependabot.yml'
      - '.github/CODEOWNERS'
      - 'automation/**'
      - 'scripts/automation/**'
      - 'package.json'
      - 'package-lock.json'
  workflow_dispatch:

concurrency:
  group: workflow-change-guard-${{ github.ref }}
  cancel-in-progress: true

jobs:
  validate-contracts:
    uses: ./.github/workflows/reusable-workflow-ci.yml
    with:
      run_contracts: true
    timeout-minutes: 14

  automation-guard:
    needs: validate-contracts
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Setup Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version-file: '.nvmrc'
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Install dependencies
        run: npm ci --prefer-offline --no-audit --fund=false

      - name: Automation preflight
        run: npm run automation:preflight
