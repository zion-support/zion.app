permissions:
  contents: read
name: "Autonomous SSL/TLS Certificate Expiration Monitor"

on:
  schedule:
    - cron: '0 7 * * 0'  # Weekly Sunday 07:00 UTC
  workflow_dispatch:

jobs:
  cert-monitor:
    name: Certificate Monitor
    runs-on: ubuntu-latest
    permissions:
      contents: read
      issues: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run Certificate Monitor
        id: monitor
        continue-on-error: true
        run: |
          node automation/cert-monitor.cjs > /tmp/cert-monitor-output.txt || true
          echo "exit_code=$?" >> $GITHUB_OUTPUT

      - name: Upload history artifact
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: cert-monitor-history
          path: .hermes/memory/cert-monitor/history.json
          retention-days: 30

      - name: Open GitHub issue on certificate expiry risk
        if: failure()
        uses: actions/github-script@v9
        with:
          script: |
            const fs = require('fs');
            const historyPath = '.hermes/memory/cert-monitor/history.json';
            let data = {};
            try { data = JSON.parse(fs.readFileSync(historyPath, 'utf8')); } catch(e) {}
            const latest = data.entries?.[data.entries.length-1]?.results || [];

            const expiring = latest.filter((r: any) => r.ok && r.daysLeft !== undefined && r.daysLeft <= 30);
            const errors = latest.filter((r: any) => !r.ok);

            let body = `🚨 **SSL/TLS Certificate Issues Detected**\n\n`;
            if (expiring.length) {
              body += `**Expiring soon (≤30 days):**\n`;
              for (const d of expiring) {
                body += `- ${d.domain}: ${d.daysLeft} days left (expires ${d.expiryDate})\n`;
              }
              body += '\n';
            }
            if (errors.length) {
              body += `**Errors/failed checks:**\n`;
              for (const e of errors) {
                body += `- ${e.domain}: ${e.error || 'Unknown error'}\n`;
              }
              body += '\n';
            }
            body += `\n*Committed by: ${context.payload.committer?.name || 'scheduler'}*\n`;

            const title = `🚨 SSL Certificate Alert — ${new Date().toISOString().slice(0,10)}`;
            const existing = await github.rest.issues.listForRepo({
              owner: context.repo.owner,
              repo: context.repo.repo,
              labels: ['ssl', 'certificate', 'autonomous', 'infra'],
              state: 'open'
            });
            const already = existing.data.find((i: any) => i.title.startsWith('🚨 SSL Certificate Alert'));
            if (!already) {
              await github.rest.issues.create({
                owner: context.repo.owner,
                repo: context.repo.repo,
                title,
                body,
                labels: ['ssl', 'certificate', 'autonomous', 'infra', 'blocker']
              });
            }

      - name: Notify Telegram on alerts
        if: failure()
        run: |
          node automation/notify-telegram.js "🚨 SSL certificate issues detected. Check GitHub issues for details."

      - name: Notify Telegram on success
        if: success()
        run: |
          node automation/notify-telegram.js "✅ SSL certificate check passed — all domains healthy."
