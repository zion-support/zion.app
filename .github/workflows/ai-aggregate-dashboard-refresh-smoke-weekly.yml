# Ensures ai-aggregate-dashboard-refresh.yml keeps schedule/script/artifact anchors (grep-only).
name: ai aggregate dashboard refresh workflow smoke (weekly)

permissions:
  contents: read

on:
  schedule:
    - cron: '30 12 * * 3' # Wednesdays 12:30 UTC
  workflow_dispatch:

concurrency:
  group: ai-aggregate-dashboard-refresh-smoke-weekly
  cancel-in-progress: true

jobs:
  aggregate-refresh-anchors:
    runs-on: ubuntu-latest
    timeout-minutes: 2
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: ai-aggregate-dashboard-refresh.yml anchors
        run: |
          set -euo pipefail
          f=.github/workflows/ai-aggregate-dashboard-refresh.yml
          test -f "$f"
          test -s "$f"
          grep -Fq 'name: AI aggregate dashboard refresh' "$f"
          grep -Fq 'group: ai-aggregate-dashboard-refresh' "$f"
          grep -Fq 'cancel-in-progress: false' "$f"
          grep -Fq "cron: '35 11,23 * * *'" "$f"
          grep -Fq 'ai-automation-health-monitor.cjs' "$f"
          grep -Fq 'ai-report-aggregator-agent.cjs' "$f"
          grep -Fq 'aggregate-dashboard-regression-check.cjs' "$f"
          grep -Fq 'actions/upload-artifact@' "$f"
          grep -Fq 'aggregate-refresh-' "$f"
          echo "ok: $f"
