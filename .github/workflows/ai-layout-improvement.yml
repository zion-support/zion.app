name: AI Layout Improvement Agent

permissions:
  contents: write
  issues: write

concurrency:
  group: ai-layout-improvement
  cancel-in-progress: false

on:
  schedule:
    - cron: '0 14 * * 2'
  workflow_dispatch:
    inputs:
      mode:
        description: 'Run mode'
        required: false
        default: 'run'
        type: choice
        options:
          - run
          - analyze
      priority:
        description: 'Priority mode'
        required: false
        default: 'all'
        type: choice
        options:
          - critical
          - high
          - medium
          - low
          - all

jobs:
  layout-improvement:
    runs-on: ubuntu-latest
    timeout-minutes: 45
    env:
      NEXT_TELEMETRY_DISABLED: "1"
    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 1
          token: ${{ github.token }}

      - name: Setup Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version-file: '.nvmrc'
          cache: 'npm'
          cache-dependency-path: package-lock.json

      - name: Install dependencies
        run: npm ci --prefer-offline --no-audit --fund=false

      - name: Configure Git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

      - name: Run AI Layout Improvement Agent
        env:
          GH_TOKEN: ${{ github.token }}
          AUTO_COMMIT: 'true'
          AUTO_PUSH: 'false'
          MAX_IMPROVEMENTS_PER_RUN: '50'
          PRIORITY_MODE: ${{ inputs.priority || 'all' }}
          INPUT_MODE: ${{ inputs.mode || 'run' }}
        run: node automation/ai-layout-improvement-agent.cjs "$INPUT_MODE"

      - name: Upload report artifact
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: layout-improvement-report-${{ github.run_id }}
          path: |
            automation/reports/layout-improvement-latest-report.json
            automation/logs/ai-layout-improvement.log
          if-no-files-found: ignore
          retention-days: 14

      - name: Push changes
        if: success()
        run: |
          if [[ -z "$(git status --porcelain)" ]]; then
            echo "No changes to push"
            exit 0
          fi
          git fetch origin main --depth=1
          if ! git rebase origin/main; then
            echo "::warning::Rebase conflict — skipping push."
            git rebase --abort || true
            exit 0
          fi
          bash scripts/automation/push-main-with-retry.sh
