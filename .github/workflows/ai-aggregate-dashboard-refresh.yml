name: AI aggregate dashboard refresh

permissions:
  contents: read

concurrency:
  group: ai-aggregate-dashboard-refresh
  cancel-in-progress: false

on:
  workflow_dispatch:
  schedule:
    - cron: '35 11,23 * * *'

jobs:
  refresh:
    runs-on: ubuntu-latest
    timeout-minutes: 25
    env:
      NEXT_TELEMETRY_DISABLED: '1'
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Setup Node.js
        uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6.3.0
        with:
          node-version-file: '.nvmrc'
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Install dependencies
        run: npm ci --prefer-offline --no-audit --fund=false

      - name: Merge Openclaw history + GHA cost estimate
        run: npm run openclaw:improver:history:merge && npm run gha:cost:estimate
        continue-on-error: true

      - name: Health monitor snapshot
        run: node automation/ai-automation-health-monitor.cjs
        continue-on-error: true

      - name: Regenerate aggregate dashboard
        run: node automation/ai-report-aggregator-agent.cjs

      - name: Aggregate regression snapshot
        run: node automation/aggregate-dashboard-regression-check.cjs
        continue-on-error: true

      - name: Aggregate deploy guard (non-blocking)
        run: npm run deploy:aggregate:guard
        continue-on-error: true

      - name: Upload dashboard artifacts
        if: always()
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7.0.0
        with:
          name: aggregate-refresh-${{ github.run_id }}
          path: |
            automation/reports/aggregate-dashboard.json
            automation/reports/aggregate-dashboard.html
            automation/reports/aggregate-dashboard-regression-latest.json
            automation/reports/gha-workflow-cost-estimate-latest.json
            automation/reports/openclaw-improver-history-merged-latest.json
          if-no-files-found: ignore
          retention-days: 21
