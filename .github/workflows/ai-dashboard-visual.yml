name: Generate Visual Dashboard

on:
  schedule:
    - cron: '0 4 * * *'   # Daily at 4 AM UTC
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  generate-dashboard:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: main

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm ci --prefer-offline --no-audit --fund=false

      - name: Generate visual dashboard
        run: node scripts/generate-dashboard-visual.cjs

      - name: Commit visual dashboard
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          git config user.name "OpenClaw Bot"
          git config user.email "bot@openclaw.ai"
          git checkout --orphan visual-dash --force 2>/dev/null || git checkout visual-dash
          git ls-files | grep -v '^\.git' | xargs rm -f || true
          git clean -fd
          cp -r dashboard-visual/index.html .
          git add index.html
          git commit -m "chore: update visual dashboard [skip ci]" || echo "No changes to commit"
          git push origin visual-dash --force-with-lease
        continue-on-error: true