permissions:
  contents: read
name: Autonomous Content Summarizer & Excerpt Generator
true:
  schedule:
  - cron: 0 5 * * 0
  workflow_dispatch: null
jobs:
  summarizer:
    name: Content Summarizer
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
    - name: Checkout repository
      uses: actions/checkout@v6.0.2
    - name: Setup Node.js
      uses: actions/setup-node@v6.3.0
      with:
        node-version: '20'
        cache: npm
    - name: Install dependencies
      run: npm ci
    - name: Run Content Summarizer
      id: summarizer
      continue-on-error: true
      run: 'node automation/content-summarizer.cjs > /tmp/content-summary-output.txt
        || true

        echo "exit_code=$?" >> $GITHUB_OUTPUT

        '
    - name: Upload summary artifacts
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: content-summaries
        path: .hermes/memory/content-summarizer/summaries/**
        retention-days: 30
    - name: Notify Telegram on completion
      if: success()
      run: "COUNT=$(find .hermes/memory/content-summarizer/summaries -name '*.json'\
        \ 2>/dev/null | wc -l)\nnode automation/notify-telegram.js \"\U0001F4DD Content\
        \ summarizer weekly run complete \u2014 $COUNT new excerpt(s) generated.\"\
        \n"
    - name: Notify Telegram on errors
      if: failure()
      run: "node automation/notify-telegram.js \"\u26A0\uFE0F Content summarizer encountered\
        \ errors. Check workflow logs.\"\n"
    timeout-minutes: 10
