# AI Production Deploy Validation
# Runs after deploy: sitemap validation, SEO meta audit, quick production link check.
# Ensures deployed site meets quality gates without blocking deploy.
# Runs: After Deploy on Push completes, or workflow_dispatch

name: AI Production Deploy Validation

permissions:
  contents: read

concurrency:
  group: ai-production-deploy-validation
  cancel-in-progress: true

on:
  workflow_run:
    workflows: [Deploy on Push]
    types:
      - completed
    branches: [main]
  workflow_dispatch:

jobs:
  validate:
    if: ${{ github.event_name == 'workflow_dispatch' || github.event.workflow_run.conclusion == 'success' }}
    runs-on: ubuntu-latest
    timeout-minutes: 20
    env:
      NEXT_TELEMETRY_DISABLED: "1"
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Setup Node.js
        uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6.3.0
        with:
          node-version-file: '.nvmrc'
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Install dependencies
        run: npm ci --prefer-offline --no-audit --fund=false

      - name: Netlify deploy removed (migrated to GitHub Pages)
        if: false
        run: sleep 120

      - name: Sitemap validation (production URLs)
        run: |
          SITE="https://ziontechgroup.com"
          echo "## Production Sitemap Validation" >> "$GITHUB_STEP_SUMMARY"
          npm run sitemap:validate 2>&1 | tee sitemap-output.txt || true
          if grep -q "valid\|OK\|✓" sitemap-output.txt 2>/dev/null; then
            echo "✅ Sitemap validation completed" >> "$GITHUB_STEP_SUMMARY"
          else
            echo "⚠️ Review sitemap output above" >> "$GITHUB_STEP_SUMMARY"
          fi
        continue-on-error: true

      - name: SEO meta audit (production)
        run: |
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "## SEO Meta Audit" >> "$GITHUB_STEP_SUMMARY"
          npm run seo:audit 2>&1 | tail -50 || true
        continue-on-error: true

      - name: Quick production link check
        run: |
          SITE="https://ziontechgroup.com"
          PAGES="/ /services /solutions /contact /about /blog /industries /case-studies /ai-services /consultation /pricing /products /site-map"
          failed=0
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "## Production Link Check" >> "$GITHUB_STEP_SUMMARY"
          echo "| Page | Status |" >> "$GITHUB_STEP_SUMMARY"
          echo "|------|--------|" >> "$GITHUB_STEP_SUMMARY"
          for path in $PAGES; do
            status=$(curl -sS -o /dev/null -w "%{http_code}" --max-time 15 "$SITE$path" 2>/dev/null || echo "000")
            if [ "$status" = "200" ]; then
              echo "| \`$path\` | ✅ $status |" >> "$GITHUB_STEP_SUMMARY"
            else
              echo "| \`$path\` | ❌ $status |" >> "$GITHUB_STEP_SUMMARY"
              failed=1
            fi
          done
          [ $failed -eq 0 ] || echo "::warning::Some production pages returned non-200"
        continue-on-error: true

      - name: Quick CWV (homepage only)
        run: |
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "## Quick Performance (Homepage)" >> "$GITHUB_STEP_SUMMARY"
          npm install -g lighthouse chrome-launcher 2>/dev/null || true
          if command -v lighthouse &>/dev/null; then
            mkdir -p cwv-reports
            lighthouse "https://ziontechgroup.com/" --output=json --output-path=cwv-reports/cwv-home.json \
              --chrome-flags="--headless --no-sandbox --disable-gpu" \
              --only-categories=performance --quiet 2>/dev/null || true
            if [ -f cwv-reports/cwv-home.json ]; then
              SCORE=$(node -e "
                const fs = require('fs');
                try {
                  const d = JSON.parse(fs.readFileSync('cwv-reports/cwv-home.json','utf8'));
                  const score = (d.categories && d.categories.performance && d.categories.performance.score) ? Math.round(d.categories.performance.score * 100) : 'N/A';
                  console.log(score);
                } catch(e) { console.log('N/A'); }
              ")
              echo "Homepage performance score: **$SCORE** / 100" >> "$GITHUB_STEP_SUMMARY"
            else
              echo "Lighthouse run did not produce output." >> "$GITHUB_STEP_SUMMARY"
            fi
          else
            echo "CWV skipped (lighthouse not available). Run core-web-vitals-monitor for full CWV." >> "$GITHUB_STEP_SUMMARY"
          fi
        continue-on-error: true

      - name: Upload validation report
        if: always()
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7.0.0
        with:
          name: deploy-validation-${{ github.run_id }}
          path: |
            automation/reports/seo-meta-report.json
            sitemap-output.txt
          if-no-files-found: ignore
          retention-days: 14
