name: AI Services and Front Page Content

concurrency:
  group: content-commit
  cancel-in-progress: false

permissions:
  contents: write

on:
  schedule:
    # Daily run focused on new services + homepage advertising
    - cron: '30 9 * * *'
  workflow_dispatch:
    inputs:
      max_product_pages:
        description: 'New Zion AI product pages (default 6)'
        required: false
        default: '6'
      max_add:
        description: 'Apps to promote to front page (default 8)'
        required: false
        default: '8'
      max_template_blog:
        description: 'Template blog posts (default 4)'
        required: false
        default: '4'
      max_template_case_studies:
        description: 'Template case studies (default 4)'
        required: false
        default: '4'
      max_industry_pages:
        description: 'Industry solution pages (default 3)'
        required: false
        default: '3'
      trigger_deploy:
        description: 'Trigger deploy after commit (GitHub Pages)'
        required: false
        default: true
        type: boolean

jobs:
  services-and-content:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    env:
      NEXT_TELEMETRY_DISABLED: "1"
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          token: ${{ github.token }}

      - uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6.3.0
        with:
          node-version-file: '.nvmrc'
          cache: 'npm'
          cache-dependency-path: package-lock.json

      - name: Install dependencies
        run: npm ci --prefer-offline --no-audit --fund=false

      - name: Run services + front page content automation
        env:
          MAX_PRODUCT_PAGES: ${{ github.event.inputs.max_product_pages || '6' }}
          MAX_ADD: ${{ github.event.inputs.max_add || '8' }}
          MAX_TEMPLATE_BLOG: ${{ github.event.inputs.max_template_blog || '4' }}
          MAX_TEMPLATE_CASE_STUDIES: ${{ github.event.inputs.max_template_case_studies || '4' }}
          MAX_INDUSTRY_PAGES: ${{ github.event.inputs.max_industry_pages || '3' }}
        run: npm run content:services-and-content

      - name: Validate build
        run: |
          set -euo pipefail
          npm run rsc:guard
          npm run build

      - name: Commit, push, and deploy
        env:
          TRIGGER_DEPLOY: ${{ github.event.inputs.trigger_deploy != 'false' && '1' || '' }}
#           NETLIFY_BUILD_HOOK removed (Netlify decommissioned → GitHub Pages)
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -A
          if ! git diff --staged --quiet; then
            bash scripts/automation/commit-and-push-main.sh "chore(content): services and front page automation - new services + homepage promos"
            if false # Netlify build hook removed (migrated to GitHub Pages) && [ "$TRIGGER_DEPLOY" = "1" ]; then
              echo "# NO-OP: Netlify deploy removed (migrated to GitHub Pages)"
            fi
          fi
