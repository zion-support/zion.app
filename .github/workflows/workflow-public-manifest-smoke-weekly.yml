# Ensures public/manifest.json stays valid JSON with required PWA fields.

name: public/manifest.json smoke (weekly)

permissions:
  contents: read

on:
  schedule:
    - cron: '39 7 * * 4' # Thursdays 07:39 UTC
  workflow_dispatch:

concurrency:
  group: workflow-public-manifest-smoke-weekly
  cancel-in-progress: true

jobs:
  manifest:
    runs-on: ubuntu-latest
    timeout-minutes: 3
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Setup Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version-file: '.nvmrc'

      - name: manifest.json parses and has PWA shape
        run: |
          set -euo pipefail
          test -f public/manifest.json
          test -s public/manifest.json
          node -e "
            const fs = require('fs');
            const j = JSON.parse(fs.readFileSync('public/manifest.json','utf8'));
            if (j == null || typeof j !== 'object' || Array.isArray(j)) process.exit(1);
            for (const k of ['name','short_name','start_url','display']) {
              if (typeof j[k] !== 'string' || !j[k].trim()) process.exit(1);
            }
            if (!Array.isArray(j.icons) || j.icons.length === 0) process.exit(1);
            for (const icon of j.icons) {
              if (icon == null || typeof icon !== 'object' || Array.isArray(icon)) process.exit(1);
              if (typeof icon.src !== 'string' || !icon.src.trim()) process.exit(1);
            }
            console.log('ok: public/manifest.json');
          "
