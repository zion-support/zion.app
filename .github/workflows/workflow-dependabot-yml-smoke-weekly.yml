# Grep anchors for .github/dependabot.yml (complements Ruby YAML parse in dependabot-config-validate / validate:light).

name: dependabot.yml smoke (weekly)

permissions:
  contents: read

on:
  schedule:
    - cron: '15 7 * * 2' # Tuesdays 07:15 UTC
  workflow_dispatch:

concurrency:
  group: workflow-dependabot-yml-smoke-weekly
  cancel-in-progress: true

jobs:
  dependabot-config:
    runs-on: ubuntu-latest
    timeout-minutes: 2
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: dependabot.yml anchors
        run: |
          set -euo pipefail
          test -f .github/dependabot.yml
          test -s .github/dependabot.yml
          grep -Fq 'version: 2' .github/dependabot.yml
          grep -Fq 'package-ecosystem: "github-actions"' .github/dependabot.yml
          grep -Fq 'package-ecosystem: "npm"' .github/dependabot.yml
          grep -Fq 'open-pull-requests-limit:' .github/dependabot.yml
          echo 'ok: .github/dependabot.yml'
