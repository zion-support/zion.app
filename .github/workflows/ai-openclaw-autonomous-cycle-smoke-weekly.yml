# Ensures ai-openclaw-autonomous-cycle.yml keeps autonomous-cycle anchors (grep-only).
name: ai openclaw autonomous cycle workflow smoke (weekly)
permissions:
  contents: read
on:
  schedule:
    - cron: '48 11 * * 3' # Wednesdays 11:48 UTC
  workflow_dispatch:
concurrency:
  group: ai-openclaw-autonomous-cycle-smoke-weekly
  cancel-in-progress: true
jobs:
  openclaw-autonomous-cycle-anchors:
    runs-on: ubuntu-latest
    timeout-minutes: 2
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - name: ai-openclaw-autonomous-cycle.yml anchors
        run: |
          set -euo pipefail
          f=.github/workflows/ai-openclaw-autonomous-cycle.yml
          test -f "$f"
          test -s "$f"
          grep -Fq 'name: AI Openclaw Autonomous Cycle' "$f"
          grep -Fq 'group: ai-openclaw-autonomous-cycle' "$f"
          grep -Fq "cron: '10 */6 * * *'" "$f"
          grep -Fq 'npm run openclaw:auth:diagnose' "$f"
          grep -Fq 'npm run openclaw:autonomous-once' "$f"
          grep -Fq 'npm run openclaw:autonomous-guardian-once' "$f"
          grep -Fq 'openclaw-autonomous-app-improver-latest.json' "$f"
          grep -Fq 'openclaw-auth-runtime-diagnostic-latest.json' "$f"
          grep -Fq 'openclaw-autonomous-app-improver.log' "$f"
          echo "ok: $f"
