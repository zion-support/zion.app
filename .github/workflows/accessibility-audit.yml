name: Accessibility Audit

on:
  pull_request:
    branches: [main]
  schedule:
    - cron: '0 12 * * *'  # Daily at 12:00 UTC
  workflow_dispatch:

permissions:
  contents: read
  issues: write
  pull-requests: write

jobs:
  accessibility:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: Run accessibility audit
        env:
          APP_URL: ${{ secrets.APP_URL || 'https://ziontechgroup.com' }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID || '8435383377' }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          node automation/accessibility-audit.cjs

      - name: Upload violation reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: accessibility-report
          path: |
            .hermes/memory/accessibility/
          retention-days: 30

      - name: Comment PR with violations
        if: github.event_name == 'pull_request' && always()
        run: |
          REPORT=".hermes/memory/accessibility/latest-report.json"
          if [ -f "$REPORT" ]; then
            node -e "
              const r = require('./$REPORT');
              const total = r.summary?.totalViolations || 0;
              const critical = r.summary?.criticalCount || 0;
              const pr = Number(process.env.PR_NUMBER);
              const { execSync } = require('child_process');
              if (total > 0) {
                const body = '🚨 **Accessibility audit found violations**\\n\\n' +
                  \`Total: \${total} | Critical: \${critical}\\n\` +
                  'See artifact for details. Please address before merge.\\n';
                execSync(\`gh pr comment \$PR_NUMBER --body "\${body}"\`, { stdio: 'pipe' });
              } else {
                execSync(\`gh pr comment \$PR_NUMBER --body '✅ Accessibility audit passed — no violations found.'\`, { stdio: 'pipe' });
              }
            "
          fi
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
