name: AI Ecosystem Intelligence

permissions:
  contents: read

concurrency:
  group: ai-ecosystem-intelligence
  cancel-in-progress: false

on:
  schedule:
    - cron: '0 10 * * 1'
  workflow_dispatch:

jobs:
  ecosystem-intelligence:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    env:
      NEXT_TELEMETRY_DISABLED: "1"
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Setup Node.js
        uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6.3.0
        with:
          node-version-file: '.nvmrc'
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Install dependencies
        run: npm ci --prefer-offline --no-audit --fund=false

      - name: Run Ecosystem Intelligence Agent
        run: node automation/ai-ecosystem-intelligence-agent.cjs run

      - name: Run Content Freshness Agent
        run: node automation/ai-content-freshness-agent.cjs run

      - name: Upload reports
        if: always()
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7.0.0
        with:
          name: ecosystem-intelligence-${{ github.run_id }}
          path: |
            automation/reports/ecosystem-intelligence-latest.json
            automation/reports/content-freshness-latest.json
            automation/data/ecosystem-suggestions.json
          if-no-files-found: ignore
          retention-days: 30
