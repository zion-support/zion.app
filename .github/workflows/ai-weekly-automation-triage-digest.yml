name: AI weekly automation triage digest

permissions:
  contents: read
  issues: write

on:
  workflow_dispatch:
  schedule:
    - cron: '40 8 * * 1'

concurrency:
  group: ai-weekly-automation-triage-digest
  cancel-in-progress: false

jobs:
  digest:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    env:
      NEXT_TELEMETRY_DISABLED: '1'
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Setup Node.js
        uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6.3.0
        with:
          node-version-file: '.nvmrc'
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Install dependencies
        run: npm ci --prefer-offline --no-audit --fund=false

      - name: Build issue index + triage digest
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          node automation/generate-automation-issue-index.cjs
          node automation/weekly-automation-triage-digest.cjs

      - name: Weekly triage digest webhooks (optional)
        env:
          AUTOMATION_DIGEST_SLACK_WEBHOOK: ${{ secrets.AUTOMATION_DIGEST_SLACK_WEBHOOK }}
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
          GENERIC_WEBHOOK_URL: ${{ secrets.GENERIC_WEBHOOK_URL }}
        run: node automation/weekly-automation-triage-webhook.cjs || true

      - name: Upsert weekly triage digest issue (dedupe)
        env:
          GH_TOKEN: ${{ github.token }}
        run: node automation/weekly-automation-triage-digest-issue.cjs || true

      - name: Upload digest artifact
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: weekly-automation-triage-digest-${{ github.run_id }}
          path: |
            automation/reports/weekly-automation-triage-digest-latest.md
            automation/reports/automation-open-issues-index-latest.json
          if-no-files-found: ignore
          retention-days: 30
