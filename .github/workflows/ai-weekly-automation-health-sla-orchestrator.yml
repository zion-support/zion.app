name: AI weekly automation health SLA orchestrator

permissions:
  contents: read
  issues: write

on:
  workflow_dispatch:
  schedule:
    - cron: '35 */6 * * *'

concurrency:
  group: ai-weekly-automation-health-sla-orchestrator
  cancel-in-progress: false

jobs:
  sla-orchestrator:
    runs-on: ubuntu-latest
    timeout-minutes: 12
    env:
      NEXT_TELEMETRY_DISABLED: "1"
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Setup Node.js
        uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6.3.0
        with:
          node-version-file: '.nvmrc'
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Install dependencies
        run: npm ci --prefer-offline --no-audit --fund=false

      - name: Run weekly health SLA orchestrator
        env:
          GH_TOKEN: ${{ github.token }}
          AUTOMATION_DIGEST_SLACK_WEBHOOK: ${{ secrets.AUTOMATION_DIGEST_SLACK_WEBHOOK }}
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
          GENERIC_WEBHOOK_URL: ${{ secrets.GENERIC_WEBHOOK_URL }}
          WEEKLY_HEALTH_CONFIDENCE_MIN: ${{ vars.WEEKLY_HEALTH_CONFIDENCE_MIN }}
          WEEKLY_HEALTH_TIER1_DAYS: ${{ vars.WEEKLY_HEALTH_TIER1_DAYS }}
          WEEKLY_HEALTH_TIER2_DAYS: ${{ vars.WEEKLY_HEALTH_TIER2_DAYS }}
          WEEKLY_HEALTH_TIER3_DAYS: ${{ vars.WEEKLY_HEALTH_TIER3_DAYS }}
          WEEKLY_HEALTH_SIBLING_WINDOW_HOURS: ${{ vars.WEEKLY_HEALTH_SIBLING_WINDOW_HOURS }}
        run: node automation/weekly-automation-health-sla-orchestrator.cjs

      - name: Upload SLA orchestrator state
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: weekly-automation-health-sla-orchestrator-${{ github.run_id }}
          path: automation/reports/weekly-automation-health-sla-orchestrator-state.json
          if-no-files-found: ignore
          retention-days: 30
