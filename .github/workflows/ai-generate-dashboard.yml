name: Generate AI Dashboard

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  generate-dashboard:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: main

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm

      - name: Install dependencies
        run: npm ci --prefer-offline --no-audit --fund=false

      - name: Generate dashboard
        run: node scripts/generate-dashboard.cjs

      - name: Commit dashboard to gh-pages branch
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          git config user.name "OpenClaw Bot"
          git config user.email "bot@openclaw.ai"
          # Create (or switch to) the gh-pages branch
          git checkout --orphan gh-pages 2>/dev/null || git checkout gh-pages
          # Remove all files except .git and any existing docs
          git ls-files | grep -v '^\.git' | xargs rm -f || true
          git clean -fd
          # Copy the generated dashboard
          cp -r dashboard/index.html .
          cp -r dashboard/. ./ || true
          git add index.html
          git commit -m "chore: update AI automation dashboard [skip ci]" || echo "No changes to commit"
          git push origin gh-pages --force-with-lease
        continue-on-error: true