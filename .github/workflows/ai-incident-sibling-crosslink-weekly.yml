name: AI incident sibling cross-link (weekly)

permissions:
  contents: write
  issues: write

on:
  schedule:
    - cron: '52 10 * * 3'
  workflow_dispatch:

concurrency:
  group: ai-incident-sibling-crosslink-weekly
  cancel-in-progress: false

jobs:
  crosslink:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    env:
      NEXT_TELEMETRY_DISABLED: "1"
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          token: ${{ github.token }}
          ref: main

      - name: Setup Node.js
        uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6.3.0
        with:
          node-version-file: '.nvmrc'
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Install dependencies
        run: npm ci --prefer-offline --no-audit --fund=false

      - name: Cross-link sibling incidents
        env:
          GH_TOKEN: ${{ github.token }}
        run: node automation/ai-incident-sibling-crosslink.cjs

      - name: Commit rate-limit state
        env:
          GITHUB_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          if [ -f automation/reports/sibling-crosslink-state.json ]; then
            git add -f automation/reports/sibling-crosslink-state.json
          fi
          if git diff --staged --quiet; then
            echo "No sibling cross-link state changes."
            exit 0
          fi
          bash scripts/automation/commit-and-push-main.sh "chore(reports): sibling cross-link state"
