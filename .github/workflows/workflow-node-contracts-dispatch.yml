name: Workflow Node contracts only (manual)

permissions:
  contents: read

on:
  workflow_dispatch:

concurrency:
  group: workflow-node-contracts-dispatch
  cancel-in-progress: true

jobs:
  contracts:
    runs-on: ubuntu-latest
    timeout-minutes: 12
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Setup Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version-file: '.nvmrc'

      - name: Workflow contracts (dedupe, integrity, pin strict)
        run: npm run workflows:contracts:node
