name: AI Mid-Week Auto-Implementation

permissions:
  contents: write

concurrency:
  group: ai-midweek-auto-impl
  cancel-in-progress: false

on:
  schedule:
    - cron: '0 14 * * 3'
  workflow_dispatch:

jobs:
  auto-impl:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    env:
      NEXT_TELEMETRY_DISABLED: "1"
      SKIP_TELEGRAM: "1"
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          token: ${{ github.token }}
      - name: Setup Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version-file: '.nvmrc'
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Install dependencies
        run: npm ci --prefer-offline --no-audit --fund=false

      - name: Run Auto-Implementation (ecosystem intel + suggestion importer)
        run: node automation/ai-auto-implementation-agent.cjs run

      - name: Check for changes
        id: changes
        run: |
          if git diff --quiet automation/ .github/ 2>/dev/null; then
            echo "changed=false" >> $GITHUB_OUTPUT
          else
            echo "changed=true" >> $GITHUB_OUTPUT
          fi
          git diff --stat automation/ .github/ 2>/dev/null || true

      - name: Commit and push automation updates
        if: steps.changes.outputs.changed == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add automation/ automation/cron/ .github/
          if git diff --staged --quiet; then
            exit 0
          fi
          bash scripts/automation/commit-and-push-main.sh "chore(automation): mid-week ecosystem suggestions"
