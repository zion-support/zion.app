name: AI Autonomy Quick Cycle

permissions:
  contents: read

on:
  workflow_dispatch:
  schedule:
    - cron: '30 5 * * *' # Daily at 05:30 UTC

jobs:
  autonomy-quick-cycle:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Use Node 20
        uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6.3.0
        with:
          node-version-file: .nvmrc
          cache: 'npm'
          cache-dependency-path: package-lock.json

      - name: Install dependencies
        run: npm ci --prefer-offline --no-audit --fund=false

      - name: Run deploy readiness gate
        id: readiness
        run: |
          set +e
          npm run deploy:readiness
          status=$?
          echo "status=$status" >> "$GITHUB_OUTPUT"
          exit 0

      - name: Run autonomy quick cycle (improvement + deploy)
        if: steps.readiness.outputs.status == '0'
        env:
#           NETLIFY_BUILD_HOOK removed (Netlify decommissioned → GitHub Pages)
          OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
          GH_TOKEN: ${{ github.token }}
        run: |
          npm run app:autonomy-quick-cycle

