name: Reusable workflow CI (validate + optional contracts)

permissions:
  contents: read

on:
  workflow_call:
    inputs:
      run_contracts:
        description: 'Run npm run workflows:contracts:node (dedupe, integrity, pin strict)'
        required: false
        default: false
        type: boolean

jobs:
  validate:
    runs-on: ubuntu-latest
    timeout-minutes: 14
    env:
      NEXT_TELEMETRY_DISABLED: "1"
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Setup Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version-file: '.nvmrc'
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Install dependencies
        run: npm ci --prefer-offline --no-audit --fund=false

      - name: Workflow validate light (Ruby YAML contracts + grep + bash + repo hygiene)
        run: npm run workflows:validate:light

      - name: Workflow contracts (dedupe, integrity, pin)
        if: ${{ inputs.run_contracts }}
        run: npm run workflows:contracts:node
