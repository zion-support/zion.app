name: AI dependency upgrade train

permissions:
  contents: read

on:
  schedule:
    - cron: '0 16 3 * *'
  workflow_dispatch:

concurrency:
  group: ai-dependency-upgrade-train
  cancel-in-progress: false

jobs:
  outdated:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    env:
      NEXT_TELEMETRY_DISABLED: '1'
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Setup Node.js
        uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6.3.0
        with:
          node-version-file: '.nvmrc'
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Install dependencies
        run: npm ci --prefer-offline --no-audit --fund=false

      - name: Capture npm outdated JSON
        run: npm run deps:outdated:train

      - name: Patch-only bump report
        run: npm run deps:patch-only:report

      - name: Upload outdated snapshot
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: npm-outdated-train-${{ github.run_id }}
          path: automation/reports/npm-outdated-train-latest.json
          if-no-files-found: ignore
          retention-days: 180

      - name: Upload patch-only report
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: npm-patch-only-${{ github.run_id }}
          path: automation/reports/npm-patch-only-latest.json
          if-no-files-found: ignore
          retention-days: 180
