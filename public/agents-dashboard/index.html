<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Zion Agents Monitoring Dashboard</title>
<style>
  {box-sizing:border-box}
  html,body{margin:0; background:#0f172a; color:#e2e8f0; font-family:system-ui,-apple-system,sans-serif}
  header{background:rgba(15,23,42,.95); border-bottom:1px solid #1e293b; padding:16px 24px; position:sticky; top:0; z-index:50; backdrop-filter:blur(12px)}
  .nav{max-width:1200px; margin:0 auto; display:flex; justify-content:space-between; align-items:center; gap:16px; flex-wrap:wrap}
  .logo{font-size:20px; font-weight:700; background:linear-gradient(135deg,#a78bfa,#ec4899); -webkit-background-clip:text; background-clip:text; color:transparent}
  .pill{font-size:12px; color:#94a3b8; background:rgba(255,255,255,.06); padding:6px 12px; border-radius:999px; border:1px solid #1e293b}
  main{max-width:1200px; margin:0 auto; padding:32px 24px 80px}
  h1{font-size:28px; font-weight:700; margin:0 0 4px}
  .subtitle{color:#64748b; font-size:14px; margin-bottom:32px}
  .stats{display:grid; grid-template-columns:repeat(auto-fit,minmax(180px,1fr)); gap:16px; margin-bottom:40px}
  .stat{background:rgba(255,255,255,.04); border:1px solid #1e293b; border-radius:14px; padding:20px; transition:border-color .2s}
  .stat:hover{border-color:#334155}
  .stat-label{font-size:12px; color:#64748b; text-transform:uppercase; letter-spacing:.5px}
  .stat-value{font-size:36px; font-weight:700; margin-top:8px; line-height:1}
  .section{margin-bottom:48px}
  .section-title{font-size:20px; font-weight:600; margin-bottom:16px; display:flex; align-items:center; gap:10px}
  .agents{display:grid; grid-template-columns:repeat(auto-fill,minmax(320px,1fr)); gap:16px}
  .agent{background:rgba(255,255,255,.03); border:1px solid #1e293b; border-radius:16px; padding:20px; transition:all .2s}
  .agent:hover{border-color:#334155; transform:translateY(-2px)}
  .agent-header{display:flex; justify-content:space-between; align-items:center; margin-bottom:12px}
  .agent-name{font-size:16px; font-weight:600; color:#f1f5f9}
  .agent-role{font-size:12px; color:#64748b; margin-top:2px}
  .badge{font-size:11px; padding:4px 10px; border-radius:999px; font-weight:500}
  .online{background:rgba(16,185,129,.1); color:#10b981; border:1px solid rgba(16,185,129,.2)}
  .offline{background:rgba(239,68,68,.1); color:#ef4444; border:1px solid rgba(239,68,68,.2)}
  .metrics{display:grid; grid-template-columns:repeat(3,1fr); gap:12px; margin-top:16px; padding-top:16px; border-top:1px solid #1e293b}
  .metric-label{font-size:11px; color:#64748b}
  .metric-value{font-size:18px; font-weight:600; margin-top:4px; color:#e2e8f0}
  .actions{margin-top:14px}
  .action{display:flex; gap:10px; align-items:flex-start; padding:8px 0; border-bottom:1px solid #1e293b60}
  .action:last-child{border:none}
  .action-icon{font-size:14px; opacity:.7}
  .action-content{flex:1}
  .action-type{font-size:11px; font-weight:600; text-transform:uppercase; letter-spacing:.5px; margin-bottom:2px}
  .action-type.assign{color:#a78bfa}
  .action-type.done{color:#10b981}
  .action-type.online{color:#3b82f6}
  .action-desc{font-size:13px; color:#94a3b8}
  .empty{background:rgba(255,255,255,.03); border:1px dashed #1e293b; border-radius:14px; padding:40px; text-align:center; color:#64748b}
  footer{max-width:1200px; margin:0 auto; padding:24px; border-top:1px solid #1e293b; color:#64748b; font-size:12px; text-align:center}
  .loading{display:inline-block; width:16px; height:16px; border:2px solid #1e293b; border-top-color:#a78bfa; border-radius:50%; animation:spin .8s linear infinite; vertical-align:middle; margin-right:8px}
  @keyframes spin{to{transform:rotate(360deg)}}
</style>
</head>
<body>
<header>
  <div class="nav">
    <div class="logo">⚡ Zion Agents Dashboard</div>
    <div style="display:flex; gap:8px; align-items:center">
      <span id="clock" class="pill"></span>
      <a href="/" class="pill" style="text-decoration:none; color:#a78bfa">← Back to site</a>
      <button onclick="load()" class="pill" style="cursor:pointer; background:rgba(167,139,250,.1); color:#a78bfa; border-color:#7c3aed40">🔄 Refresh</button>
    </div>
  </div>
</header>

<main>
  <div>
    <h1>Live Agent Monitoring</h1>
    <p class="subtitle">Real-time fleet health · task tracking · agent activity</p>
  </div>

  <div class="stats" id="stats"></div>

  <div class="section">
    <div class="section-title">🤖 Active Agents</div>
    <div class="agents" id="agents"></div>
  </div>

  <div class="section">
    <div class="section-title">📋 Recent Activity</div>
    <div id="feed"></div>
  </div>
</main>

<footer>
  <div>© 2026 Zion Tech Group · Monitoring powered by live agent telemetry</div>
  <div>Auto-refresh in <strong id="countdown">60</strong>s · <span id="last-update"></span></div>
</footer>

<script>
const API = '/api/agents-monitoring.json';
let countdown = 60;

function updateClock() {
  document.getElementById('clock').textContent = new Date().toLocaleString('en-US', {
    hour: '2-digit', minute: '2-digit', second: '2-digit', hour12: false
  }) + ' · ' + new Date().toLocaleDateString('en-US', { month: 'short', day: 'numeric', year: 'numeric' });
}

function countdownTick() {
  countdown--;
  document.getElementById('countdown').textContent = countdown;
  if (countdown <= 0) {
    countdown = 60;
    load();
  }
}

function renderStats(data) {
  const total = data.fleet.total || 0;
  const online = data.fleet.online || 0;
  const tasks = data.agents.reduce((s, a) => s + a.taskCount, 0);
  document.getElementById('stats').innerHTML = `
    <div class="stat"><div class="stat-label">🤖 Total Agents</div><div class="stat-value">${total}</div></div>
    <div class="stat"><div class="stat-label">🟢 Online</div><div class="stat-value" style="color:#10b981">${online}</div></div>
    <div class="stat"><div class="stat-label">✅ Tasks Done</div><div class="stat-value" style="color:#a78bfa">${tasks}</div></div>
    <div class="stat"><div class="stat-label">⏱ Status</div><div class="stat-value" style="font-size:20px; margin-top:14px">${online > 0 ? '<span style="color:#10b981">Healthy</span>' : '<span style="color:#f59e0b">Loading...</span>'}</div></div>
  `;
}

function renderAgents(data) {
  const el = document.getElementById('agents');
  if (!el) return;
  if (!data.agents || data.agents.length === 0) {
    el.innerHTML = '<div class="empty">No agents data available yet. The dashboard will populate once monitoring outputs are detected.</div>';
    return;
  }
  el.innerHTML = data.agents.map(a => {
    const statusCls = a.status === 'online' ? 'online' : 'offline';
    const statusText = a.status === 'online' ? '● Online' : '○ Offline';
    const lastSeen = a.lastSeen 
      ? new Date(a.lastSeen).toLocaleString('en-US', { hour: '2-digit', minute: '2-digit', hour12: false }) + ' · ' + new Date(a.lastSeen).toLocaleDateString('en-US', { month: 'short', day: 'numeric' })
      : '—';
    return `
      <article class="agent">
        <div class="agent-header">
          <div>
            <div class="agent-name">@${a.username}</div>
            <div class="agent-role">${a.role}</div>
          </div>
          <span class="badge ${statusCls}">${statusText}</span>
        </div>
        <div class="metrics">
          <div><div class="metric-label">Tasks</div><div class="metric-value">${a.taskCount}</div></div>
          <div><div class="metric-label">Last Seen</div><div class="metric-value" style="font-size:13px">${lastSeen}</div></div>
          <div><div class="metric-label">Status</div><div class="metric-value" style="font-size:13px; color:${a.status === 'online' ? '#10b981' : '#94a3b8'}">${a.status}</div></div>
        </div>
        ${a.recentActions && a.recentActions.length > 0 ? `
          <div class="actions">
            ${a.recentActions.slice(0, 3).map(r => {
              const kind = r.description.split(':')[0].trim();
              const desc = r.description.split(':').slice(1).join(':').trim();
              return `<div class="action">
                <div class="action-icon">→</div>
                <div class="action-content">
                  <div class="action-type ${kind.toLowerCase()}">${kind}</div>
                  <div class="action-desc">${desc}</div>
                </div>
              </div>`;
            }).join('')}
          </div>
        ` : ''}
      </article>
    `;
  }).join('');
}

function renderFeed(data) {
  const el = document.getElementById('feed');
  if (!el) return;
  if (!data.recentActivity || data.recentActivity.length === 0) {
    el.innerHTML = '<div class="empty">No recent activity yet. Actions will appear here as agents work.</div>';
    return;
  }
  el.innerHTML = '<div style="display:flex; flex-direction:column; gap:6px">' + data.recentActivity.map(item => {
    const kind = item.action.split(' — ')[0];
    const desc = item.action.split(' — ').slice(1).join(' — ');
    const agent = item.agent || 'unknown';
    return `<div class="agent" style="padding:14px 18px">
      <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:6px">
        <div style="font-weight:600; color:#f1f5f9">@${agent}</div>
        <span class="badge ${kind === 'DONE' ? 'online' : kind === 'ASSIGN' ? 'offline' : 'online'}">${kind}</span>
      </div>
      <div style="font-size:13px; color:#94a3b8">${desc}</div>
    </div>`;
  }).join('') + '</div>';
}

async function load() {
  try {
    const res = await fetch(API);
    if (!res.ok) throw new Error(`status: ${res.status}`);
    const data = await res.json();
    renderStats(data);
    renderAgents(data);
    renderFeed(data);
    document.getElementById('last-update').textContent = 'Updated ' + new Date().toLocaleTimeString('en-US', { hour: '2-digit', minute: '2-digit', hour12: false });
  } catch (e) {
    document.getElementById('stats').innerHTML = '<div class="empty">Error loading dashboard data. Check console.</div>';
    console.error(e);
  }
  updateClock();
}

(function init() {
  updateClock();
  load();
  setInterval(countdownTick, 1000);
})();
</script>
</body>
</html>
